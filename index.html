<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>R.O.I Portfolio Dashboard</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#F5F5F5;--bg2:#FFFFFF;--bg3:#F8F8F8;--bg4:#F0F0F0;
  --card:#FFFFFF;--border:#E5E5E5;--border2:#D0D0D0;
  --red:#DC2626;--red2:#EF4444;--red3:#FCA5A5;--red-bg:#FEF2F2;
  --black:#111111;--black2:#222222;--black3:#444444;
  --text:#111111;--text2:#444444;--text3:#888888;
  --green:#059669;--green-bg:#ECFDF5;
  --yellow:#D97706;--yellow-bg:#FFFBEB;
  --blue:#2563EB;--blue-bg:#EFF6FF;
  --purple:#7C3AED;--purple-bg:#F5F3FF;
  --orange:#EA580C;--orange-bg:#FFF7ED;
  --r:10px;
}
body{background:var(--bg);min-height:100vh;font-family:'Segoe UI',system-ui,sans-serif;font-size:13px;line-height:1.5;color:var(--text);}

.topbar{background:var(--black);border-bottom:none;padding:0 1.2rem;display:flex;align-items:center;justify-content:space-between;height:52px;position:sticky;top:0;z-index:100;}
.logo{font-size:1.15rem;font-weight:900;color:#fff;letter-spacing:0.02em;}
.logo em{font-style:normal;color:var(--red2);}
.logo-sub{font-size:0.68rem;color:rgba(255,255,255,0.45);margin-left:0.5rem;}
.topbar-right{font-size:0.68rem;color:rgba(255,255,255,0.5);font-family:monospace;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.12);padding:0.25rem 0.65rem;border-radius:20px;}

.port-nav{background:var(--bg2);border-bottom:2px solid var(--border);padding:0 1.2rem;display:flex;align-items:stretch;overflow-x:auto;}
.port-tab{display:flex;align-items:center;gap:0.35rem;padding:0 0.9rem;height:42px;font-size:0.72rem;font-weight:700;color:var(--text3);cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-2px;transition:all 0.15s;white-space:nowrap;letter-spacing:0.04em;text-transform:uppercase;}
.port-tab:hover{color:var(--black);}
.port-tab.active{color:var(--red);border-bottom-color:var(--red);}
.tab-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.dot-all{background:var(--red);}.dot-amit{background:#2563EB;}.dot-lovelina{background:#DB2777;}.dot-joint{background:#059669;}.dot-retirement{background:#7C3AED;}

.sub-nav{background:var(--bg3);border-bottom:1px solid var(--border);padding:0 1.2rem;display:flex;align-items:stretch;overflow-x:auto;}
.sub-tab{display:flex;align-items:center;gap:0.4rem;padding:0 0.9rem;height:34px;font-size:0.67rem;font-weight:600;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;transition:all 0.15s;white-space:nowrap;text-transform:uppercase;}
.sub-tab:hover{color:var(--black);}.sub-tab.active{color:var(--red);border-bottom-color:var(--red);}
.owner-badge{background:var(--bg4);border:1px solid var(--border);border-radius:3px;padding:1px 5px;font-size:0.62rem;color:var(--text3);}

.breadcrumb{padding:0.4rem 1.2rem;font-size:0.68rem;color:var(--text3);display:flex;align-items:center;gap:0.35rem;background:var(--bg2);border-bottom:1px solid var(--border);}
.main{padding:0.85rem 1.2rem;}

.filter-bar{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:0.55rem 0.9rem;margin-bottom:0.85rem;display:flex;align-items:center;gap:0.65rem;flex-wrap:wrap;box-shadow:0 1px 4px rgba(0,0,0,0.06);}
.filter-bar-label{font-size:0.62rem;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.08em;white-space:nowrap;}
.ticker-select-wrap{position:relative;flex:1;min-width:180px;max-width:360px;}
.ticker-select-btn{background:var(--bg3);border:1px solid var(--border2);color:var(--text);padding:0.28rem 0.7rem;border-radius:7px;font-size:0.72rem;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:0.4rem;width:100%;justify-content:space-between;min-height:30px;transition:border-color 0.15s;}
.ticker-select-btn:hover{border-color:var(--red);}
.ticker-dropdown{position:absolute;top:calc(100% + 4px);left:0;right:0;background:#fff;border:1px solid var(--border2);border-radius:8px;box-shadow:0 8px 24px rgba(0,0,0,0.12);z-index:200;padding:0.4rem;display:none;max-height:200px;overflow-y:auto;}
.ticker-dropdown.open{display:block;}
.ticker-dd-item{display:flex;align-items:center;gap:0.5rem;padding:0.32rem 0.5rem;border-radius:5px;cursor:pointer;font-size:0.73rem;font-weight:600;color:var(--text2);transition:background 0.1s;}
.ticker-dd-item:hover{background:var(--bg3);}
.ticker-dd-item.selected{background:var(--red-bg);color:var(--red);}
.ticker-dd-check{width:14px;height:14px;border:1.5px solid var(--border2);border-radius:3px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:0.6rem;}
.ticker-dd-item.selected .ticker-dd-check{background:var(--red);border-color:var(--red);color:#fff;}
.dd-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;display:inline-block;}
.sel-tags{display:flex;gap:0.3rem;flex-wrap:wrap;align-items:center;}
.sel-tag{background:var(--red-bg);border:1px solid rgba(220,38,38,0.25);color:var(--red);padding:0.12rem 0.45rem;border-radius:12px;font-size:0.63rem;font-weight:700;display:flex;align-items:center;gap:0.3rem;}
.sel-tag-x{cursor:pointer;opacity:0.6;font-size:0.58rem;}.sel-tag-x:hover{opacity:1;}

.summary-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(145px,1fr));gap:0.75rem;margin-bottom:0.85rem;}
.scard{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:0.85rem 1rem;box-shadow:0 1px 4px rgba(0,0,0,0.06);}
.scard-label{font-size:0.6rem;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;margin-bottom:0.3rem;}
.scard-val{font-size:1.2rem;font-weight:800;font-family:monospace;line-height:1;margin-bottom:0.12rem;}
.scard-sub{font-size:0.6rem;color:var(--text3);}

.be-mini-card{background:var(--black);border-radius:var(--r);padding:0.85rem 1rem;display:flex;flex-direction:column;justify-content:space-between;box-shadow:0 1px 4px rgba(0,0,0,0.12);}
.be-mini-label{font-size:0.6rem;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:rgba(255,255,255,0.5);margin-bottom:0.3rem;}
.be-mini-val{font-size:1.05rem;font-weight:800;font-family:monospace;line-height:1;margin-bottom:0.3rem;}
.be-mini-bar-wrap{background:rgba(255,255,255,0.15);border-radius:100px;height:5px;overflow:hidden;margin-bottom:0.2rem;}
.be-mini-bar{height:100%;border-radius:100px;background:linear-gradient(90deg,var(--red),#FB923C,var(--green));}
.be-mini-sub{font-size:0.6rem;color:rgba(255,255,255,0.4);}

.gain-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:0.85rem 1rem;box-shadow:0 1px 4px rgba(0,0,0,0.06);}
.gain-title{font-size:0.6rem;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:var(--text3);margin-bottom:0.4rem;}
.gain-row{display:flex;align-items:center;justify-content:space-between;padding:0.14rem 0;}
.gain-label{font-size:0.62rem;color:var(--text3);font-weight:600;}
.gain-val{font-size:0.9rem;font-weight:800;font-family:monospace;}
.gain-divider{height:1px;background:var(--border);margin:0.2rem 0;}

.col-combo-card{background:var(--black);border-radius:var(--r);padding:0.85rem 1rem;box-shadow:0 1px 4px rgba(0,0,0,0.12);}
.col-combo-title{font-size:0.6rem;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:rgba(255,255,255,0.5);margin-bottom:0.4rem;}
.col-combo-row{display:flex;align-items:center;justify-content:space-between;padding:0.14rem 0;}
.col-combo-label{font-size:0.62rem;color:rgba(255,255,255,0.45);font-weight:600;}
.col-combo-val{font-size:0.9rem;font-weight:800;font-family:monospace;}
.col-combo-divider{height:1px;background:rgba(255,255,255,0.1);margin:0.2rem 0;}

.sbar{font-size:0.65rem;font-weight:800;text-transform:uppercase;letter-spacing:0.12em;color:var(--text3);padding:0.35rem 0;margin-bottom:0.65rem;display:flex;align-items:center;gap:0.5rem;}
.sbar::before{content:'';width:3px;height:12px;background:var(--red);border-radius:2px;display:inline-block;}

.controls-row{display:flex;gap:0.5rem;margin-bottom:0.75rem;flex-wrap:wrap;align-items:center;}
.type-tabs{display:flex;gap:2px;background:var(--bg2);border:1px solid var(--border);border-radius:9px;padding:3px;flex-wrap:wrap;box-shadow:0 1px 4px rgba(0,0,0,0.06);}
.type-tab{background:transparent;border:none;color:var(--text3);padding:0.22rem 0.55rem;border-radius:6px;font-size:0.65rem;font-weight:700;cursor:pointer;text-transform:uppercase;transition:all 0.15s;white-space:nowrap;}
.type-tab.active{background:var(--red);color:#fff;}.type-tab:hover:not(.active){color:var(--black);}
.oc-tabs{display:flex;gap:2px;background:var(--bg2);border:1px solid var(--border);border-radius:9px;padding:3px;box-shadow:0 1px 4px rgba(0,0,0,0.06);}
.oc-tab{background:transparent;border:none;color:var(--text3);padding:0.22rem 0.5rem;border-radius:6px;font-size:0.65rem;font-weight:700;cursor:pointer;text-transform:uppercase;transition:all 0.15s;}
.oc-tab.active{background:var(--black);color:#fff;}.oc-tab:hover:not(.active){color:var(--black);}
.expiry-pill{background:var(--red-bg);border:1px solid rgba(220,38,38,0.3);color:var(--red);padding:0.22rem 0.6rem;border-radius:20px;font-size:0.65rem;font-weight:700;cursor:pointer;transition:all 0.15s;white-space:nowrap;}
.expiry-pill.active{background:var(--red);color:#fff;border-color:var(--red);}
.del-all-btn{background:var(--bg2);border:1px solid var(--border);color:var(--text3);padding:0.22rem 0.6rem;border-radius:7px;font-size:0.65rem;font-weight:700;cursor:pointer;margin-left:auto;transition:all 0.15s;}
.del-all-btn:hover{background:var(--red-bg);border-color:rgba(220,38,38,0.3);color:var(--red);}

.table-wrap{background:var(--card);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;overflow-x:auto;margin-bottom:0.85rem;box-shadow:0 1px 4px rgba(0,0,0,0.06);}
table{width:100%;border-collapse:collapse;min-width:1100px;}
thead{background:var(--black);}
th{padding:0.6rem 0.65rem;font-size:0.6rem;font-weight:700;color:rgba(255,255,255,0.7);text-transform:uppercase;letter-spacing:0.08em;text-align:left;white-space:nowrap;cursor:pointer;user-select:none;}
th:hover{color:var(--red2);}
tbody tr{border-bottom:1px solid var(--border);transition:background 0.1s;}
tbody tr:last-child{border-bottom:none;}tbody tr:hover{background:#FAFAFA;}
tr.cr{opacity:0.4;}tr.expiring-soon{background:#FEF2F2!important;}tr.rolled{background:#F5F3FF!important;opacity:0.75;}
td{padding:0.5rem 0.65rem;font-size:0.73rem;color:var(--text2);white-space:nowrap;}
td.mc{color:var(--black);font-weight:700;}td.mn{font-family:monospace;font-size:0.71rem;}

.badge{display:inline-flex;align-items:center;padding:0.1rem 0.42rem;border-radius:4px;font-size:0.58rem;font-weight:700;letter-spacing:0.05em;text-transform:uppercase;}
.bsp{background:var(--red-bg);color:var(--red);}.blp{background:var(--blue-bg);color:var(--blue);}
.blc{background:var(--green-bg);color:var(--green);}.bsh{background:var(--yellow-bg);color:var(--yellow);}
.bcl{background:#F3F4F6;color:#9CA3AF;}.bop{background:var(--green-bg);color:var(--green);}
.chip{display:inline-flex;align-items:center;gap:0.35rem;font-weight:700;font-size:0.75rem;color:var(--black);}
.tk-dot-sm{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.es{color:var(--red);font-weight:700;}.em{color:var(--yellow);font-weight:600;}.ef{color:var(--text3);}

.price-cell{display:flex;align-items:center;gap:0.28rem;}
.price-val{font-family:monospace;font-weight:700;font-size:0.71rem;color:var(--black);}
.price-icon{font-size:0.57rem;padding:0.07rem 0.26rem;border-radius:3px;font-weight:700;}
.price-manual{background:var(--yellow-bg);color:var(--yellow);}.price-none{background:#F3F4F6;color:#9CA3AF;}
.price-input{width:58px;background:#fff;border:1px solid var(--border2);color:var(--black);border-radius:5px;padding:0.15rem 0.3rem;font-size:0.7rem;font-family:monospace;outline:none;}
.price-input:focus{border-color:var(--red);}
.edit-btn{background:none;border:none;cursor:pointer;font-size:0.68rem;color:var(--text3);padding:0.08rem 0.22rem;border-radius:3px;}
.edit-btn:hover{color:var(--red);background:var(--red-bg);}

/* ── INLINE EDIT CELLS ── */
.ie-cell{display:inline-flex;align-items:center;gap:0.18rem;cursor:pointer;}
.ie-cell:hover .ie-val{text-decoration:underline;text-decoration-style:dashed;text-decoration-color:var(--text3);}
.ie-cell:hover .ie-pencil{opacity:1;}
.ie-pencil{font-size:0.6rem;color:var(--text3);opacity:0;transition:opacity 0.15s;}
.ie-wrap{display:inline-flex;align-items:center;gap:0.2rem;}
.ie-input{border:1px solid var(--red);border-radius:5px;padding:0.1rem 0.28rem;font-size:0.71rem;font-family:monospace;outline:none;color:var(--black);background:#fff;}
.ie-input.w-sm{width:52px;}.ie-input.w-md{width:70px;}.ie-input.w-dt{width:78px;}
.ie-input:focus{box-shadow:0 0 0 2px rgba(220,38,38,0.12);}
.ie-ok{background:var(--green);border:none;color:#fff;cursor:pointer;font-size:0.6rem;padding:0.08rem 0.28rem;border-radius:3px;font-weight:700;}
.ie-x{background:transparent;border:none;color:var(--text3);cursor:pointer;font-size:0.7rem;padding:0.04rem 0.15rem;}

.col-cell{display:flex;align-items:center;gap:0.28rem;flex-wrap:wrap;}
.col-val{font-family:monospace;font-weight:700;font-size:0.71rem;color:var(--orange);}
.roll-btn{background:var(--purple-bg);border:1px solid rgba(124,58,237,0.25);color:var(--purple);padding:0.1rem 0.38rem;border-radius:4px;font-size:0.58rem;font-weight:700;cursor:pointer;white-space:nowrap;}
.roll-btn:hover{background:rgba(124,58,237,0.15);}
.undo-btn{background:var(--green-bg);border:1px solid rgba(5,150,105,0.25);color:var(--green);padding:0.1rem 0.38rem;border-radius:4px;font-size:0.58rem;font-weight:700;cursor:pointer;white-space:nowrap;}
.rolled-badge{background:var(--purple-bg);color:var(--purple);padding:0.08rem 0.35rem;border-radius:3px;font-size:0.58rem;font-weight:700;}
.del-btn{background:none;border:none;color:#D1D5DB;cursor:pointer;padding:0.18rem 0.32rem;border-radius:4px;font-size:0.75rem;transition:all 0.15s;}
.del-btn:hover{background:var(--red-bg);color:var(--red);}

/* ── CLOSE / TRADE MODAL ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:1000;display:flex;align-items:center;justify-content:center;}
.modal-box{background:#fff;border-radius:14px;padding:1.5rem;width:340px;max-width:92vw;box-shadow:0 16px 48px rgba(0,0,0,0.2);}
.modal-title{font-size:0.85rem;font-weight:800;color:var(--black);margin-bottom:0.2rem;}
.modal-sub{font-size:0.68rem;color:var(--text3);margin-bottom:0.85rem;}
.modal-pos-info{display:flex;align-items:center;gap:0.4rem;background:var(--bg3);border:1px solid var(--border);border-radius:7px;padding:0.3rem 0.65rem;margin-bottom:0.9rem;font-size:0.72rem;font-weight:700;color:var(--black);}
.modal-section-label{font-size:0.63rem;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--text3);margin-bottom:0.35rem;}
.modal-action-tabs{display:flex;gap:3px;background:var(--bg3);border-radius:8px;padding:3px;margin-bottom:0.9rem;}
.mat{flex:1;text-align:center;padding:0.32rem 0;border-radius:6px;font-size:0.68rem;font-weight:700;cursor:pointer;border:none;background:transparent;color:var(--text3);transition:all 0.15s;}
.mat:hover{color:var(--black);}
.mat.mat-close.active{background:var(--black);color:#fff;}
.mat.mat-btc.active{background:var(--green);color:#fff;}
.mat.mat-stc.active{background:var(--blue);color:#fff;}
.mat.mat-sell.active{background:var(--orange);color:#fff;}
.modal-cd-tabs{display:flex;gap:3px;margin-bottom:0.5rem;}
.mct{flex:1;text-align:center;padding:0.28rem;border-radius:6px;font-size:0.67rem;font-weight:700;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--text3);transition:all 0.15s;}
.mct.credit.active{background:var(--green-bg);border-color:rgba(5,150,105,0.4);color:var(--green);}
.mct.debit.active{background:var(--red-bg);border-color:rgba(220,38,38,0.35);color:var(--red);}
.mct.zero.active{background:var(--bg4);border-color:var(--border2);color:var(--black);}
.modal-amt-wrap{display:flex;align-items:center;gap:0.45rem;margin-bottom:0.25rem;}
.modal-amt-pre{font-size:0.9rem;font-weight:700;color:var(--text3);width:18px;}
.modal-amt-input{flex:1;border:1px solid var(--border2);border-radius:7px;padding:0.4rem 0.65rem;font-size:0.85rem;font-family:monospace;font-weight:700;outline:none;color:var(--black);}
.modal-amt-input:focus{border-color:var(--red);}
.modal-amt-input:disabled{background:var(--bg3);color:var(--text3);}
.modal-hint{font-size:0.62rem;color:var(--text3);margin-bottom:0.85rem;}
.modal-notes-label{font-size:0.63rem;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:0.3rem;}
.modal-notes{width:100%;border:1px solid var(--border2);border-radius:7px;padding:0.38rem 0.65rem;font-size:0.75rem;outline:none;color:var(--black);resize:none;margin-bottom:0.9rem;}
.modal-notes:focus{border-color:var(--red);}
.modal-btns{display:flex;gap:0.55rem;}
.modal-confirm{flex:1;color:#fff;border:none;padding:0.52rem;border-radius:8px;font-size:0.75rem;font-weight:700;cursor:pointer;}
.modal-confirm:hover{opacity:0.9;}
.modal-cancel-btn{background:transparent;color:var(--text3);border:1px solid var(--border);padding:0.52rem 0.85rem;border-radius:8px;font-size:0.72rem;font-weight:600;cursor:pointer;}
.modal-cancel-btn:hover{color:var(--red);border-color:rgba(220,38,38,0.3);}
/* Action column in table */
.action-btn{display:inline-flex;align-items:center;gap:0.22rem;background:var(--black);color:#fff;border:none;padding:0.2rem 0.52rem;border-radius:5px;font-size:0.6rem;font-weight:700;cursor:pointer;white-space:nowrap;transition:all 0.15s;}
.action-btn:hover{background:#333;}
.closed-action-cell{display:flex;flex-direction:column;gap:2px;}
.closed-action-line{display:flex;align-items:center;gap:0.3rem;flex-wrap:wrap;}
.closed-cr{color:var(--green);font-weight:700;font-family:monospace;font-size:0.7rem;}
.closed-dr{color:var(--red);font-weight:700;font-family:monospace;font-size:0.7rem;}
.closed-dt{color:var(--text3);font-size:0.6rem;}
.reopen-btn{display:inline-flex;align-items:center;gap:0.2rem;background:transparent;color:var(--text3);border:1px solid var(--border);padding:0.1rem 0.38rem;border-radius:4px;font-size:0.58rem;font-weight:700;cursor:pointer;transition:all 0.15s;margin-top:1px;}
.reopen-btn:hover{color:var(--blue);border-color:rgba(37,99,235,0.3);background:var(--blue-bg);}

/* ── UPLOAD ── */
.upload-csv-btn{display:inline-flex;align-items:center;gap:0.35rem;background:var(--black);color:#fff;border:none;padding:0.26rem 0.72rem;border-radius:7px;font-size:0.65rem;font-weight:700;cursor:pointer;white-space:nowrap;}
.upload-csv-btn:hover{background:#333;}
.template-dl-btn{display:inline-flex;align-items:center;gap:0.3rem;background:transparent;color:var(--blue);border:1px solid rgba(37,99,235,0.3);padding:0.26rem 0.65rem;border-radius:7px;font-size:0.65rem;font-weight:700;cursor:pointer;white-space:nowrap;}
.template-dl-btn:hover{background:var(--blue-bg);}
.upload-panel{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);margin-bottom:0.75rem;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,0.06);}
.upload-panel-hdr{background:var(--black);padding:0.48rem 1rem;display:flex;align-items:center;justify-content:space-between;}
.upload-panel-title{font-size:0.7rem;font-weight:700;color:#fff;}
.upload-close-x{background:none;border:none;color:rgba(255,255,255,0.5);cursor:pointer;font-size:0.85rem;padding:0 0.2rem;line-height:1;}
.upload-close-x:hover{color:#fff;}
.upload-panel-body{padding:0.85rem 1rem;}

  if(p==='amit')return AD;if(p==='joint')return JD;
  if(p==='retirement'){if(s==='amit-roth')return AR;if(s==='lov-roth')return LR;if(s==='lov-trad')return LT;return[...AR,...LR,...LT];}
  return[];
}
function cs(data){
  const op=data.filter(r=>!isCl(r));
  const ci=data.reduce((s,r)=>s+(r.excelCost||0),0);
  const ig=data.filter(r=>r.excelType==='Short Put').reduce((s,r)=>s+(r.excelIncome||0),0);
  const tp=data.reduce((s,r)=>s+(r.excelProfit||0),0);
  const be=Math.max(0,ci-ig);
  const pct=ci>0?Math.min(100,Math.round((ig/ci)*100)):0;
  const realized=data.filter(r=>isCl(r)).reduce((s,r)=>s+(r.excelProfit||0),0);
  const unrealized=op.reduce((s,r)=>s+(r.excelProfit||0),0);
  const thisFri=getThisFriday();
  const twc=data.filter(r=>r.excelType==='Short Put'&&!isCl(r)&&!r.rolledOver&&r.expiryDate)
    .filter(r=>{try{return getFriday(new Date(r.expiryDate))<=thisFri;}catch{return false;}})
    .reduce((s,r)=>s+r.strike*100,0);
  const tc=data.reduce((s,r)=>s+collateral(r),0);
  return{n:data.length,op:op.length,cl:data.filter(r=>isCl(r)).length,gv:data.reduce((s,r)=>s+(r.excelGrossValue||0),0),tp,ci,ig,be,pct,realized,unrealized,twc,tc};
}
function getTickersFrom(data){return[...new Set(data.map(r=>r.ticker))].sort();}
function getAppliedFilters(data){
  const thisFri=getThisFriday();
  return data.filter(r=>{
    if(typeFilter!=='all'&&r.excelType!==typeFilter)return false;
    if(ocFilter==='open'&&isCl(r))return false;
    if(ocFilter==='closed'&&!isCl(r))return false;
    if(!selectedTickers.has('ALL')&&!selectedTickers.has(r.ticker))return false;
    if(expiringOnly){if(!r.expiryDate)return false;try{if(new Date(r.expiryDate)>thisFri)return false;}catch{return false;}}
    return true;
  }).sort((a,b)=>{
    let av=sc==='status'?(isCl(a)?1:0):a[sc],bv=sc==='status'?(isCl(b)?1:0):b[sc];
    if(typeof av==='string')av=av.toLowerCase();if(typeof bv==='string')bv=bv.toLowerCase();
    av=av==null?-Infinity:av;bv=bv==null?-Infinity:bv;
    return av<bv?-sd:av>bv?sd:0;
  });
}

  const filtered=getAppliedFilters(data);
  const typeTabs=['all','Short Put','Long Put','Long Call','Shares'].map(t=>'<button class="type-tab'+(typeFilter===t?' active':'')+'" data-typef="'+t+'">'+(t==='all'?'All':t)+'</button>').join('');
  const ocTabs=['all','open','closed'].map(o=>'<button class="oc-tab'+(ocFilter===o?' active':'')+'" data-ocf="'+o+'">'+(o==='all'?'All':o==='open'?'Open':'Closed')+'</button>').join('');

      else label='&#9940; Close';

    function ieCell(id,field,displayVal,inputType,wCls,style){
      if(editCell&&editCell.id===id&&editCell.field===field){
        return'<div class="ie-wrap"><input class="ie-input '+wCls+'" id="ie_'+id+'_'+field+'" type="'+(inputType||'text')+'" step="0.01" value="'+(positions.find(p=>p.id===id)[field]||'')+'" onkeydown="ieKey(event,\''+id+'\',\''+field+'\')" oninput="positions.find(p=>p.id===\''+id+'\')[\''+field+'\']=this.value"><button class="ie-ok" onclick="ieSave(\''+id+'\',\''+field+'\')">&#10003;</button><button class="ie-x" onclick="ieCancel()">&#10005;</button></div>';

  }).join('');
  return'<div class="controls-row"><div class="type-tabs">'+typeTabs+'</div><div class="oc-tabs">'+ocTabs+'</div><button class="expiry-pill'+(expiringOnly?' active':'')+'" id="exp-pill">&#9888; Expiring This Week</button><button class="del-all-btn" onclick="deleteAll()">&#128465; Delete Visible</button><button class="upload-csv-btn" onclick="toggleUpload()">&#8593; Upload CSV</button><button class="template-dl-btn" onclick="dlTemplate()">&#11015; Template</button><button class="add-pos-btn" onclick="openAddModal()">&#43; Add Position</button></div>'
    +rUploadPanel()
    +'<div class="table-wrap"><table><thead><tr><th>Ticker</th><th>Open Date</th><th>Cost</th><th>Income</th><th>Curr Val</th><th>Gross Val</th><th>Price</th><th>Type</th><th>Strike</th><th>Expiry</th><th>P&L</th><th>Collateral</th><th>Close / Action</th><th>Edit</th><th>Del</th></tr></thead><tbody>'+rows+'</tbody></table></div>';
}
// ── CLOSE / TRADE MODAL ───────────────────────────────────────────────────────
function openModal(id){
  const r=positions.find(p=>p.id===id);if(!r)return;
  const t=r.excelType;
  // Default action label by type
  let defAction='Close';
  if(t==='Short Put')defAction='BTC';        // Buy to Close
  else if(t==='Long Put'||t==='Long Call')defAction='STC';  // Sell to Close
  else if(t==='Shares')defAction='Sell';
  modal={id,action:defAction,cdType:'zero',amount:'',notes:''};
  renderModal();
}
function renderModal(){
  const m=modal;if(!m)return;
  const r=positions.find(p=>p.id===m.id);if(!r)return;
  const t=r.excelType;
  const isShares=t==='Shares';
  const isShortPut=t==='Short Put';
  const isLong=t==='Long Put'||t==='Long Call';
  const isZero=m.cdType==='zero';
  // Build action tabs based on type
  let actionTabs='';
  if(isShortPut){
    actionTabs='<button class="mat mat-close'+(m.action==='Close'?' active':'')+'" onclick="setMA(\'Close\')">&#9940; Expire</button>'
      +'<button class="mat mat-btc'+(m.action==='BTC'?' active':'')+'" onclick="setMA(\'BTC\')">&#8593; Buy to Close</button>';
  }else if(isLong){
    actionTabs='<button class="mat mat-stc'+(m.action==='STC'?' active':'')+'" onclick="setMA(\'STC\')">&#8595; Sell to Close</button>'
      +'<button class="mat mat-close'+(m.action==='Close'?' active':'')+'" onclick="setMA(\'Close\')">&#9940; Expire</button>';
  }else if(isShares){
    actionTabs='<button class="mat mat-sell'+(m.action==='Sell'?' active':'')+'" onclick="setMA(\'Sell\')">&#8595; Sell Shares</button>'
      +'<button class="mat mat-close'+(m.action==='Close'?' active':'')+'" onclick="setMA(\'Close\')">&#9940; Other</button>';
  }else{
    actionTabs='<button class="mat mat-close'+(m.action==='Close'?' active':'')+'" onclick="setMA(\'Close\')">&#9940; Close</button>'
      +'<button class="mat mat-btc'+(m.action==='BTC'?' active':'')+'" onclick="setMA(\'BTC\')">&#8593; Buy to Close</button>'
      +'<button class="mat mat-stc'+(m.action==='STC'?' active':'')+'" onclick="setMA(\'STC\')">&#8595; Sell to Close</button>';
  }
  // Value hint
  const hint=m.cdType==='credit'?'Net credit / proceeds received'
    :m.cdType==='debit'?'Net debit / cost paid'
    :'Zero cost — expired worthless or $0 transaction';
  // Confirm button colour
  const btnBg=m.action==='BTC'?'var(--green)':m.action==='STC'?'var(--blue)':m.action==='Sell'?'var(--orange)':'var(--black)';
  const btnLabel='Confirm '+({Close:'Close',BTC:'Buy to Close',STC:'Sell to Close',Sell:'Sell'}[m.action]||m.action);
  // Value type label prefix
  const pre=m.cdType==='credit'?'+$':m.cdType==='debit'?'-$':'$0';
  document.getElementById('modal-root').innerHTML=
    '<div class="modal-overlay" onclick="if(event.target===this)closeModal()">'
    +'<div class="modal-box">'
    +'<div class="modal-title">&#9940; Close / Trade Position</div>'
    +'<div class="modal-sub">Record how this position was closed</div>'
    +'<div class="modal-pos-info"><span class="tk-dot-sm" style="background:'+(DC[r.ticker]||'#888')+'"></span>'+r.ticker+' &nbsp;|&nbsp; '+r.excelType+(r.strike>0?' &nbsp;|&nbsp; $'+r.strike:'')+(r.expiryDate?' &nbsp;|&nbsp; '+r.expiryDate:'')+'</div>'
    +'<div class="modal-section-label">Action</div>'
    +'<div class="modal-action-tabs" style="margin-bottom:0.9rem;">'+actionTabs+'</div>'
    +'<div class="modal-section-label">Transaction Value</div>'
    +'<div class="modal-cd-tabs">'
    +'<button class="mct credit'+(m.cdType==='credit'?' active':'')+'" onclick="setCD(\'credit\')">+ Credit</button>'
    +'<button class="mct debit'+(m.cdType==='debit'?' active':'')+'" onclick="setCD(\'debit\')">− Debit</button>'
    +'<button class="mct zero'+(m.cdType==='zero'?' active':'')+'" onclick="setCD(\'zero\')">≈ Zero</button>'
    +'</div>'
    +'<div class="modal-amt-wrap">'
    +'<span class="modal-amt-pre" style="color:'+(m.cdType==='credit'?'var(--green)':m.cdType==='debit'?'var(--red)':'var(--text3)')+'">'+pre+'</span>'
    +'<input class="modal-amt-input" id="modal-amt" type="number" step="0.01" min="0" value="'+(isZero?'':m.amount)+'" placeholder="'+(isZero?'0 (auto)':'Enter amount')+'" '+(isZero?'disabled':'')+' oninput="modal.amount=this.value">'
    +'</div>'
    +'<div class="modal-hint">'+hint+'</div>'
    +'<div class="modal-notes-label">Notes (optional)</div>'
    +'<textarea class="modal-notes" rows="2" placeholder="e.g. Expired worthless, rolled to next week..." oninput="modal.notes=this.value">'+m.notes+'</textarea>'
    +'<div class="modal-btns">'
    +'<button class="modal-confirm" style="background:'+btnBg+';" onclick="confirmModal()">&#10003; '+btnLabel+'</button>'
    +'<button class="modal-cancel-btn" onclick="closeModal()">Cancel</button>'
    +'</div>'
    +'</div></div>';
}
function setMA(a){if(!modal)return;modal.action=a;renderModal();}
function setCD(t){if(!modal)return;modal.cdType=t;if(t==='zero')modal.amount='';renderModal();}
function confirmModal(){
  if(!modal)return;
  const r=positions.find(p=>p.id===modal.id);if(!r)return;
  const amt=modal.cdType==='zero'?0:parseFloat(modal.amount)||0;
  const signed=modal.cdType==='credit'?amt:modal.cdType==='debit'?-amt:0;
  r.closed=true;
  r.closeAction={action:modal.action,type:modal.cdType,amount:amt,signedAmount:signed,notes:modal.notes,
    date:new Date().toLocaleDateString('en-US',{month:'numeric',day:'numeric',year:'2-digit'})};
  if(modal.cdType!=='zero'&&amt>0)r.excelProfit=(r.excelIncome||0)+signed;
  closeModal();rMain();
}
function reopenPosition(id){
  if(!confirm('Reopen this position? The close action will be undone.'))return;
  const r=positions.find(p=>p.id===id);if(!r)return;
  r.closed=false;r.closeAction=null;
  if(r.excelIncome)r.excelProfit=r.excelIncome;
  rMain();
}
function closeModal(){modal=null;document.getElementById('modal-root').innerHTML='';}

function parseCSV(text){
  const lines=text.trim().split(/\r?\n/);if(lines.length<2)return{error:'Need header + at least 1 row.'};
  const headers=lines[0].split(',').map(h=>h.trim().toLowerCase().replace(/[^a-z0-9]/g,''));
  const rows=[];for(let i=1;i<lines.length;i++){if(!lines[i].trim())continue;const vals=lines[i].split(',').map(v=>v.trim().replace(/^"|"$/g,''));const row={};headers.forEach((h,idx)=>row[h]=vals[idx]||'');rows.push(row);}
  const hmap={ticker:['ticker','symbol'],type:['type','optiontype','kind'],strike:['strike','strikeprice'],expirydate:['expirydate','expiry','expiration'],contracts:['contracts','qty','quantity','shares']};
  const colMap={};const missing=[];
  Object.entries(hmap).forEach(([req,aliases])=>{const f=aliases.find(a=>headers.includes(a));if(f)colMap[req]=f;else missing.push(req);});
  if(missing.length)return{error:'Missing columns: '+missing.join(', ')};
  return{rows,colMap};
}
function mapCSVRow(raw,colMap,idx){
  const rawType=(raw[colMap.type]||'').toLowerCase().trim();
  let excelType='';
  if(rawType.includes('short')&&rawType.includes('put'))excelType='Short Put';
  else if(rawType.includes('long')&&rawType.includes('put'))excelType='Long Put';
  else if(rawType.includes('long')&&rawType.includes('call'))excelType='Long Call';
  else if(rawType.includes('share')||rawType.includes('stock'))excelType='Shares';
  else if(rawType==='put')excelType='Long Put';
  else if(rawType==='call')excelType='Long Call';
  else excelType='Unknown';
  const ticker=(raw[colMap.ticker]||'').toUpperCase().trim();
  if(!ticker)return{error:'Row '+(idx+1)+': empty ticker'};
  if(excelType==='Unknown')return{error:'Row '+(idx+1)+': unknown type "'+raw[colMap.type]+'"'};
  const strike=parseFloat(raw[colMap.strike])||0;
  const cost=parseFloat(raw['cost']||raw['costbasis'])||0;
  const income=parseFloat(raw['income']||raw['premium'])||0;
  const grossValue=parseFloat(raw['grossvalue'])||0;
  const currentValue=parseFloat(raw['currentvalue'])||0;
  const profit=parseFloat(raw['profit']||raw['pnl'])||0;
  const cl=(raw['closed']||'').toLowerCase();
  const closed=cl==='true'||cl==='yes'||cl==='1'||cl==='closed';
  const uid=Math.random().toString(36).slice(2,10);
  return{id:uid,ticker,strike,contracts:parseInt(raw[colMap.contracts])||1,expiryDate:raw[colMap.expirydate]||'',openDate:raw['opendate']||'',excelType,excelCost:cost,excelIncome:income,excelGrossValue:grossValue||cost,excelCurrentValue:currentValue||grossValue||cost,excelProfit:profit,closed,rolledOver:false,closeAction:null,manualPrice:null};
}
function processCSV(text){
  const p=parseCSV(text);if(p.error)return{error:p.error};
  const{rows,colMap}=p;const mapped=[],errors=[];
  rows.forEach((raw,i)=>{const r=mapCSVRow(raw,colMap,i);if(r.error)errors.push(r.error);else mapped.push(r);});
  return{rows:mapped,errors};
}
function handleFile(file){
  if(!file||!file.name.endsWith('.csv')){importMsg={ok:false,text:'Please upload a .csv file'};rMain();return;}

  reader.readAsText(file);
}

// ── SPREADS / RISK VIEW ────────────────────────────────────────────────────────
function parseDate(s){if(!s)return null;try{const d=new Date(s);return isNaN(d)?null:d;}catch{return null;}}

function buildSpreadPairs(data){
  const pool=(spreadsOcFilter==='open'?data.filter(r=>!isCl(r)):spreadsOcFilter==='closed'?data.filter(r=>isCl(r)):data)
    .filter(r=>selectedTickers.has('ALL')||selectedTickers.has(r.ticker));
  const tickers=[...new Set(pool.map(r=>r.ticker))].sort();
  const result=[];
  tickers.forEach(ticker=>{
    const sps=pool.filter(r=>r.ticker===ticker&&r.excelType==='Short Put')
      .sort((a,b)=>(parseDate(a.expiryDate)||0)-(parseDate(b.expiryDate)||0));
    const lps=pool.filter(r=>r.ticker===ticker&&r.excelType==='Long Put')
      .sort((a,b)=>(parseDate(a.expiryDate)||0)-(parseDate(b.expiryDate)||0));
    if(!sps.length&&!lps.length)return;
    const usedLPs=new Set();
    const pairs=sps.map(sp=>{
      const spDate=parseDate(sp.expiryDate);
      const candidates=lps.filter(lp=>!usedLPs.has(lp.id)&&(!spDate||!parseDate(lp.expiryDate)||parseDate(lp.expiryDate)>=spDate));
      candidates.sort((a,b)=>(parseDate(a.expiryDate)||0)-(parseDate(b.expiryDate)||0));
      const matched=candidates[0]||null;
      if(matched)usedLPs.add(matched.id);
      return{sp,lp:matched};
    });
    const independentLPs=lps.filter(lp=>!usedLPs.has(lp.id));
    result.push({ticker,pairs,independentLPs});
  });
  return result;
}

function calcSpreadCol(sp,lp){
  // Formula: (SP strike - LP strike) * 100
  // No LP (naked): SP strike * 100
  if(!sp)return 0;
  if(!lp)return sp.strike*100;
  return(sp.strike-lp.strike)*100;
}

function rSpreadsView(data){
  const groups=buildSpreadPairs(data);
  const hasSomething=groups.some(g=>g.pairs.length>0||g.independentLPs.length>0);
  if(!hasSomething)return'<div class="ph"><strong>No put positions found</strong>Short puts and long puts will appear here paired by expiry.</div>';

  // Totals — per-ticker sum floored at 0, then aggregated
  let totalNaked=0,totalSpread=0;
  const tickerNetMap={};
  groups.forEach(({ticker,pairs})=>{
    let tNaked=0,tSpread=0;
    pairs.forEach(({sp,lp})=>{
      const c=calcSpreadCol(sp,lp);
      if(lp)tSpread+=c;
      else tNaked+=c;
    });
    const tickerNet=Math.max(0,tNaked+tSpread); // floor at 0 per ticker
    tickerNetMap[ticker]=tickerNet;
    // track naked vs spread contribution (for banner display)
    const nakedContrib=Math.max(0,tNaked);
    const spreadContrib=Math.max(0,tSpread);
    totalNaked+=nakedContrib;
    totalSpread+=spreadContrib;
  });
  const total=Object.values(tickerNetMap).reduce((s,v)=>s+v,0);

  // Filter bar
  const socTabs=['all','open','closed'].map(o=>'<button class="soc-tab'+(spreadsOcFilter===o?' active':'')+'" data-soc="'+o+'">'+(o==='all'?'All':o==='open'?'Open':'Closed')+'</button>').join('');
  const tickers=getTickersFrom(data);
  const allSel=selectedTickers.has('ALL');
  const selList=allSel?[]:tickers.filter(t=>selectedTickers.has(t));
  const ddItems=tickers.map(t=>{const sel=allSel||selectedTickers.has(t);return'<div class="ticker-dd-item'+(sel?' selected':'')+'" data-ddticker="'+t+'"><div class="ticker-dd-check">'+(sel?'&#10003;':'')+'</div><span class="dd-dot" style="background:'+(DC[t]||'#888')+'"></span>'+t+'</div>';}).join('');
  const tags=allSel?'<span style="color:var(--text3);font-size:0.7rem;">All Tickers</span>':selList.map(t=>'<span class="sel-tag"><span style="width:6px;height:6px;border-radius:50%;background:'+(DC[t]||'#888')+';display:inline-block;flex-shrink:0;"></span>'+t+'<span class="sel-tag-x" data-xticker="'+t+'">&#10005;</span></span>').join('');
  const sFilterBar='<div class="spreads-filter-bar"><span class="filter-bar-label">&#127991; Ticker</span><div class="ticker-select-wrap" id="tkwrap"><div class="ticker-select-btn" id="tkbtn" onclick="toggleDropdown()"><div class="sel-tags">'+tags+'</div><span style="color:var(--text3);font-size:0.65rem;">&#9660;</span></div><div class="ticker-dropdown'+(dropdownOpen?' open':'')+'" id="tkdrop"><div class="ticker-dd-item'+(allSel?' selected':'')+'" data-ddticker="ALL"><div class="ticker-dd-check">'+(allSel?'&#10003;':'')+'</div><span style="font-size:0.72rem;font-weight:700;">All Tickers</span></div><div style="height:1px;background:var(--border);margin:0.25rem 0;"></div>'+ddItems+'</div></div><div class="soc-tabs">'+socTabs+'</div></div>';

  // Banner
  const banner='<div class="total-collat-banner"><div><div class="tcb-label">&#128274; Total Net Collateral Required</div><div class="tcb-val">$'+total.toLocaleString()+'</div><div class="tcb-sub">(SP−LP)×100 per pair &nbsp;·&nbsp; floored at $0 per ticker</div></div><div class="tcb-breakdown"><div class="tcb-item"><div class="tcb-item-val" style="color:var(--red2);">$'+totalNaked.toLocaleString()+'</div><div class="tcb-item-label">Naked SP</div></div><div class="tcb-item"><div class="tcb-item-val" style="color:var(--purple);">$'+totalSpread.toLocaleString()+'</div><div class="tcb-item-label">Spread Risk</div></div></div></div>';

  // Table rows
  const rows=groups.filter(g=>g.pairs.length>0||g.independentLPs.length>0).flatMap(({ticker,pairs,independentLPs})=>{
    const tickerNet=tickerNetMap[ticker]||0;
    const pairRows=pairs.map(({sp,lp},idx)=>{
      const c=calcSpreadCol(sp,lp);
      const isNaked=!lp;
      const formula=isNaked?'SP×100':'(SP−LP)×100';
      // Row-level: show actual value (can be negative for over-hedged rows)
      const rowNegative=c<0;
      const cColor=isNaked?'var(--red)':rowNegative?'var(--green)':'var(--purple)';
      const cDisplay=rowNegative?'<span style="color:var(--green);font-size:0.62rem;">−$'+Math.abs(c).toLocaleString()+' <span style="color:var(--text3);font-weight:400;">(over-hedged)</span></span>':'$'+c.toLocaleString();
      const badge=isNaked?'<span class="badge-naked">Naked</span>':'<span class="badge-spread">Spread</span>';
      const diffExp=lp&&lp.expiryDate&&sp.expiryDate&&lp.expiryDate!==sp.expiryDate;
      // Show ticker net total on last pair row of this ticker (after indep rows)
      const isLastPair=idx===pairs.length-1&&independentLPs.length===0;
      const tickerTotalCell=isLastPair
        ?'<td class="mn" style="color:var(--orange);font-weight:800;border-top:1px solid var(--border2);">Net: $'+tickerNet.toLocaleString()+'</td>'
        :'<td></td>';
      return'<tr>'
        +'<td>'+badge+'</td>'
        +'<td class="mc"><span class="chip"><span class="tk-dot-sm" style="background:'+(DC[ticker]||'#888')+'"></span>'+ticker+'</span></td>'
        +'<td class="mn" style="color:var(--red);font-weight:700;">$'+sp.strike+'</td>'
        +'<td class="mn '+ec(sp.expiryDate)+'">'+(sp.expiryDate||'--')+'</td>'
        +'<td class="mn" style="color:var(--green);">'+(sp.excelIncome?'+$'+sp.excelIncome.toLocaleString():'--')+'</td>'
        +'<td class="div-col">&#8596;</td>'
        +'<td class="mn" style="color:var(--blue);font-weight:700;">'+(lp?'$'+lp.strike:'<span class="empty">—</span>')+'</td>'
        +'<td class="mn '+(lp?ec(lp.expiryDate):'')+(diffExp?' em':'')+'">'+(lp?lp.expiryDate+(diffExp?' &#9432;':''):'<span class="empty">—</span>')+'</td>'
        +'<td class="mn" style="color:var(--red);">'+(lp&&lp.excelCost?'-$'+lp.excelCost.toLocaleString():'<span class="empty">—</span>')+'</td>'
        +'<td class="mn" style="color:'+cColor+';font-weight:800;">'+cDisplay+'</td>'
        +'<td style="font-size:0.62rem;color:var(--text3);font-family:monospace;">'+formula+'</td>'
        +'</tr>';
    });

    const indepRows=independentLPs.map((lp,idx)=>{
      const isLast=idx===independentLPs.length-1;
      const tickerTotalCell=isLast
        ?'<td class="mn" style="color:var(--orange);font-weight:800;border-top:1px solid var(--border2);">Net: $'+tickerNet.toLocaleString()+'</td>'
        :'<td></td>';
      return'<tr class="indep-row">'
        +'<td><span class="badge-indep">Indep LP</span></td>'
        +'<td class="mc"><span class="chip"><span class="tk-dot-sm" style="background:'+(DC[ticker]||'#888')+'"></span>'+ticker+'</span></td>'
        +'<td colspan="3" class="empty" style="color:var(--text3);font-style:italic;">No short put paired</td>'
        +'<td class="div-col">&#8596;</td>'
        +'<td class="mn" style="color:var(--blue);font-weight:700;">$'+lp.strike+'</td>'
        +'<td class="mn '+ec(lp.expiryDate)+'">'+(lp.expiryDate||'--')+'</td>'
        +'<td class="mn" style="color:var(--red);">'+(lp.excelCost?'-$'+lp.excelCost.toLocaleString():'--')+'</td>'
        +'<td class="mn" style="color:var(--text3);">—</td>'
        +'<td style="font-size:0.62rem;color:var(--text3);">standalone</td>'
        +'</tr>';
    });

    return[...pairRows,...indepRows];
  });

  const table='<div class="st-wrap"><table>'
    +'<thead><tr>'
    +'<th>Type</th><th>Ticker</th>'
    +'<th class="sp-hdr">SP Strike</th><th class="sp-hdr">SP Expiry</th><th class="sp-hdr">SP Income</th>'
    +'<th class="div-hdr"></th>'
    +'<th class="lp-hdr">LP Strike</th><th class="lp-hdr">LP Expiry</th><th class="lp-hdr">LP Cost</th>'
    +'<th class="col-hdr">Collateral (SP−LP)×100</th><th class="col-hdr">Formula</th>'
    +'</tr></thead>'
    +'<tbody>'+rows.join('')+'</tbody>'
    +'</table></div>';

  return sFilterBar+banner+table;
}

function rMain(){
  const el=document.getElementById('mc');
  const data=gd(ap,as);
  const dispData=selectedTickers.has('ALL')?data:data.filter(r=>selectedTickers.has(r.ticker));
  const s=cs(dispData);
  if(activeView==='spreads'){
    el.innerHTML=rSum(s)+rSpreadsView(data);
  }else{
    el.innerHTML=data.length===0
      ?rFilterBar([])+rSum(s)+'<div class="ph"><strong>'+ap+' Portfolio</strong>No positions yet.</div>'
      :rFilterBar(data)+rSum(s)+rTable(data);
  }
  attachEvents();
}
function attachEvents(){
  document.querySelectorAll('.ticker-dd-item').forEach(item=>{
    item.addEventListener('click',e=>{
      e.stopPropagation();const t=item.dataset.ddticker;
      if(t==='ALL'){selectedTickers=new Set(['ALL']);}
      else{selectedTickers.delete('ALL');if(selectedTickers.has(t))selectedTickers.delete(t);else selectedTickers.add(t);if(selectedTickers.size===0)selectedTickers=new Set(['ALL']);}
      rMain();setTimeout(()=>{const d=document.getElementById('tkdrop');if(d){d.classList.add('open');dropdownOpen=true;}},10);
    });
  });
  document.querySelectorAll('.sel-tag-x').forEach(x=>{x.addEventListener('click',e=>{e.stopPropagation();selectedTickers.delete(x.dataset.xticker);if(selectedTickers.size===0)selectedTickers=new Set(['ALL']);rMain();});});
  document.querySelectorAll('.type-tab').forEach(b=>b.addEventListener('click',()=>{typeFilter=b.dataset.typef;rMain();}));
  document.querySelectorAll('.oc-tab').forEach(b=>b.addEventListener('click',()=>{ocFilter=b.dataset.ocf;rMain();}));
  document.querySelectorAll('.soc-tab').forEach(b=>b.addEventListener('click',()=>{spreadsOcFilter=b.dataset.soc;rMain();}));
  const ep=document.getElementById('exp-pill');if(ep)ep.addEventListener('click',()=>{expiringOnly=!expiringOnly;rMain();});
  attachUploadEvents();
}
function toggleDropdown(){dropdownOpen=!dropdownOpen;const d=document.getElementById('tkdrop');if(d)d.classList.toggle('open',dropdownOpen);}
document.addEventListener('click',e=>{if(!e.target.closest('#tkwrap')){dropdownOpen=false;const d=document.getElementById('tkdrop');if(d)d.classList.remove('open');}});
function startEdit(id){editingPrice=id;rMain();setTimeout(()=>{const inp=document.getElementById('pi_'+id);if(inp){inp.focus();inp.select();}},50);}
function savePrice(id){const inp=document.getElementById('pi_'+id);if(inp){const v=parseFloat(inp.value);const r=positions.find(p=>p.id===id);if(r&&!isNaN(v))r.manualPrice=v;}editingPrice=null;rMain();}
// Inline field editing
function ieStart(id,field){editCell={id,field};rMain();setTimeout(()=>{const inp=document.getElementById('ie_'+id+'_'+field);if(inp){inp.focus();inp.select();}},30);}
function ieSave(id,field){
  const inp=document.getElementById('ie_'+id+'_'+field);
  if(inp){const r=positions.find(p=>p.id===id);if(r){const v=inp.value;r[field]=isNaN(parseFloat(v))||v===''?v:parseFloat(v);}}
  editCell=null;rMain();
}
function ieCancel(){editCell=null;rMain();}
function ieKey(e,id,field){if(e.key==='Enter')ieSave(id,field);if(e.key==='Escape')ieCancel();}
function markRoll(id){const r=positions.find(p=>p.id===id);if(r)r.rolledOver=true;rMain();}
function undoRoll(id){const r=positions.find(p=>p.id===id);if(r)r.rolledOver=false;rMain();}
function deleteRow(id){if(confirm('Delete this position?')){positions=positions.filter(p=>p.id!==id);rMain();}}
function deleteAll(){const data=gd(ap,as);const visible=getAppliedFilters(data).map(r=>r.id);if(!visible.length)return;if(confirm('Delete '+visible.length+' positions?')){positions=positions.filter(p=>!visible.includes(p.id));rMain();}}
function rBc(){
  const el=document.getElementById('bc');
  const sl={'ret-all':'All Retirement','amit-roth':'Amit - Roth IRA','lov-roth':'Lovelina - Roth IRA','lov-trad':'Lovelina - Traditional IRA'};
  const pl={all:'All Portfolios',amit:'Amit',lovelina:'Lovelina',joint:'Joint',retirement:'Retirement'};
  if(ap==='all')el.innerHTML='<span>All Portfolios</span>';
  else if(ap==='retirement')el.innerHTML='<span style="color:var(--text3)">All</span> &rsaquo; <span style="color:var(--text3)">Retirement</span> &rsaquo; <span style="color:var(--red)">'+sl[as]+'</span>';
  else el.innerHTML='<span style="color:var(--text3)">All</span> &rsaquo; <span style="color:var(--red)">'+pl[ap]+'</span>';
}
document.getElementById('view-nav').addEventListener('click',e=>{
  const t=e.target.closest('.view-tab');if(!t)return;
  activeView=t.dataset.view;
  document.querySelectorAll('.view-tab').forEach(v=>v.classList.toggle('active',v.dataset.view===activeView));
  rMain();
});
function sPort(p){
  ap=p;typeFilter='all';ocFilter='all';expiringOnly=false;selectedTickers=new Set(['ALL']);
  showUpload=false;csvPreview=null;importMsg='';editCell=null;
  document.querySelectorAll('.port-tab').forEach(t=>t.classList.toggle('active',t.dataset.port===p));
  const sn=document.getElementById('sub-nav');sn.style.display=p==='retirement'?'flex':'none';
  if(p==='retirement'){as='ret-all';document.querySelectorAll('.sub-tab').forEach(t=>t.classList.toggle('active',t.dataset.sub===as));}
  rBc();rMain();
}
document.getElementById('port-nav').addEventListener('click',e=>{const t=e.target.closest('.port-tab');if(t)sPort(t.dataset.port);});
document.getElementById('sub-nav').addEventListener('click',e=>{const t=e.target.closest('.sub-tab');if(!t)return;as=t.dataset.sub;document.querySelectorAll('.sub-tab').forEach(s=>s.classList.toggle('active',s.dataset.sub===as));rBc();rMain();});
document.getElementById('topbar-date').textContent=new Date().toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'});
window.sPort=sPort;window.startEdit=startEdit;window.savePrice=savePrice;window.markRoll=markRoll;window.undoRoll=undoRoll;window.deleteRow=deleteRow;window.deleteAll=deleteAll;window.toggleDropdown=toggleDropdown;window.openModal=openModal;window.closeModal=closeModal;window.confirmModal=confirmModal;window.reopenPosition=reopenPosition;window.setMA=setMA;window.setCD=setCD;window.toggleUpload=toggleUpload;window.cancelUpload=cancelUpload;window.dlTemplate=dlTemplate;window.doImport=doImport;window.openAddModal=openAddModal;window.closeAddModal=closeAddModal;window.saveAddModal=saveAddModal;window.setAF=setAF;window.ieStart=ieStart;window.ieSave=ieSave;window.ieCancel=ieCancel;window.ieKey=ieKey;window.openEditModal=openEditModal;
rBc();rMain();
</script>
</body>
</html>
