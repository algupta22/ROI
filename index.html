// ── CSV IMPORT ────────────────────────────────────────────────────────────────
function handleCSVUpload(event) {
  var file = event.target.files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(e) {
    var text = e.target.result;
    var result = parseRobinhoodCSV(text);
    // Reset file input so same file can be re-uploaded
    document.getElementById('csv-upload').value = '';
    if (result.errors.length && !result.imported) {
      alert('Could not parse CSV:\n' + result.errors.join('\n'));
      return;
    }
    showImportPreview(result);
  };
  reader.readAsText(file);
}

function parseRobinhoodCSV(text) {
  var lines = text.split(/\r?\n/).filter(function(l){ return l.trim(); });
  if (!lines.length) return { rows: [], errors: ['Empty file'] };

  // Auto-detect delimiter: tab or comma
  var delimiter = lines[0].indexOf('\t') > -1 ? '\t' : ',';

  // Parse header
  var headers = (delimiter === '\t' ? lines[0].split('\t') : splitCSVLine(lines[0])).map(function(h){ return h.trim().toLowerCase().replace(/\s+/g,'_'); });
  var idx = {
    activityDate: headers.indexOf('activity_date'),
    instrument:   headers.indexOf('instrument'),
    description:  headers.indexOf('description'),
    transCode:    headers.indexOf('trans_code'),
    quantity:     headers.indexOf('quantity'),
    price:        headers.indexOf('price'),
    amount:       headers.indexOf('amount')
  };

  var rows = [], errors = [], skipped = 0;

  for (var i = 1; i < lines.length; i++) {
    var cols = delimiter === '\t' ? lines[i].split('\t').map(function(c){return c.trim();}) : splitCSVLine(lines[i]);
    if (cols.length < 4) { skipped++; continue; }

    var transCode = (cols[idx.transCode] || '').trim().toUpperCase();
    // Process BTO, STO, STC, BTC
    if (transCode !== 'BTO' && transCode !== 'STO' && transCode !== 'STC' && transCode !== 'BTC') { skipped++; continue; }

    var desc        = (cols[idx.description] || '').trim();
    var actDate     = (cols[idx.activityDate] || '').trim();
    var ticker      = (cols[idx.instrument] || '').trim().toUpperCase();
    var quantity    = Math.abs(parseFloat(cols[idx.quantity]) || 1);
    var price       = Math.abs(parseFloat((cols[idx.price]||'').replace(/[$,()]/g,'')) || 0);
    var amount      = parseAmount(cols[idx.amount] || '');

    // Parse description: e.g. "HOOD 4/24/2026 Put $69.00"
    var parsed = parseOptionDescription(desc);
    if (!parsed) { errors.push('Row ' + (i+1) + ': could not parse description "' + desc + '"'); skipped++; continue; }

    // Derive ticker from instrument, fallback to description ticker
    if (!ticker) ticker = parsed.ticker;

    // Map trans code + option type to position type
    var posType;
    if (transCode === 'BTO') {
      posType = parsed.optionType === 'put' ? 'LPUT' : 'LCALL';
    } else if (transCode === 'STO') {
      posType = parsed.optionType === 'put' ? 'SPUT' : 'SCALL';
    } else if (transCode === 'STC') {
      posType = 'STC'; // closing a long — credit received
    } else if (transCode === 'BTC') {
      posType = 'BTC'; // closing a short — debit paid
    }

    // Use actual transaction amount (includes fees/commissions)
    var totalPremium = Math.abs(amount) > 0 ? Math.abs(amount) : Math.abs(price) * 100 * quantity;
    var premiumPerContract = quantity > 0 ? totalPremium / (quantity * 100) : Math.abs(price);

    rows.push({
      ticker:      ticker,
      posType:     posType,
      optionType:  parsed.optionType,
      strike:      parsed.strike,
      expiry:      parsed.expiry,
      openDate:    actDate,
      contracts:   quantity,
      premium:     premiumPerContract,
      totalPremium: totalPremium,
      amount:      amount,
      transCode:   transCode,
      rawDesc:     desc
    });
  }

  return { rows: rows, errors: errors, skipped: skipped, imported: rows.length > 0 };
}

function parseOptionDescription(desc) {
  // Format: "HOOD 4/24/2026 Put $69.00" or "INTC 5/15/2026 Call $67.50"
  var m = desc.match(/^(\S+)\s+(\d{1,2}\/\d{1,2}\/\d{2,4})\s+(Put|Call)\s+\$?([\d.]+)/i);
  if (!m) return null;
  return {
    ticker:     m[1].toUpperCase(),
    expiry:     m[2],
    optionType: m[3].toLowerCase(),
    strike:     parseFloat(m[4])
  };
}

function splitCSVLine(line) {
  var result = [], cur = '', inQ = false, inParen = false;
  for (var i = 0; i < line.length; i++) {
    var c = line[i];
    if (c === '"') { inQ = !inQ; }
    else if (c === '(' && !inQ) { inParen = true; cur += c; }
    else if (c === ')' && !inQ) { inParen = false; cur += c; }
    else if (c === ',' && !inQ && !inParen) { result.push(cur.trim()); cur = ''; }
    else { cur += c; }
  }
  result.push(cur.trim());
  return result;
}

function parseAmount(str) {
  if (!str) return 0;
  str = str.trim();
  // Parentheses = negative: ($590.04) or ($1,620.04)
  var neg = /^\(.*\)$/.test(str);
  var n = parseFloat(str.replace(/[($,)]/g, '')) || 0;
  return neg ? -n : n;
}

function showImportPreview(result) {
  if (!result.rows.length) {
    alert('No BTO/STO option rows found in CSV.' + (result.skipped ? ' (' + result.skipped + ' rows skipped)' : ''));
    return;
  }

  var typeColors = { LPUT:'#2563EB', SPUT:'#059669', LCALL:'#7C3AED', SCALL:'#EA580C', STC:'#059669', BTC:'#DC2626' };
  var typeBg    = { LPUT:'#EFF6FF', SPUT:'#ECFDF5', LCALL:'#F5F3FF', SCALL:'#FFF7ED', STC:'#ECFDF5', BTC:'#FEF2F2' };

  var rows = result.rows.map(function(r, i) {
    var c = typeColors[r.posType] || '#111';
    var bg = typeBg[r.posType] || '#fff';
    var isSTC = r.posType === 'STC', isBTC = r.posType === 'BTC';
    var amtColor = (r.transCode==='STO'||isSTC) ? '#059669' : '#DC2626';
    var amtSign  = (r.transCode==='STO'||isSTC) ? '+' : '-';
    return '<tr>' +
      '<td><input type="checkbox" class="csv-row-chk" data-idx="' + i + '" checked style="accent-color:var(--green);"></td>' +
      '<td style="font-weight:700;">' + r.ticker + '</td>' +
      '<td><span style="background:' + bg + ';color:' + c + ';border:1px solid ' + c + '33;border-radius:4px;padding:0.08rem 0.38rem;font-size:0.62rem;font-weight:700;">' + r.posType + '</span></td>' +
      '<td>$' + r.strike + '</td>' +
      '<td>' + r.expiry + '</td>' +
      '<td>' + r.contracts + '</td>' +
      '<td style="color:' + amtColor + ';font-weight:700;">' + amtSign + '$' + (r.totalPremium).toFixed(2) + '</td>' +
      '<td style="color:#888;font-size:0.62rem;">' + r.openDate + '</td>' +
    '</tr>';
  }).join('');

  var warnHtml = result.errors.length
    ? '<div style="background:#FEF9C3;border:1px solid #FDE68A;border-radius:6px;padding:0.4rem 0.7rem;font-size:0.62rem;color:#92400E;margin-bottom:0.6rem;">&#9888; ' + result.errors.length + ' row(s) skipped: ' + result.errors.slice(0,3).join('; ') + (result.errors.length>3?' …':'') + '</div>'
    : '';

  document.getElementById('modal-root').innerHTML =
    '<div class="modal-overlay" onclick="if(event.target===this)closeModal()">' +
    '<div class="modal-box" style="width:660px;max-width:96vw;max-height:88vh;display:flex;flex-direction:column;padding:0;overflow:hidden;">' +
      '<div style="padding:1.25rem 1.5rem 0.75rem;flex-shrink:0;">' +
        '<div class="modal-title">&#8613; Import CSV — Preview</div>' +
        '<div class="modal-sub" style="margin-bottom:' + (warnHtml ? '0.5rem' : '0') + ';">' + result.rows.length + ' option rows found · uncheck any to skip · ' + (result.skipped||0) + ' non-option rows ignored</div>' +
        warnHtml +
      '</div>' +
      '<div style="overflow:auto;flex:1;padding:0 1.5rem;">' +
      '<table style="width:100%;border-collapse:collapse;font-size:0.7rem;">' +
        '<thead style="background:var(--bg4);position:sticky;top:0;z-index:1;">' +
          '<tr>' +
            '<th style="padding:0.35rem 0.5rem;text-align:left;"><input type="checkbox" id="csv-chk-all" checked onchange="toggleAllCsvRows(this)" style="accent-color:var(--green);"></th>' +
            '<th style="padding:0.35rem 0.5rem;text-align:left;">Ticker</th>' +
            '<th style="padding:0.35rem 0.5rem;text-align:left;">Type</th>' +
            '<th style="padding:0.35rem 0.5rem;text-align:left;">Strike</th>' +
            '<th style="padding:0.35rem 0.5rem;text-align:left;">Expiry</th>' +
            '<th style="padding:0.35rem 0.5rem;text-align:left;">#</th>' +
            '<th style="padding:0.35rem 0.5rem;text-align:left;">Premium</th>' +
            '<th style="padding:0.35rem 0.5rem;text-align:left;">Opened</th>' +
          '</tr>' +
        '</thead>' +
        '<tbody>' + rows + '</tbody>' +
      '</table></div>' +
      '<div class="modal-btns" style="padding:0.85rem 1.5rem;border-top:1px solid var(--border);flex-shrink:0;background:#fff;">' +
        '<button class="modal-cancel" onclick="closeModal()">Cancel</button>' +
        '<button class="modal-confirm green-btn" onclick="commitCSVImport()">&#8593; Import Selected</button>' +
      '</div>' +
    '</div></div>';

  // Store rows on window for commitCSVImport
  window._csvImportRows = result.rows;
}

function toggleAllCsvRows(chk) {
  document.querySelectorAll('.csv-row-chk').forEach(function(c){ c.checked = chk.checked; });
}

function commitCSVImport() {
  var rows = window._csvImportRows || [];
  var checked = [];
  document.querySelectorAll('.csv-row-chk').forEach(function(c){
    if (c.checked) checked.push(parseInt(c.dataset.idx));
  });

  var imported = 0;
  checked.forEach(function(i) {
    var r = rows[i];
    if (!r) return;

    if (r.posType === 'LPUT') {
      // Each BTO long put = its own ladder (dedup: same ticker+strike+expiry+openDate)
      var l = ladders.find(function(x){
        return x.ticker === r.ticker && !x.noLongPut &&
               x.longStrike == r.strike && x.longExpiry === r.expiry &&
               x.openDate === r.openDate;
      });
      if (!l) {
        l = { id: uid(), ticker: r.ticker, contracts: r.contracts, longStrike: r.strike, longPremium: r.premium, longExpiry: r.expiry, openDate: r.openDate, notes: '', position: null, noLongPut: false, shortPuts: [], closed: false };
        ladders.unshift(l);
        expandedIds.add(l.id);
      }
    } else if (r.posType === 'SPUT') {
      // Short put → find the ladder with the CLOSEST long put expiry >= sp.expiry
      var spExpDt = normExpiry(r.expiry);
      var bestTarget = null, bestDiff = Infinity;
      ladders.forEach(function(x) {
        if (x.ticker !== r.ticker || x.closed) return;
        if (x.noLongPut) { if (!bestTarget) bestTarget = x; return; }
        var lpDt = normExpiry(x.longExpiry);
        if (lpDt && spExpDt && lpDt >= spExpDt) {
          var diff = lpDt - spExpDt;
          if (diff < bestDiff) { bestDiff = diff; bestTarget = x; }
        }
      });
      if (!bestTarget) {
        // fallback: any open ladder for this ticker
        bestTarget = ladders.find(function(x){ return x.ticker === r.ticker && !x.closed; });
      }
      if (!bestTarget) {
        bestTarget = { id: uid(), ticker: r.ticker, contracts: r.contracts, longStrike: null, longPremium: null, longExpiry: null, openDate: r.openDate, notes: '', position: null, noLongPut: true, shortPuts: [], closed: false };
        ladders.unshift(bestTarget);
        expandedIds.add(bestTarget.id);
      }
      var dup = (bestTarget.shortPuts||[]).find(function(sp){
        return sp.strike == r.strike && sp.expiry === r.expiry && sp.openDate === r.openDate;
      });
      if (!dup) {
        var sp = { id: uid(), strike: r.strike, contracts: r.contracts, received: r.totalPremium, expiry: r.expiry, openDate: r.openDate, closed: false };
        bestTarget.shortPuts.push(sp);
      }
    } else if (r.posType === 'STC') {
      // STC = Sell To Close a Long Put → credit to LP's longCloseAmount
      var stcDate = r.openDate;
      var stcBest = null, stcBestDiff = Infinity;
      ladders.forEach(function(x) {
        if (x.ticker !== r.ticker || x.noLongPut) return;
        if (x.longStrike == r.strike) {
          var d = Math.abs((new Date(x.openDate||0)) - (new Date(stcDate||0)));
          if (d < stcBestDiff) { stcBestDiff = d; stcBest = x; }
        }
      });
      if (!stcBest) stcBest = ladders.find(function(x){ return x.ticker === r.ticker; });
      if (stcBest) {
        stcBest.longPutClosed = true;
        stcBest.longCloseAmount = (stcBest.longCloseAmount || 0) + Math.abs(r.totalPremium);
      }
    } else if (r.posType === 'BTC') {
      // BTC = Buy To Close a Short Put → btcDebit on matching SP (string expiry match)
      var btcMatched = false;
      ladders.forEach(function(x) {
        if (x.ticker !== r.ticker) return;
        (x.shortPuts || []).forEach(function(sp) {
          if (sp.strike == r.strike && sp.expiry === r.expiry) {
            sp.btcDebit = (sp.btcDebit || 0) + Math.abs(r.totalPremium);
            sp.closed = true;
            sp.closeReason = sp.closeReason || 'buyback';
            btcMatched = true;
          }
        });
      });
      if (!btcMatched) {
        // No existing SP — create one with btcDebit, attach to best ladder
        var btcTarget = null, btcBestDiff = Infinity;
        ladders.forEach(function(x) {
          if (x.ticker !== r.ticker) return;
          var d = Math.abs((new Date(x.openDate||0)) - (new Date(r.openDate||0)));
          if (d < btcBestDiff) { btcBestDiff = d; btcTarget = x; }
        });
        if (!btcTarget) {
          btcTarget = { id: uid(), ticker: r.ticker, contracts: r.contracts, longStrike: null, longPremium: null, longExpiry: null, openDate: r.openDate, notes: '', position: null, noLongPut: true, shortPuts: [], closed: false };
          ladders.unshift(btcTarget);
          expandedIds.add(btcTarget.id);
        }
        if (btcTarget) {
          if (!btcTarget.shortPuts) btcTarget.shortPuts = [];
          var existSp = btcTarget.shortPuts.find(function(sp){ return sp.strike == r.strike && sp.expiry === r.expiry; });
          if (existSp) {
            existSp.btcDebit = (existSp.btcDebit || 0) + Math.abs(r.totalPremium);
            existSp.closed = true;
            existSp.closeReason = existSp.closeReason || 'buyback';
          } else {
            btcTarget.shortPuts.push({ id: uid(), strike: r.strike, contracts: r.contracts, received: 0, expiry: r.expiry, openDate: r.openDate, closed: true, closeReason: 'buyback', btcDebit: Math.abs(r.totalPremium) });
          }
        }
      }
    }
    imported++;
  });

  // Post-import merge: combine BTC-only SPs with matching STO-only SPs
  ladders.forEach(function(l) {
    var sps = l.shortPuts;
    if (!sps || !sps.length) return;
    var changed = true;
    while (changed) {
      changed = false;
      for (var i = 0; i < sps.length; i++) {
        var btcSp = sps[i];
        if (!btcSp.btcDebit || btcSp.received > 0) continue;
        for (var j = 0; j < sps.length; j++) {
          if (i === j) continue;
          var stoSp = sps[j];
          if (stoSp.strike != btcSp.strike || stoSp.expiry !== btcSp.expiry) continue;
          if (!(stoSp.received > 0)) continue;
          stoSp.btcDebit = (stoSp.btcDebit || 0) + btcSp.btcDebit;
          stoSp.closed = true;
          stoSp.closeReason = stoSp.closeReason || 'buyback';
          sps.splice(i, 1);
          changed = true; break;
        }
        if (changed) break;
      }
    }
  });

  save(); closeModal();
  if (document.getElementById('ladders-root')) {
    render();
  } else if (typeof activeView !== 'undefined' && activeView === 'putladder') {
    plReloadForPortfolio();
  }
  if (imported) alert('Imported ' + imported + ' position(s) successfully.');
}

function renderCallTickerGroup(ticker, laddersForTicker) {
  var weekFilter = typeof growthTickerWeekFilters !== 'undefined' && growthTickerWeekFilters[ticker] ? growthTickerWeekFilters[ticker] : 'all';
  
  function getWeekRange(weeksAgo) {
    var now = new Date();
    var dayOfWeek = now.getDay();
    var daysToMonday = dayOfWeek === 0 ? 6 : dayOfWeek - 1;
    var weekStart = new Date(now);
    weekStart.setDate(now.getDate() - daysToMonday - (weeksAgo * 7));
    weekStart.setHours(0, 0, 0, 0);
    var weekEnd = new Date(weekStart);
    weekEnd.setDate(weekStart.getDate() + 6);
    weekEnd.setHours(23, 59, 59, 999);
    return { start: weekStart, end: weekEnd };
  }
  
  function isInWeek(dateStr, weekRange) {
    if (!dateStr) return false;
    var d = new Date(dateStr);
    return d >= weekRange.start && d <= weekRange.end;
  }
  
  var cwRange = getWeekRange(0);
  var pwRange = getWeekRange(1);
  
  var totalBTO = 0, totalSTC = 0, totalSTO = 0, totalBTC = 0, totalCollat = 0;
  var openCount = 0, closedCount = 0;
  
  laddersForTicker.forEach(function(l) {
    var s = calcCallLadder(l);
    if (l.closed) closedCount++; else openCount++;
    
    if (!l.noLongCall && l.longPremium) {
      if (weekFilter === 'all' || 
          (weekFilter === 'cw' && isInWeek(l.openDate, cwRange)) || 
          (weekFilter === 'pw' && isInWeek(l.openDate, pwRange))) {
        totalBTO += l.longPremium * 100 * (l.contracts||1);
      }
    }
    
    if (l.longCloseAmount && l.longCloseDate) {
      if (weekFilter === 'all' || 
          (weekFilter === 'cw' && isInWeek(l.longCloseDate, cwRange)) || 
          (weekFilter === 'pw' && isInWeek(l.longCloseDate, pwRange))) {
        totalSTC += l.longCloseAmount;
      }
    }
    
    totalCollat += s.collat;
    
    (l.shortCalls||[]).forEach(function(sc){
      if (sc.received) {
        if (weekFilter === 'all' || 
            (weekFilter === 'cw' && isInWeek(sc.openDate, cwRange)) || 
            (weekFilter === 'pw' && isInWeek(sc.openDate, pwRange))) {
          totalSTO += sc.received;
        }
      }
      if (sc.closed && sc.closeDate) {
        if (weekFilter === 'all' || 
            (weekFilter === 'cw' && isInWeek(sc.closeDate, cwRange)) || 
            (weekFilter === 'pw' && isInWeek(sc.closeDate, pwRange))) {
          totalBTC += (sc.btcDebit || 0) + (sc.buybackCost || 0);
        }
      }
    });
  });
  
  var invested = totalBTO;

  html += '<div style="font-size:1.15rem;font-weight:800;color:var(--black);letter-spacing:0.02em;">' + ticker + '</div>';
  html += '<div style="font-size:0.65rem;color:var(--text3);font-weight:600;background:var(--bg);padding:0.2rem 0.5rem;border-radius:12px;">' + openCount + ' open' + (closedCount ? ' • ' + closedCount + ' closed' : '') + '</div>';
  html += '</div>';
  html += '<div style="display:flex;gap:0.4rem;">';
  html += '<button class="add-btn" style="font-size:0.68rem;padding:0.35rem 0.65rem;" onclick="openAddShortCallForTicker(\'' + ticker + '\')">+ Short Call</button>';
  html += '<button class="add-btn" style="background:var(--blue);font-size:0.68rem;padding:0.35rem 0.65rem;" onclick="openAddLongCallForTicker(\'' + ticker + '\')">+ Long Call</button>';
  html += '</div>';

  html += '<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:0.5rem;margin-bottom:0.5rem;">';
  html += '<div style="text-align:center;padding:0.35rem;background:var(--bg);border-radius:6px;">';
  html += '<div style="font-size:0.55rem;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:0.15rem;">Invested</div>';
  html += '<div style="font-size:0.82rem;font-weight:800;font-family:monospace;color:#DC2626;">-' + fmt(invested) + '</div>';

  html += '<button onclick="setGrowthTickerWeekFilter(\'' + ticker + '\', \'all\')" style="padding:0.25rem 0.5rem;font-size:0.65rem;font-weight:600;border-radius:5px;cursor:pointer;border:1px solid var(--border);background:' + (weekFilter === 'all' ? 'var(--black)' : 'transparent') + ';color:' + (weekFilter === 'all' ? '#fff' : 'var(--text3)') + ';">All Time</button>';
  html += '<button onclick="setGrowthTickerWeekFilter(\'' + ticker + '\', \'cw\')" style="padding:0.25rem 0.5rem;font-size:0.65rem;font-weight:600;border-radius:5px;cursor:pointer;border:1px solid var(--border);background:' + (weekFilter === 'cw' ? '#2563EB' : 'transparent') + ';color:' + (weekFilter === 'cw' ? '#fff' : 'var(--text3)') + ';">CW</button>';

// Placeholder functions - minimal implementation
function calcCallLadder(l) {
  var longCost = (!l.noLongCall && l.longPremium) ? l.longPremium * 100 * (l.contracts||1) : 0;
  var stcCredit = l.longCloseAmount || 0;
  var totalSTO = 0, totalBTC = 0, collat = 0;
  (l.shortCalls||[]).forEach(function(sc) {
    totalSTO += sc.received || 0;
    totalBTC += (sc.btcDebit || 0) + (sc.buybackCost || 0);
    if (!sc.closed && sc.strike) collat += sc.strike * 100 * (sc.contracts || 1);
  });
  var totalIncome = stcCredit + totalSTO - totalBTC;
  var profit = totalIncome - longCost;
  var pct = longCost > 0 ? totalIncome / longCost : 0;
  return { longCost: longCost, totalIncome: totalIncome, profit: profit, pct: pct, collat: collat };
}

// Full Call Ladder card rendering - exact copy of Put Ladder structure
function renderCallLadderCard(l) {
  var s = calcCallLadder(l);
  var expanded = growthExpandedIds.has(l.id);
  var dl = daysLeft(l.longExpiry);

  if (!file) return;

  reader.onload = function(e) {
    var text = e.target.result;

    showCallImportPreview(result);
  };

function parseCallLadderCSV(text) {
  var lines = text.split(/\r?\n/).filter(function(l){ return l.trim(); });
  if (!lines.length) return { rows: [], errors: ['Empty file'] };

  var delimiter = lines[0].indexOf('\t') > -1 ? '\t' : ',';
  var headers = (delimiter === '\t' ? lines[0].split('\t') : splitCSVLine(lines[0])).map(function(h){ return h.trim().toLowerCase().replace(/\s+/g,'_'); });
  var idx = {
    activityDate: headers.indexOf('activity_date'),
    instrument:   headers.indexOf('instrument'),
    description:  headers.indexOf('description'),
    transCode:    headers.indexOf('trans_code'),
    quantity:     headers.indexOf('quantity'),
    price:        headers.indexOf('price'),
    amount:       headers.indexOf('amount')
  };

  var rows = [], errors = [], skipped = 0;

  for (var i = 1; i < lines.length; i++) {
    var cols = delimiter === '\t' ? lines[i].split('\t').map(function(c){return c.trim();}) : splitCSVLine(lines[i]);
    if (cols.length < 4) { skipped++; continue; }

    var transCode = (cols[idx.transCode] || '').trim().toUpperCase();
    if (transCode !== 'BTO' && transCode !== 'STO' && transCode !== 'STC' && transCode !== 'BTC') { skipped++; continue; }

    var desc        = (cols[idx.description] || '').trim();
    var actDate     = (cols[idx.activityDate] || '').trim();
    var ticker      = (cols[idx.instrument] || '').trim().toUpperCase();
    var quantity    = Math.abs(parseFloat(cols[idx.quantity]) || 1);
    var price       = Math.abs(parseFloat((cols[idx.price]||'').replace(/[$,()]/g,'')) || 0);
    var amount      = parseAmount(cols[idx.amount] || '');

    var parsed = parseOptionDescription(desc);
    if (!parsed) { errors.push('Row ' + (i+1) + ': could not parse description "' + desc + '"'); skipped++; continue; }
    
    // FILTER: Only process CALL options
    if (parsed.optionType !== 'call') { skipped++; continue; }

    if (!ticker) ticker = parsed.ticker;

    var posType;
    if (transCode === 'BTO') {
      posType = 'LCALL';
    } else if (transCode === 'STO') {
      posType = 'SCALL';
    } else if (transCode === 'STC') {
      posType = 'STC';
    } else if (transCode === 'BTC') {
      posType = 'BTC';
    }

    var totalPremium = Math.abs(amount) > 0 ? Math.abs(amount) : Math.abs(price) * 100 * quantity;
    var premiumPerContract = quantity > 0 ? totalPremium / (quantity * 100) : Math.abs(price);

    rows.push({
      ticker:      ticker,
      posType:     posType,
      optionType:  parsed.optionType,
      strike:      parsed.strike,
      expiry:      parsed.expiry,
      openDate:    actDate,
      contracts:   quantity,
      premium:     premiumPerContract,
      totalPremium: totalPremium,
      amount:      amount,
      transCode:   transCode,
      rawDesc:     desc
    });
  }

  return { rows: rows, errors: errors, skipped: skipped, imported: rows.length > 0 };
}

      '</table></div>' +
      '<div class="modal-btns" style="padding:0.85rem 1.5rem;border-top:1px solid var(--border);flex-shrink:0;background:#fff;">' +

function commitCallCSVImport() {
  var rows = window._csvCallImportRows || [];
  var checked = [];
  document.querySelectorAll('.csv-row-chk').forEach(function(c){
    if (c.checked) checked.push(parseInt(c.dataset.idx));
  });

  var imported = 0;
  
  // FIRST PASS: Process BTO (LCALL) and STO (SCALL) to create ladders and open positions
  checked.forEach(function(i) {
    var r = rows[i];
    if (!r) return;

    if (r.posType === 'LCALL') {
      var l = callLadders.find(function(x){
        return x.ticker === r.ticker && !x.noLongCall &&
               x.longStrike == r.strike && x.longExpiry === r.expiry &&
               x.openDate === r.openDate;
      });
      if (!l) {
        l = { id: uid(), ticker: r.ticker, contracts: r.contracts, longStrike: r.strike, longPremium: r.premium, longExpiry: r.expiry, openDate: r.openDate, notes: '', position: null, noLongCall: false, shortCalls: [], closed: false };
        callLadders.unshift(l);
        growthExpandedIds.add(l.id);
        imported++;
      }
    } else if (r.posType === 'SCALL') {
      var scExpDt = normExpiry(r.expiry);
      var bestTarget = null, bestDiff = Infinity;
      callLadders.forEach(function(x) {
        if (x.ticker !== r.ticker || x.closed) return;
        if (x.noLongCall) { if (!bestTarget) bestTarget = x; return; }
        var lcDt = normExpiry(x.longExpiry);
        if (lcDt && scExpDt && lcDt >= scExpDt) {
          var diff = lcDt - scExpDt;
          if (diff < bestDiff) { bestDiff = diff; bestTarget = x; }
        }
      });
      if (!bestTarget) {
        bestTarget = callLadders.find(function(x){ return x.ticker === r.ticker && !x.closed; });
      }
      if (!bestTarget) {
        bestTarget = { id: uid(), ticker: r.ticker, contracts: r.contracts, longStrike: null, longPremium: null, longExpiry: null, openDate: r.openDate, notes: '', position: null, noLongCall: true, shortCalls: [], closed: false };
        callLadders.unshift(bestTarget);
        growthExpandedIds.add(bestTarget.id);
      }
      var dup = (bestTarget.shortCalls||[]).find(function(sc){
        return sc.strike == r.strike && sc.expiry === r.expiry && sc.openDate === r.openDate;
      });
      if (!dup) {
        var sc = { id: uid(), strike: r.strike, contracts: r.contracts, received: r.totalPremium, expiry: r.expiry, openDate: r.openDate, closed: false };
        bestTarget.shortCalls.push(sc);
        imported++;
      }
    }
  });
  
  // SECOND PASS: Process STC and BTC to close positions
  checked.forEach(function(i) {
    var r = rows[i];
    if (!r) return;
    
    if (r.posType === 'STC') {
      var stcDate = r.openDate;
      var stcBest = null, stcBestDiff = Infinity;
      callLadders.forEach(function(x) {
        if (x.ticker !== r.ticker || x.noLongCall) return;
        if (x.longStrike == r.strike) {
          var d = Math.abs((new Date(x.openDate||0)) - (new Date(stcDate||0)));
          if (d < stcBestDiff) { stcBestDiff = d; stcBest = x; }
        }
      });
      if (stcBest) {
        stcBest.longCloseAmount = (stcBest.longCloseAmount||0) + r.totalPremium;
        stcBest.longCloseDate = stcDate;
        stcBest.longCallClosed = true;
        imported++;
      }
    } else if (r.posType === 'BTC') {
      var btcDate = r.openDate;
      var btcBest = null, btcBestDiff = Infinity;
      callLadders.forEach(function(x) {
        if (x.ticker !== r.ticker) return;
        (x.shortCalls||[]).forEach(function(sc) {
          if (sc.strike == r.strike && !sc.closed) {
            var d = Math.abs((new Date(sc.openDate||0)) - (new Date(btcDate||0)));
            if (d < btcBestDiff) { btcBestDiff = d; btcBest = sc; }
          }
        });
      });
      if (btcBest) {
        btcBest.btcDebit = (btcBest.btcDebit||0) + r.totalPremium;
        btcBest.closeDate = btcDate;
        btcBest.closed = true;
        imported++;
      }
    }
  });

  saveCallLadders();
  closeModal();
  growthRender();
  alert('✓ Imported ' + imported + ' call option transaction(s)');
}

function deleteVisibleCallLadders() { 
  var allSel = typeof selectedTickers === 'undefined' || selectedTickers.has('ALL');
  var visible = callLadders.filter(function(l) {

    if (growthFilterMode === 'closed' && !l.closed) return false;
    if (!allSel && !selectedTickers.has(l.ticker)) return false;
    return true;
  });
  
  if (!visible.length) {
    alert('No visible call ladders to delete');
    return;
  }
  
  if (confirm('Delete ' + visible.length + ' visible call ladder(s)? This cannot be undone.')) {
    var visibleIds = new Set(visible.map(function(l) { return l.id; }));
    callLadders = callLadders.filter(function(l) { return !visibleIds.has(l.id); });
    saveCallLadders();
    growthRender();
    alert('✓ Deleted ' + visible.length + ' call ladder(s)');
  }
}

function growthReloadForPortfolio() {
  try {
    var portKey = plGetPortKey();
    var raw = localStorage.getItem('roi_callladder_' + portKey);
    callLadders = (raw && JSON.parse(raw)) || [];
    if (!Array.isArray(callLadders)) callLadders = [];
  } catch(e) { callLadders = []; }
  growthExpandedIds = new Set();
  growthTickerSearch = '';
  callLadders.forEach(function(l) { if (!l.closed) growthExpandedIds.add(l.id); });
  var growthTickers = [...new Set(callLadders.map(function(l) { return l.ticker; }))];
  growthTickers.forEach(function(t) { growthExpandedIds.add('ticker-' + t); });
  growthRender();
}

  var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  var el = document.getElementById('topbar-date');
  if (el) el.textContent = days[d.getDay()] + ' ' + months[d.getMonth()] + ' ' + d.getDate() + ', ' + d.getFullYear();
})();

// ── INIT ──────────────────────────────────────────────────────────────────────
render();
