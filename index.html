
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0A0A0B;--bg2:#111113;--bg3:#18181C;--bg4:#222228;
  --gold:#C9A84C;--gold-light:#E8C96A;--gold-dim:#8A6E30;
  --border:rgba(201,168,76,0.12);--border2:rgba(201,168,76,0.28);
  --text:#F0EDE6;--text2:#9A9590;--text3:#5C5955;
  --green:#2FBF6A;--green-bg:rgba(47,191,106,0.1);
  --red:#E04A4A;--red-bg:rgba(224,74,74,0.1);
  --blue:#4A9EE0;--blue-bg:rgba(74,158,224,0.1);
  --r:10px;
}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;font-size:14px;line-height:1.5;min-height:100vh;}

/* HEADER */
.header{background:var(--bg2);border-bottom:0.5px solid var(--border);padding:1.25rem 1.5rem;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:1rem;}
.logo{font-size:1.1rem;font-weight:700;color:var(--gold);letter-spacing:0.04em;}
.logo span{color:var(--text);font-weight:400;font-size:0.85rem;margin-left:0.5rem;}
.header-date{font-size:0.75rem;color:var(--text3);font-family:monospace;}

/* SUMMARY CARDS */
.summary{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:1px;background:var(--border);border:0.5px solid var(--border);border-radius:var(--r);overflow:hidden;margin:1.25rem 1.5rem 0;}
.scard{background:var(--bg2);padding:1rem 1.25rem;}
.scard-label{font-size:0.7rem;color:var(--text3);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:0.4rem;}
.scard-val{font-size:1.4rem;font-weight:700;font-family:monospace;line-height:1;}
.scard-sub{font-size:0.7rem;color:var(--text3);margin-top:0.25rem;}
.pos{color:var(--green);}
.neg{color:var(--red);}
.gold{color:var(--gold);}

/* CONTROLS */
.controls{display:flex;gap:0.75rem;padding:1.25rem 1.5rem 0;flex-wrap:wrap;align-items:center;}
.filter-group{display:flex;gap:4px;background:var(--bg3);border:0.5px solid var(--border);border-radius:6px;padding:3px;}
.filt-btn{background:transparent;border:none;color:var(--text2);padding:0.35rem 0.75rem;border-radius:4px;font-size:0.75rem;font-weight:600;cursor:pointer;letter-spacing:0.04em;transition:all 0.15s;text-transform:uppercase;}
.filt-btn.active{background:var(--bg4);color:var(--gold);}
.filt-btn:hover:not(.active){color:var(--text);}
.search-wrap{flex:1;min-width:160px;max-width:280px;}
.search-input{width:100%;background:var(--bg3);border:0.5px solid var(--border);color:var(--text);padding:0.45rem 0.85rem;border-radius:6px;font-size:0.8rem;outline:none;}
.search-input::placeholder{color:var(--text3);}
.search-input:focus{border-color:var(--gold-dim);}

/* TABLE */
.table-wrap{margin:1rem 1.5rem 1.5rem;overflow-x:auto;border:0.5px solid var(--border);border-radius:var(--r);}
table{width:100%;border-collapse:collapse;min-width:780px;}
thead{background:var(--bg3);}
th{padding:0.7rem 1rem;font-size:0.68rem;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.1em;text-align:left;border-bottom:0.5px solid var(--border);white-space:nowrap;cursor:pointer;user-select:none;}
th:hover{color:var(--text2);}
th .sort-arrow{opacity:0.3;margin-left:4px;}
th.sorted .sort-arrow{opacity:1;color:var(--gold);}
tbody tr{border-bottom:0.5px solid var(--border);transition:background 0.1s;}
tbody tr:last-child{border-bottom:none;}
tbody tr:hover{background:var(--bg3);}
tr.closed-row{opacity:0.55;}
td{padding:0.65rem 1rem;font-size:0.82rem;color:var(--text2);white-space:nowrap;}
td.main{color:var(--text);font-weight:600;}
td.mono{font-family:monospace;}

/* BADGES */
.badge{display:inline-flex;align-items:center;padding:0.18rem 0.55rem;border-radius:4px;font-size:0.68rem;font-weight:700;letter-spacing:0.05em;text-transform:uppercase;}
.badge-short-put{background:var(--red-bg);color:var(--red);}
.badge-long-put{background:var(--blue-bg);color:var(--blue);}
.badge-long-call{background:var(--green-bg);color:var(--green);}
.badge-shares{background:rgba(201,168,76,0.1);color:var(--gold);}
.badge-closed{background:var(--bg4);color:var(--text3);}
.ticker-chip{display:inline-flex;align-items:center;gap:0.4rem;font-weight:700;font-size:0.82rem;color:var(--text);}
.t-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.t-PLTR{background:#7C5CE4;}
.t-MSFT{background:#4A9EE0;}
.t-GOOGL{background:#E8A84C;}
.t-NVDX{background:#2FBF6A;}
.t-SOFI{background:#E04A4A;}
.t-TSLL{background:#E4C15C;}
.t-NVTS{background:#B0A090;}
.t-METU{background:#9090C0;}

/* EXPIRY color */
.expiry-soon{color:var(--red);}
.expiry-mid{color:var(--gold);}
.expiry-far{color:var(--text2);}

/* POSITION BREAKDOWN */
.breakdown{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:1rem;margin:0 1.5rem 1.5rem;}
.bcard{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--r);padding:1.1rem 1.25rem;}
.bcard-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:0.9rem;}
.bcard-ticker{font-weight:700;font-size:0.95rem;display:flex;align-items:center;gap:0.5rem;}
.bcard-count{font-size:0.7rem;color:var(--text3);}
.bcard-row{display:flex;justify-content:space-between;font-size:0.75rem;padding:0.25rem 0;border-bottom:0.5px solid var(--border);}
.bcard-row:last-child{border-bottom:none;}
.bcard-row span:first-child{color:var(--text3);}
.bcard-row span:last-child{font-family:monospace;font-weight:600;}
.section-title-bar{padding:0.5rem 1.5rem;font-size:0.72rem;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:var(--text3);border-top:0.5px solid var(--border);border-bottom:0.5px solid var(--border);background:var(--bg2);margin-bottom:0;}

/* EMPTY */
.empty{text-align:center;padding:3rem;color:var(--text3);font-size:0.85rem;}
</style>

const today = new Date('2026-04-06');
function parseExpiry(s){if(!s||s==='—')return null;try{return new Date(s);}catch{return null;}}
function daysUntil(s){const d=parseExpiry(s);if(!d)return 999;return Math.round((d-today)/(1000*60*60*24));}
function fmt(n){if(n===undefined||n===null)return '—';return '$'+Math.abs(n).toLocaleString();}
function fmtPnl(n){if(n===undefined||n===null)return '—';const s=n>=0?'+':'-';return s+'$'+Math.abs(n).toLocaleString();}

let activeFilter='all', searchTerm='', sortCol='ticker', sortDir=1;

function isClosed(r){return r.closed===true||r.contractClosed===true||r.contractClosedMarkedOnly===true;}

function getFiltered(){
  return RAW.filter(r=>{
    const cl=isClosed(r);
    if(activeFilter==='open'&&cl)return false;
    if(activeFilter==='closed'&&!cl)return false;
    if(activeFilter==='Short Put'&&r.excelType!=='Short Put')return false;
    if(activeFilter==='Long Put'&&r.excelType!=='Long Put')return false;
    if(activeFilter==='Long Call'&&r.excelType!=='Long Call')return false;
    if(activeFilter==='Shares'&&r.excelType!=='Shares')return false;
    if(searchTerm&&!r.ticker.toLowerCase().includes(searchTerm))return false;
    return true;
  }).sort((a,b)=>{
    let av=a[sortCol],bv=b[sortCol];
    if(sortCol==='status'){av=isClosed(a)?1:0;bv=isClosed(b)?1:0;}
    if(typeof av==='string')av=av.toLowerCase();
    if(typeof bv==='string')bv=bv.toLowerCase();
    if(av===undefined)av=-Infinity;if(bv===undefined)bv=-Infinity;
    return av<bv?-sortDir:av>bv?sortDir:0;
  });
}

function badgeClass(t){
  if(t==='Short Put')return 'badge-short-put';
  if(t==='Long Put')return 'badge-long-put';
  if(t==='Long Call')return 'badge-long-call';
  if(t==='Shares')return 'badge-shares';
  return '';
}

function expiryClass(s){
  const d=daysUntil(s);
  if(d<=4)return 'expiry-soon';
  if(d<=30)return 'expiry-mid';
  return 'expiry-far';
}

function renderSummary(){
  const open=RAW.filter(r=>!isClosed(r));
  const closed=RAW.filter(r=>isClosed(r));
  const totalGross=RAW.reduce((s,r)=>s+(r.excelGrossValue||0),0);
  const totalPnl=RAW.reduce((s,r)=>s+(r.excelProfit||0),0);
  const openPnl=open.reduce((s,r)=>s+(r.excelProfit||0),0);
  const income=RAW.filter(r=>r.excelType==='Short Put').reduce((s,r)=>s+(r.excelIncome||0),0);
  document.getElementById('summary-cards').innerHTML=`
    <div class="scard"><div class="scard-label">Total Positions</div><div class="scard-val gold">${RAW.length}</div><div class="scard-sub">${open.length} open · ${closed.length} closed</div></div>
    <div class="scard"><div class="scard-label">Portfolio Value</div><div class="scard-val gold">$${totalGross.toLocaleString()}</div><div class="scard-sub">Gross market value</div></div>
    <div class="scard"><div class="scard-label">Total P&L</div><div class="scard-val ${totalPnl>=0?'pos':'neg'}">${fmtPnl(totalPnl)}</div><div class="scard-sub">All positions</div></div>
    <div class="scard"><div class="scard-label">Open P&L</div><div class="scard-val ${openPnl>=0?'pos':'neg'}">${fmtPnl(openPnl)}</div><div class="scard-sub">${open.length} open positions</div></div>
    <div class="scard"><div class="scard-label">Premium Collected</div><div class="scard-val pos">+$${income.toLocaleString()}</div><div class="scard-sub">Short put income</div></div>
    <div class="scard"><div class="scard-label">Open Positions</div><div class="scard-val">${open.length}</div><div class="scard-sub">Across ${[...new Set(open.map(r=>r.ticker))].length} tickers</div></div>
  `;
  const hp=document.getElementById('header-pnl');
  hp.innerHTML=`<div style="font-size:0.7rem;color:var(--text3);margin-bottom:2px;">Portfolio P&L</div><div style="font-size:1.5rem;font-weight:700;font-family:monospace;color:${totalPnl>=0?'var(--green)':'var(--red)'}">${fmtPnl(totalPnl)}</div>`;
}

function renderTable(){
  const rows=getFiltered();
  const tbody=document.getElementById('table-body');
  if(!rows.length){tbody.innerHTML=`<tr><td colspan="7" class="empty">No positions match your filter.</td></tr>`;return;}
  tbody.innerHTML=rows.map(r=>{
    const cl=isClosed(r);
    const pnl=r.excelProfit;
    const pnlClass=pnl===undefined?'':pnl>=0?'pos':'neg';
    const pnlStr=pnl===undefined?'—':fmtPnl(pnl);
    const strike=r.strike>0?'$'+r.strike:'—';
    return `<tr class="${cl?'closed-row':''}">
      <td class="main"><span class="ticker-chip"><span class="t-dot t-${r.ticker}"></span>${r.ticker}</span></td>
      <td><span class="badge ${badgeClass(r.excelType)}">${r.excelType}</span></td>
      <td class="mono">${strike}</td>
      <td class="${expiryClass(r.expiryDate)}">${r.expiryDate}</td>
      <td class="mono" style="text-align:right">${fmt(r.excelGrossValue)}</td>
      <td class="mono ${pnlClass}" style="text-align:right;font-weight:600">${pnlStr}</td>
      <td style="text-align:center"><span class="badge ${cl?'badge-closed':'badge-long-call'}">${cl?'Closed':'Open'}</span></td>
    </tr>`;
  }).join('');
}

function renderBreakdown(){
  const tickers=[...new Set(RAW.map(r=>r.ticker))].sort();
  document.getElementById('breakdown-cards').innerHTML=tickers.map(t=>{
    const pos=RAW.filter(r=>r.ticker===t);
    const totalPnl=pos.reduce((s,r)=>s+(r.excelProfit||0),0);
    const totalVal=pos.reduce((s,r)=>s+(r.excelGrossValue||0),0);
    const income=pos.filter(r=>r.excelType==='Short Put').reduce((s,r)=>s+(r.excelIncome||0),0);
    const open=pos.filter(r=>!isClosed(r)).length;
    return `<div class="bcard">
      <div class="bcard-head">
        <div class="bcard-ticker"><span class="t-dot t-${t}"></span>${t}</div>
        <div class="bcard-count">${pos.length} positions · ${open} open</div>
      </div>
      <div class="bcard-row"><span>Gross Value</span><span class="gold">${fmt(totalVal)}</span></div>
      <div class="bcard-row"><span>Total P&L</span><span class="${totalPnl>=0?'pos':'neg'}">${fmtPnl(totalPnl)}</span></div>
      ${income?`<div class="bcard-row"><span>Premium Income</span><span class="pos">+$${income.toLocaleString()}</span></div>`:''}
    </div>`;
  }).join('');
}

function render(){renderTable();}

document.getElementById('type-filter').addEventListener('click',e=>{
  const btn=e.target.closest('.filt-btn');
  if(!btn)return;
  document.querySelectorAll('.filt-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  activeFilter=btn.dataset.filter;
  render();
});

document.getElementById('search-input').addEventListener('input',e=>{
  searchTerm=e.target.value.toLowerCase().trim();
  render();
});

document.querySelectorAll('th[data-col]').forEach(th=>{
  th.addEventListener('click',()=>{
    const col=th.dataset.col;
    if(sortCol===col)sortDir*=-1;else{sortCol=col;sortDir=1;}
    document.querySelectorAll('th').forEach(t=>t.classList.remove('sorted'));
    th.classList.add('sorted');
    th.querySelector('.sort-arrow').textContent=sortDir===1?'↑':'↓';
    render();
  });
});

renderSummary();
renderTable();
renderBreakdown();
</script>
