function saveCloseShortCall(lid, scid) {
  var l = callLadders.find(function(x){ return x.id === lid; });
  var sc = l && (l.shortCalls||[]).find(function(s){return s.id===scid;});
  if (!sc) return;

  var totalContracts = sc.contracts || l.contracts || 1;
  var closeContracts = Math.min(totalContracts, Math.max(1, parseInt(v('sc-close-contracts')) || totalContracts));
  var closeDate = v('sc-closedate').trim() || today();
  var buybackCost = 0;

  if (window._closeSCReason === 'buyback') {
    buybackCost = parseFloat(v('sc-buyback')) || 0;
    if (buybackCost === 0) { alert('Please enter the buyback cost.'); return; }
  }

  if (closeContracts >= totalContracts) {
    // Close all — mark in place
    sc.closed = true;
    sc.closeReason = window._closeSCReason;
    sc.closeDate = closeDate;
    sc.buybackCost = buybackCost;
  } else {
    // Partial close — split
    var remaining = totalContracts - closeContracts;
    var receivedPerContract = sc.received / totalContracts;

    // Shrink original to remaining open contracts
    sc.contracts = remaining;
    sc.received = Math.round(receivedPerContract * remaining * 100) / 100;

    // Create a new closed record for the closed portion
    var closedSc = {
      id: uid(),
      strike: sc.strike,
      contracts: closeContracts,
      received: Math.round(receivedPerContract * closeContracts * 100) / 100,
      expiry: sc.expiry,
      openDate: sc.openDate,
      closed: true,
      closeReason: window._closeSCReason,
      closeDate: closeDate,
      buybackCost: buybackCost
    };
    l.shortCalls.push(closedSc);
  }

  saveCallLadders(); closeModal(); growthRender();
}

function autoExpireCallLadderCalls() {
  if (typeof callLadders === 'undefined') return;
  var now = new Date(); now.setHours(0,0,0,0);
  var changed = false;
  callLadders.forEach(function(l) {
    // Auto-close short calls whose expiry has passed
    (l.shortCalls || []).forEach(function(sc) {
      if (sc.closed) return;
      var expDt = normExpiry(sc.expiry);
      if (expDt && expDt < now) {
        sc.closed = true;
        sc.closeReason = 'expired';
        sc.closeDate = sc.expiry;
        sc.buybackCost = 0;
        changed = true;
      }
    });

    // Auto-close long call if its expiry has passed and it's not already closed
    if (!l.noLongCall && !l.longCallClosed && l.longExpiry) {
      var lcExp = normExpiry(l.longExpiry);
      if (lcExp && lcExp < now) {
        l.longCallClosed = true;
        l.longCloseAmount = l.longCloseAmount || 0;
        l.longCloseDate = l.longExpiry;
        changed = true;
      }
    }

    // Auto-close ladder if long call is closed AND all short calls are closed (or no short calls)
    if (!l.closed && (l.longCallClosed || l.noLongCall)) {
      var allShortsClosed = (l.shortCalls || []).every(function(sc) { return sc.closed; });
      if (l.shortCalls.length === 0 || allShortsClosed) {
        l.closed = true;
        changed = true;
      }
    }
  });
  if (changed) saveCallLadders();
}

    var text = e.target.result;

function parseCallLadderCSV(text) {
  var lines = text.split(/\r?\n/).filter(function(l){ return l.trim(); });
  if (!lines.length) return { rows: [], errors: ['Empty file'] };

  var delimiter = lines[0].indexOf('\t') > -1 ? '\t' : ',';
  var headers = (delimiter === '\t' ? lines[0].split('\t') : splitCSVLine(lines[0])).map(function(h){ return h.trim().toLowerCase().replace(/\s+/g,'_'); });
  var idx = {
    activityDate: headers.indexOf('activity_date'),
    instrument:   headers.indexOf('instrument'),
    description:  headers.indexOf('description'),
    transCode:    headers.indexOf('trans_code'),
    quantity:     headers.indexOf('quantity'),
    price:        headers.indexOf('price'),
    amount:       headers.indexOf('amount')
  };

  var rows = [], errors = [], skipped = 0;

  for (var i = 1; i < lines.length; i++) {
    var cols = delimiter === '\t' ? lines[i].split('\t').map(function(c){return c.trim();}) : splitCSVLine(lines[i]);
    if (cols.length < 4) { skipped++; continue; }

    var transCode = (cols[idx.transCode] || '').trim().toUpperCase();
    if (transCode !== 'BTO' && transCode !== 'STO' && transCode !== 'STC' && transCode !== 'BTC') { skipped++; continue; }

    var desc        = (cols[idx.description] || '').trim();
    var actDate     = (cols[idx.activityDate] || '').trim();
    var ticker      = (cols[idx.instrument] || '').trim().toUpperCase();
    var quantity    = Math.abs(parseFloat(cols[idx.quantity]) || 1);
    var price       = Math.abs(parseFloat((cols[idx.price]||'').replace(/[$,()]/g,'')) || 0);
    var amount      = parseAmount(cols[idx.amount] || '');

    var parsed = parseOptionDescription(desc);
    if (!parsed) { errors.push('Row ' + (i+1) + ': could not parse description "' + desc + '"'); skipped++; continue; }
    
    // FILTER: Only process CALL options
    if (parsed.optionType !== 'call') { skipped++; continue; }

    if (!ticker) ticker = parsed.ticker;

    var posType;
    if (transCode === 'BTO') {
      posType = 'LCALL';
    } else if (transCode === 'STO') {
      posType = 'SCALL';
    } else if (transCode === 'STC') {
      posType = 'STC';
    } else if (transCode === 'BTC') {
      posType = 'BTC';
    }

    var totalPremium = Math.abs(amount) > 0 ? Math.abs(amount) : Math.abs(price) * 100 * quantity;
    var premiumPerContract = quantity > 0 ? totalPremium / (quantity * 100) : Math.abs(price);

    rows.push({
      ticker:      ticker,
      posType:     posType,
      optionType:  parsed.optionType,
      strike:      parsed.strike,
      expiry:      parsed.expiry,
      openDate:    actDate,
      contracts:   quantity,
      premium:     premiumPerContract,
      totalPremium: totalPremium,
      amount:      amount,
      transCode:   transCode,
      rawDesc:     desc
    });
  }

  return { rows: rows, errors: errors, skipped: skipped, imported: rows.length > 0 };
}

function commitCallCSVImport() {
  var rows = window._csvCallImportRows || [];
  var checked = [];
  document.querySelectorAll('.csv-row-chk').forEach(function(c){
    if (c.checked) checked.push(parseInt(c.dataset.idx));
  });

  var imported = 0;

  // Only process CALL options for growth tab
  checked.forEach(function(i) {
    var r = rows[i];
    if (!r) return;
    if (r.optionType !== 'call') return;

    if (r.transCode === 'BTO') {
      // BTO CALL → LCALL → goes on LEFT side as long call
      var l = {
        id: uid(), ticker: r.ticker, contracts: r.contracts,
        longStrike: r.strike, longPremium: r.premium, longExpiry: r.expiry,
        openDate: r.openDate, notes: '', noLongCall: false, shortCalls: [], closed: false
      };
      callLadders.unshift(l);
      growthExpandedIds.add(l.id);
      imported++;

    } else if (r.transCode === 'STO') {
      // STO CALL → SCALL → RIGHT side, pair to LCALL where SCALL expiry <= LCALL expiry, with capacity
      var normD = function(ds){if(!ds)return null;try{var d=new Date(ds);return isNaN(d)?null:d;}catch(e){return null;}};
      var incomingC = r.contracts || 1;
      var hasCallCap = function(x) {
        var cap = x.contracts || 1;
        var used = (x.shortCalls || []).filter(function(sc){ return !sc.closed; })
                     .reduce(function(s,sc){ return s + (sc.contracts||1); }, 0);
        return (used + incomingC) <= cap;
      };
      var scExp = normD(r.expiry), tgt = null;
      if (scExp) {
        var bestDiff = Infinity;
        callLadders.forEach(function(x){
          if (x.ticker !== r.ticker || x.closed || x.noLongCall || x.longCallClosed) return;
          if (!hasCallCap(x)) return;
          var lcExp = normD(x.longExpiry);
          if (lcExp && lcExp >= scExp) { var diff = lcExp-scExp; if (diff < bestDiff){bestDiff=diff;tgt=x;} }
        });
      }
      if (!tgt) tgt = callLadders.find(function(x){ return x.ticker === r.ticker && !x.closed && !x.longCallClosed && hasCallCap(x); });
      if (!tgt) tgt = callLadders.find(function(x){ return x.ticker === r.ticker && !x.closed && hasCallCap(x); });
      if (!tgt) tgt = callLadders.find(function(x){ return x.ticker === r.ticker && !x.closed; });
      if (!tgt) {
        tgt = { id: uid(), ticker: r.ticker, contracts: r.contracts || 1, longStrike: null, longPremium: null, longExpiry: null, openDate: r.openDate, notes: '', noLongCall: true, shortCalls: [], closed: false };
        callLadders.unshift(tgt); growthExpandedIds.add(tgt.id);
      }
      var dup = (tgt.shortCalls || []).find(function(sc){ return sc.strike == r.strike && sc.expiry === r.expiry && sc.openDate === r.openDate; });
      if (!dup) { tgt.shortCalls.push({ id: uid(), strike: r.strike, contracts: r.contracts || 1, received: Math.abs(r.totalPremium), expiry: r.expiry, openDate: r.openDate, closed: false }); imported++; }

    } else if (r.transCode === 'BTC') {
      // BTC CALL → SCALL → RIGHT side CLOSED, with capacity check
      var normD = function(ds){if(!ds)return null;try{var d=new Date(ds);return isNaN(d)?null:d;}catch(e){return null;}};
      var incomingC = r.contracts || 1;
      var hasCallCap = function(x) {
        var cap = x.contracts || 1;
        var used = (x.shortCalls || []).filter(function(sc){ return !sc.closed; })
                     .reduce(function(s,sc){ return s + (sc.contracts||1); }, 0);
        return (used + incomingC) <= cap;
      };
      var scExp = normD(r.expiry), tgt = null;
      if (scExp) {
        var bestDiff = Infinity;
        callLadders.forEach(function(x){
          if (x.ticker !== r.ticker || x.closed || x.noLongCall || x.longCallClosed) return;
          if (!hasCallCap(x)) return;
          var lcExp = normD(x.longExpiry);
          if (lcExp && lcExp >= scExp) { var diff = lcExp-scExp; if (diff < bestDiff){bestDiff=diff;tgt=x;} }
        });
      }
      if (!tgt) tgt = callLadders.find(function(x){ return x.ticker === r.ticker && !x.closed && !x.longCallClosed && hasCallCap(x); });
      if (!tgt) tgt = callLadders.find(function(x){ return x.ticker === r.ticker && !x.closed && hasCallCap(x); });
      if (!tgt) tgt = callLadders.find(function(x){ return x.ticker === r.ticker && !x.closed; });
      if (!tgt) {
        tgt = { id: uid(), ticker: r.ticker, contracts: r.contracts || 1, longStrike: null, longPremium: null, longExpiry: null, openDate: r.openDate, notes: '', noLongCall: true, shortCalls: [], closed: false };
        callLadders.unshift(tgt); growthExpandedIds.add(tgt.id);
      }
      var existing = (tgt.shortCalls || []).find(function(sc){ return sc.strike == r.strike && !sc.closed; });
      if (existing) {
        existing.closed = true; existing.closeReason = 'buyback'; existing.closeDate = r.openDate;
        existing.buybackCost = Math.abs(r.totalPremium); existing.btcDebit = Math.abs(r.totalPremium);
      } else {
        tgt.shortCalls.push({ id: uid(), strike: r.strike, contracts: r.contracts || 1, received: 0, btcDebit: Math.abs(r.totalPremium), expiry: r.expiry, openDate: r.openDate, closed: true, closeReason: 'buyback', closeDate: r.openDate });
      }
      imported++;

    } else if (r.transCode === 'STC') {
      // STC CALL → LCALL closed → goes on RIGHT side as closed LCALL, shows as credit
      var tgt = callLadders.find(function(x){ return x.ticker === r.ticker && !x.longCallClosed && !x.noLongCall; });
      if (tgt) {
        tgt.longCallClosed = true;
        tgt.longCloseAmount = Math.abs(r.totalPremium);
        tgt.longCloseDate = r.openDate;
        tgt.stcStrike = r.strike;
        tgt.stcExpiry = r.expiry;
      } else {
        // No existing ladder — create one to record the STC
        var newL = { id: uid(), ticker: r.ticker, contracts: r.contracts || 1, longStrike: r.strike, longPremium: 0, longExpiry: r.expiry, openDate: r.openDate, notes: 'STC imported', noLongCall: false, longCallClosed: true, longCloseAmount: Math.abs(r.totalPremium), longCloseDate: r.openDate, stcStrike: r.strike, stcExpiry: r.expiry, shortCalls: [], closed: false };
        callLadders.unshift(newL);
        growthExpandedIds.add(newL.id);
      }
      imported++;
    }
  });

  saveCallLadders(); closeModal(); growthRender();
  alert('✓ Imported ' + imported + ' call option transaction(s).');
}

function saveCallLadders() {
  try {
    localStorage.setItem('roi_callladder_' + plGetPortKey(), JSON.stringify(callLadders));
  } catch(e) {}
}

function deleteVisibleCallLadders() { 
  var allSel = typeof selectedTickers === 'undefined' || selectedTickers.has('ALL');
  var visible = callLadders.filter(function(l) {
    if (growthFilterMode === 'open' && l.closed) return false;
    if (growthFilterMode === 'closed' && !l.closed) return false;
    if (!allSel && !selectedTickers.has(l.ticker)) return false;
    return true;
  });
  
  if (!visible.length) {
    alert('No visible call ladders to delete');
    return;
  }
  
  if (confirm('Delete ' + visible.length + ' visible call ladder(s)? This cannot be undone.')) {
    var visibleIds = new Set(visible.map(function(l) { return l.id; }));
    callLadders = callLadders.filter(function(l) { return !visibleIds.has(l.id); });
    saveCallLadders();
    growthRender();
    alert('✓ Deleted ' + visible.length + ' call ladder(s)');
  }
}

var _gPortKeys = ['self','spouse','joint'];
function _gPortLabel(pk) {
  if (pk==='self') return 'Amit';
  if (pk==='spouse') return 'Lovelina';
  if (pk==='joint') return 'Joint';
  if (pk==='self_roth') return 'Roth(A)';
  if (pk==='spouse_roth') return 'Roth(L)';
  if (pk==='spouse_ira') return 'IRA(L)';
  return pk;
}

function growthReloadForPortfolio() {
  try {
    var portKey = plGetPortKey();
    if (typeof ap !== 'undefined' && ap === 'all') {
      var allPortCalls = [];
      _gPortKeys.forEach(function(pk) {
        try {
          var raw = localStorage.getItem('roi_callladder_' + pk);
          var sub = (raw && JSON.parse(raw)) || [];
          if (Array.isArray(sub)) {
            sub.forEach(function(l) { l._portfolio = pk; l._portfolioLabel = _gPortLabel(pk); });
            allPortCalls = allPortCalls.concat(sub);
          }
        } catch(e) {}
      });
      callLadders = allPortCalls;
    } else if (typeof ap !== 'undefined' && ap === 'retirement' && (typeof as === 'undefined' || as === 'ret-all')) {
      var allRetirementCalls = [];
      ['self_roth','spouse_roth','spouse_ira'].forEach(function(key) {
        try {
          var raw = localStorage.getItem('roi_callladder_' + key);
          var subCalls = (raw && JSON.parse(raw)) || [];
          if (Array.isArray(subCalls)) allRetirementCalls = allRetirementCalls.concat(subCalls);
        } catch(e) {}
      });
      callLadders = allRetirementCalls;
    } else {
      var raw = localStorage.getItem('roi_callladder_' + portKey);
      callLadders = (raw && JSON.parse(raw)) || [];
      if (!Array.isArray(callLadders)) callLadders = [];
    }
  } catch(e) { callLadders = []; }
  growthExpandedIds = new Set();
  growthTickerSearch = '';
  growthRender();
}

  optsLoadData();

}

function optsLoadData() {
  var portKey = plGetPortKey();
  console.log('OPTIONS: Portfolio key =', portKey);
  
  // Load CALL ladders (from Growth tab)
  try {
    if (typeof ap !== 'undefined' && ap === 'retirement' && (typeof as === 'undefined' || as === 'ret-all')) {
      var allRetirementCalls = [];
      var retirementKeys = ['self_roth', 'spouse_roth', 'spouse_ira'];
      retirementKeys.forEach(function(key) {
        try {
          var raw = localStorage.getItem('roi_callladder_' + key);
          var subCalls = (raw && JSON.parse(raw)) || [];
          if (Array.isArray(subCalls)) {
            allRetirementCalls = allRetirementCalls.concat(subCalls);
          }
        } catch(e) {}
      });
      optsCallLadders = allRetirementCalls;
    } else {
      var callKey = 'roi_callladder_' + portKey;
      console.log('OPTIONS: Loading calls from', callKey);
      var raw = localStorage.getItem(callKey);
      optsCallLadders = (raw && JSON.parse(raw)) || [];
      if (!Array.isArray(optsCallLadders)) optsCallLadders = [];
    }
    console.log('OPTIONS: Loaded', optsCallLadders.length, 'call ladders');
  } catch(e) { 
    console.error('OPTIONS: Error loading calls:', e);
    optsCallLadders = []; 
  }

  optsPutLadders = [];
  console.log('OPTIONS: Put ladders will be loaded in Step 4');
}
