  const op=data.filter(r=>!isCl(r));
  const ci=data.reduce((s,r)=>s+(r.excelCost||0),0);
  const ig=data.filter(r=>r.excelType==='Short Put').reduce((s,r)=>s+(r.excelIncome||0),0);
  const tp=data.reduce((s,r)=>s+(r.excelProfit||0),0);
  const tc=data.reduce((s,r)=>s+collateral(r),0);
  const be=Math.max(0,ci-ig);
  const pct=ci>0?Math.min(100,Math.round((ig/ci)*100)):0;
  return{n:data.length,op:op.length,cl:data.filter(r=>isCl(r)).length,gv:data.reduce((s,r)=>s+(r.excelGrossValue||0),0),tp,ci,ig,be,pct,tc};
}

function gd(p,s){
  if(p==='lovelina')return LD;if(p==='amit')return AD;if(p==='joint')return JD;if(p==='all')return LD;
  if(p==='retirement'){if(s==='amit-roth')return AR;if(s==='lov-roth')return LR;if(s==='lov-trad')return LT;return[...AR,...LR,...LT];}
  return[];
}

function getWeeklyCollateral(data){
  const sps=data.filter(r=>r.excelType==='Short Put'&&!isCl(r)&&r.expiryDate);
  const weeks={};
  sps.forEach(r=>{
    try{
      const expDate=new Date(r.expiryDate);
      if(isNaN(expDate))return;
      const fri=getFriday(expDate);
      const key=fri.toISOString().split('T')[0];
      if(!weeks[key])weeks[key]={friday:fri,positions:[],collateral:0,income:0};
      weeks[key].positions.push(r);
      weeks[key].collateral+=r.strike*100;
      weeks[key].income+=(r.excelIncome||0);
    }catch(e){}
  });
  return Object.entries(weeks).sort((a,b)=>new Date(a[0])-new Date(b[0])).map(([k,v])=>v);
}

function getTickersFrom(data){
  return [...new Set(data.map(r=>r.ticker))].sort();
}

function getFilteredData(data){
  if(selectedTickers.has('ALL'))return data;
  return data.filter(r=>selectedTickers.has(r.ticker));
}

function rTickerFilter(data){
  const tickers=getTickersFrom(data);
  const pills=tickers.map(t=>{
    const active=selectedTickers.has('ALL')||selectedTickers.has(t);
    const bg=active?(PIL[t]||'#F3F4F6'):'transparent';
    const textColor=active?(DC[t]||'#374151'):'rgba(255,255,255,0.7)';
    const border=active?'transparent':'rgba(255,255,255,0.25)';
    return`<div class="tk-pill${active?' active':''}" data-ticker="${t}" style="background:${bg};color:${textColor};border-color:${border};">
      <span class="tk-dot" style="background:${DC[t]||'#888'}"></span>${t}
    </div>`;
  }).join('');
  const allActive=selectedTickers.has('ALL');
  return`<div class="ticker-filter-wrap">
    <span class="tf-label">Filter by ticker:</span>
    <div class="tk-pill${allActive?' active':''}" data-ticker="ALL" style="background:${allActive?'#FCD34D':'transparent'};color:${allActive?'#1E1B4B':'rgba(255,255,255,0.7)'};border-color:${allActive?'transparent':'rgba(255,255,255,0.25)'};">All Tickers</div>
    ${pills}
  </div>`;
}

function rSum(s){
  const bc2=s.be<=0?'var(--green)':'var(--red)';
  return`<div class="summary-grid">
    <div class="scard sc-blue"><div class="scard-label">Total Positions</div><div class="scard-val">${s.n}</div><div class="scard-sub">${s.op} open &middot; ${s.cl} closed</div></div>
    <div class="scard sc-purple"><div class="scard-label">Capital Invested</div><div class="scard-val">$${s.ci.toLocaleString()}</div><div class="scard-sub">Total cost basis</div></div>
    <div class="scard sc-green"><div class="scard-label">Income Generated</div><div class="scard-val">+$${s.ig.toLocaleString()}</div><div class="scard-sub">Short put premium</div></div>
    <div class="scard sc-pink"><div class="scard-label">Total P&L</div><div class="scard-val" style="color:${s.tp>=0?'var(--green)':'var(--red)'}">${fp(s.tp)}</div><div class="scard-sub">All positions</div></div>
    <div class="scard sc-cyan"><div class="scard-label">Portfolio Value</div><div class="scard-val">$${s.gv.toLocaleString()}</div><div class="scard-sub">Gross market value</div></div>
    <div class="scard sc-orange"><div class="scard-label">Total Collateral</div><div class="scard-val">$${s.tc.toLocaleString()}</div><div class="scard-sub">Open short puts &times;100</div></div>
  </div>
  <div class="be-card">
    <div class="be-header"><div class="be-title">&#9889; Breakeven Tracker</div><div class="be-pct">${s.pct}% recovered</div></div>
    <div class="be-bar-wrap"><div class="be-bar" style="width:${s.pct}%"></div></div>
    <div class="be-range"><span>$0 income</span><span>Target: $${s.ci.toLocaleString()}</span></div>
    <div class="be-nums">
      <div class="bn"><div class="bn-label">Capital Invested</div><div class="bn-val" style="color:var(--purple)">$${s.ci.toLocaleString()}</div></div>
      <div class="bn"><div class="bn-label">Income So Far</div><div class="bn-val" style="color:var(--green)">+$${s.ig.toLocaleString()}</div></div>
      <div class="bn"><div class="bn-label">${s.be<=0?'Status':'Still Need'}</div><div class="bn-val" style="color:${bc2}">${s.be<=0?'Profitable!':'$'+s.be.toLocaleString()}</div></div>
    </div>
  </div>`;
}

function rWeekly(data){
  const weeks=getWeeklyCollateral(data);
  if(!weeks.length)return'';
  const totalCol=weeks.reduce((s,w)=>s+w.collateral,0);
  const cards=weeks.map(w=>{
    const d=du(fmtDate(w.friday));
    const cls=d<=7?'soon':d<=21?'mid':'far';
    const posChips=w.positions.map(p=>`<span class="wpos-chip" style="background:${PIL[p.ticker]||'#F3F4F6'};color:${DC[p.ticker]||'#374151'}">${p.ticker} $${p.strike}</span>`).join('');
    return`<div class="wcard ${cls}">
      <div class="wcard-header">
        <div class="wcard-week">Week of ${fmtShort(w.friday)}</div>
        <div class="wcard-date">${d<=0?'Expired':d===0?'Today':d+' days'}</div>
      </div>
      <div class="wcard-collateral">$${w.collateral.toLocaleString()}</div>
      <div class="wcard-income">+$${w.income.toLocaleString()} income</div>
      <div class="wcard-positions">${posChips}</div>
    </div>`;
  }).join('');
  return`<div class="sbar">Weekly Collateral Summary <span style="font-size:0.65rem;color:var(--white70);font-weight:400;text-transform:none;">(Total: $${totalCol.toLocaleString()})</span></div>
  <div class="weekly-grid">${cards}</div>`;
}

function rTable(data){
  const filtered=(selectedTickers.has('ALL')?data:data.filter(r=>selectedTickers.has(r.ticker)))
    .filter(r=>{
      if(tf==='open'&&isCl(r))return false;
      if(tf==='closed'&&!isCl(r))return false;
      if(['Short Put','Long Put','Long Call','Shares'].includes(tf)&&r.excelType!==tf)return false;
      return true;
    }).sort((a,b)=>{
      let av=sc==='status'?(isCl(a)?1:0):a[sc],bv=sc==='status'?(isCl(b)?1:0):b[sc];
      if(typeof av==='string')av=av.toLowerCase();if(typeof bv==='string')bv=bv.toLowerCase();
      av=av==null?-Infinity:av;bv=bv==null?-Infinity:bv;return av<bv?-sd:av>bv?sd:0;
    });

  const btns=['all','open','closed','Short Put','Long Put','Long Call','Shares'].map(f=>`<button class="filt-btn${tf===f?' active':''}" data-type="${f}">${f==='all'?'All':f==='open'?'Open':f==='closed'?'Closed':f}</button>`).join('');
  const rows=filtered.length===0?`<tr><td colspan="8" class="ec">No positions match filter.</td></tr>`:filtered.map(r=>{
    const c=isCl(r),p=r.excelProfit,col=collateral(r);
    return`<tr class="${c?'cr':''}">
      <td class="mc"><span class="chip"><span class="tk-dot" style="background:${DC[r.ticker]||'#888'}"></span>${r.ticker}</span></td>
      <td><span class="badge ${bct(r.excelType)}">${r.excelType}</span></td>
      <td class="mn">${r.strike>0?'$'+r.strike:'--'}</td>
      <td class="${ec(r.expiryDate)}">${r.expiryDate||'--'}</td>
      <td class="mn" style="text-align:right">${fm(r.excelGrossValue)}</td>
      <td class="mn" style="text-align:right;font-weight:700;color:${p>=0?'var(--green)':'var(--red)'}">${fp(p)}</td>
      <td class="mn" style="text-align:right;font-weight:700;color:${col>0?'var(--orange)':'var(--text3)'}">${col>0?'$'+col.toLocaleString():'--'}</td>
      <td style="text-align:center"><span class="badge ${c?'bcl':'bop'}">${c?'Closed':'Open'}</span></td>
    </tr>`;
  }).join('');

  return`<div class="controls">
    <div class="filter-group">${btns}</div>
    <div class="count-badge">${filtered.length} of ${data.length} positions</div>
  </div>
  <div class="table-wrap">
    <table>
      <thead><tr>
        <th data-col="ticker">Ticker</th>
        <th data-col="excelType">Type</th>
        <th data-col="strike">Strike</th>
        <th data-col="expiryDate">Expiry</th>
        <th data-col="excelGrossValue" style="text-align:right">Value</th>
        <th data-col="excelProfit" style="text-align:right">P&L</th>
        <th data-col="collateral" style="text-align:right">Collateral</th>
        <th data-col="status" style="text-align:center">Status</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>
  </div>`;
}

function rBreak(data){
  if(!data.length)return'';
  const tickers=getTickersFrom(data).filter(t=>selectedTickers.has('ALL')||selectedTickers.has(t));
  return`<div class="sbar">Position Summary by Ticker</div><div class="breakdown">${tickers.map(t=>{
    const pos=data.filter(r=>r.ticker===t);
    const pnl=pos.reduce((s,r)=>s+(r.excelProfit||0),0);
    const val=pos.reduce((s,r)=>s+(r.excelGrossValue||0),0);
    const inc=pos.filter(r=>r.excelType==='Short Put').reduce((s,r)=>s+(r.excelIncome||0),0);
    const col=pos.reduce((s,r)=>s+collateral(r),0);
    const op=pos.filter(r=>!isCl(r)).length;
    return`<div class="bcard" style="border-top:3px solid ${DC[t]||'#888'}">
      <div class="bcard-h"><div class="bcard-t"><span class="tk-dot" style="background:${DC[t]||'#888'}"></span>${t}</div><div class="bcard-c">${pos.length} &middot; ${op} open</div></div>
      <div class="brow"><span>Value</span><span style="color:var(--blue)">${fm(val)}</span></div>
      <div class="brow"><span>P&L</span><span style="color:${pnl>=0?'var(--green)':'var(--red)'}">${fp(pnl)}</span></div>
      ${inc?`<div class="brow"><span>Income</span><span style="color:var(--green)">+$${inc.toLocaleString()}</span></div>`:''}
      ${col?`<div class="brow"><span>Collateral</span><span style="color:var(--orange)">$${col.toLocaleString()}</span></div>`:''}
    </div>`;
  }).join('')}</div>`;
}

function rMain(){
  const el=document.getElementById('mc');
  const data=gd(ap,as);
  const filteredData=selectedTickers.has('ALL')?data:data.filter(r=>selectedTickers.has(r.ticker));
  const s=cs(filteredData);

  if(ap==='all'&&selectedTickers.has('ALL')){
    const pc=[{key:'lovelina',label:'Lovelina',color:'#DB2777',data:LD},{key:'amit',label:'Amit',color:'#2563EB',data:AD},{key:'joint',label:'Joint',color:'#059669',data:JD},{key:'retirement',label:'Retirement',color:'#7C3AED',data:[],subs:'Amit Roth · Lovelina Roth · Lovelina Traditional'}].map(p=>{
      const ps=cs(p.data),em=p.data.length===0;
      return`<div class="pcard" onclick="sPort('${p.key}')" style="border-top:4px solid ${p.color};">
        <div class="pcard-h"><div class="pcard-dot" style="background:${p.color}"></div><div><div class="pcard-n">${p.label}</div>${p.subs?`<div class="pcard-s">${p.subs}</div>`:''}</div></div>
        ${em?`<div style="font-size:0.75rem;color:var(--text3);text-align:center;padding:0.65rem 0;border-top:1px solid #F3F4F6">No positions yet</div>`:`
        <div class="pcard-stats">
          <div class="pcs"><div class="pcs-l">Value</div><div class="pcs-v" style="color:${p.color}">$${ps.gv.toLocaleString()}</div></div>
          <div class="pcs"><div class="pcs-l">P&L</div><div class="pcs-v" style="color:${ps.tp>=0?'var(--green)':'var(--red)'}">${fp(ps.tp)}</div></div>
          <div class="pcs"><div class="pcs-l">Positions</div><div class="pcs-v" style="color:#1E1B4B">${ps.n}</div></div>
          <div class="pcs"><div class="pcs-l">Collateral</div><div class="pcs-v" style="color:var(--orange)">$${ps.tc.toLocaleString()}</div></div>
        </div>`}
      </div>`;
    }).join('');
    el.innerHTML=rSum(s)+rTickerFilter(data)+`<div class="sbar">Portfolio Overview</div><div class="port-overview">${pc}</div>`+rWeekly(data)+rTable(data)+rBreak(data);
  }else{
    const lb={lovelina:'Lovelina',amit:'Amit',joint:'Joint',retirement:'Retirement'}[ap]||ap;
    if(data.length===0){
      el.innerHTML=rSum(s)+`<div class="ph"><strong>${lb} Portfolio</strong>No positions added yet.</div>`;
    }else{
      el.innerHTML=rSum(s)+rTickerFilter(data)+rWeekly(filteredData)+rTable(data)+rBreak(data);
    }
  }

  // Ticker pill events
  document.querySelectorAll('.tk-pill').forEach(p=>{
    p.addEventListener('click',()=>{
      const t=p.dataset.ticker;
      if(t==='ALL'){selectedTickers=new Set(['ALL']);}
      else{
        selectedTickers.delete('ALL');
        if(selectedTickers.has(t))selectedTickers.delete(t);
        else selectedTickers.add(t);
        if(selectedTickers.size===0)selectedTickers=new Set(['ALL']);
      }
      rMain();
    });
  });

  document.querySelectorAll('.filt-btn').forEach(b=>b.addEventListener('click',()=>{tf=b.dataset.type;rMain();}));
  document.querySelectorAll('th[data-col]').forEach(th=>th.addEventListener('click',()=>{const col=th.dataset.col;if(sc===col)sd*=-1;else{sc=col;sd=1;}rMain();}));
}

function rBc(){
  const el=document.getElementById('bc');
  const sl={'ret-all':'All Retirement','amit-roth':'Amit - Roth IRA','lov-roth':'Lovelina - Roth IRA','lov-trad':'Lovelina - Traditional IRA'};
  const pl={all:'All Portfolios',amit:'Amit',lovelina:'Lovelina',joint:'Joint',retirement:'Retirement'};
  if(ap==='all')el.innerHTML='<span style="color:rgba(255,255,255,0.9)">All Portfolios</span>';
  else if(ap==='retirement')el.innerHTML=`<span style="color:var(--white40)">All</span> &rsaquo; <span style="color:var(--white40)">Retirement</span> &rsaquo; <span style="color:#FCD34D">${sl[as]}</span>`;
  else el.innerHTML=`<span style="color:var(--white40)">All</span> &rsaquo; <span style="color:#FCD34D">${pl[ap]}</span>`;
}

function sPort(p){
  ap=p;tf='all';selectedTickers=new Set(['ALL']);
  document.querySelectorAll('.port-tab').forEach(t=>t.classList.toggle('active',t.dataset.port===p));
  const sn=document.getElementById('sub-nav');sn.style.display=p==='retirement'?'flex':'none';
  if(p==='retirement'){as='ret-all';document.querySelectorAll('.sub-tab').forEach(t=>t.classList.toggle('active',t.dataset.sub===as));}
  rBc();rMain();
}

document.getElementById('port-nav').addEventListener('click',e=>{const t=e.target.closest('.port-tab');if(t)sPort(t.dataset.port);});
document.getElementById('sub-nav').addEventListener('click',e=>{
  const t=e.target.closest('.sub-tab');if(!t)return;
  as=t.dataset.sub;document.querySelectorAll('.sub-tab').forEach(s=>s.classList.toggle('active',s.dataset.sub===as));
  rBc();rMain();
});

document.getElementById('topbar-date').textContent=new Date().toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'});
window.sPort=sPort;rBc();rMain();
</script>
