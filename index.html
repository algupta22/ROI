const fm=n=>(n||n===0)?'$'+Math.abs(n).toLocaleString():'--';
const fp=n=>n==null?'--':(n>=0?'+':'-')+'$'+Math.abs(n).toLocaleString();
const du=s=>{if(!s)return 999;try{return Math.round((new Date(s)-now)/86400000);}catch{return 999;}};
const ec=s=>{const d=du(s);return d<=0?'es':d<=4?'es':d<=30?'em':'ef';};
function parseDate(s){if(!s)return null;try{const d=new Date(s);return isNaN(d)?null:d;}catch{return null;}}
function getTickers(data){return[...new Set(data.map(r=>r.ticker))].sort();}

// ── COLLATERAL CALCULATION ───────────────────────────────────────────────────
// For a paired spread: (LP strike - SP strike) * 100
// If SP > LP: -(SP - LP) * 100 (credit spread, limited risk shown as negative)
// No LP: SP strike * 100 (naked)
function calcSpreadCollateral(sp, lp){
  if(!sp)return 0;
  if(!lp)return sp.strike * 100; // naked
  if(lp.strike > sp.strike) return (lp.strike - sp.strike) * 100; // debit spread (LP higher = defined risk)
  if(lp.strike < sp.strike) return -(sp.strike - lp.strike) * 100; // LP lower = credit spread
  return 0; // same strike
}

// ── PAIRING LOGIC ─────────────────────────────────────────────────────────────
// For each ticker, pair each short put with the closest long put whose expiry >= SP expiry
// Unmatched long puts become independent rows
function buildSpreadPairs(data){
  const filtered=data.filter(r=>!isCl(r)||(statusFilter==='all'));
  const opts=(statusFilter==='open'?filtered.filter(r=>!isCl(r)):statusFilter==='closed'?filtered.filter(r=>isCl(r)):filtered)
    .filter(r=>selTickers.has('ALL')||selTickers.has(r.ticker));

  const tickers=getTickers(opts).filter(t=>opts.some(r=>r.ticker===t&&(r.excelType==='Short Put'||r.excelType==='Long Put')));
  const result=[];

  tickers.forEach(ticker=>{
    const sps=opts.filter(r=>r.ticker===ticker&&r.excelType==='Short Put').sort((a,b)=>{const da=parseDate(a.expiryDate),db=parseDate(b.expiryDate);return(da||0)-(db||0);});
    const lps=opts.filter(r=>r.ticker===ticker&&r.excelType==='Long Put').sort((a,b)=>{const da=parseDate(a.expiryDate),db=parseDate(b.expiryDate);return(da||0)-(db||0);});
    const usedLPs=new Set();
    const pairs=[];

    sps.forEach(sp=>{
      const spDate=parseDate(sp.expiryDate);
      // Find the closest LP whose expiry >= SP expiry and not already used
      const candidates=lps.filter(lp=>!usedLPs.has(lp.id)&&(!spDate||!parseDate(lp.expiryDate)||parseDate(lp.expiryDate)>=spDate));
      // Sort by expiry ascending (closest first)
      candidates.sort((a,b)=>{const da=parseDate(a.expiryDate),db=parseDate(b.expiryDate);return(da||0)-(db||0);});
      const matched=candidates[0]||null;
      if(matched)usedLPs.add(matched.id);
      pairs.push({sp,lp:matched,ticker});
    });

    // Remaining unmatched LPs — independent rows
    const independentLPs=lps.filter(lp=>!usedLPs.has(lp.id));
    result.push({ticker,pairs,independentLPs});
  });

  return result;
}

// ── COLLATERAL SUMMARY ────────────────────────────────────────────────────────
function calcPortfolioCollateral(spreadGroups){
  let totalNaked=0,totalSpread=0,totalIndependent=0;
  const byTicker={};
  spreadGroups.forEach(({ticker,pairs,independentLPs})=>{
    let tNaked=0,tSpread=0;
    pairs.forEach(({sp,lp})=>{
      const c=calcSpreadCollateral(sp,lp);
      if(lp){tSpread+=Math.abs(c);}else{tNaked+=c;}
    });
    byTicker[ticker]={naked:tNaked,spread:tSpread,lps:independentLPs.length};
    totalNaked+=tNaked;totalSpread+=tSpread;
  });
  return{totalNaked,totalSpread,total:totalNaked+totalSpread,byTicker};
}

function cs(data){
  const op=data.filter(r=>!isCl(r));
  const ci=data.reduce((s,r)=>s+(r.excelCost||0),0);
  const ig=data.filter(r=>r.excelType==='Short Put').reduce((s,r)=>s+(r.excelIncome||0),0);
  const tp=data.reduce((s,r)=>s+(r.excelProfit||0),0);
  const be=Math.max(0,ci-ig),pct=ci>0?Math.min(100,Math.round((ig/ci)*100)):0;
  const realized=data.filter(r=>isCl(r)).reduce((s,r)=>s+(r.excelProfit||0),0);
  const unrealized=op.reduce((s,r)=>s+(r.excelProfit||0),0);
  const tc=data.filter(r=>r.excelType==='Short Put'&&!isCl(r)&&r.strike>0).reduce((s,r)=>s+r.strike*100,0);
  return{op:op.length,cl:data.filter(r=>isCl(r)).length,gv:data.reduce((s,r)=>s+(r.excelGrossValue||0),0),tp,ci,ig,be,pct,realized,unrealized,tc};
}

// ── SPREADS VIEW ─────────────────────────────────────────────────────────────
function rSpreadsView(data){
  const spreadGroups=buildSpreadPairs(data);
  if(!spreadGroups.length||spreadGroups.every(g=>g.pairs.length===0&&g.independentLPs.length===0)){
    return`<div class="ph"><strong>No option positions to show</strong>Short puts and long puts will appear here paired by expiry.</div>`;
  }
  const collatStats=calcPortfolioCollateral(spreadGroups);

  // TOTAL COLLATERAL BANNER
  const banner=`<div class="total-collat-banner">
    <div>
      <div class="tcb-label">&#128274; Total Net Collateral Required</div>
      <div class="tcb-val" style="color:${collatStats.total>0?'#FB923C':'var(--green)'}">$${collatStats.total.toLocaleString()}</div>
      <div class="tcb-sub">Net after long put offsets</div>
    </div>
    <div class="tcb-breakdown">
      <div class="tcb-item"><div class="tcb-item-val" style="color:#FB923C;">$${collatStats.totalNaked.toLocaleString()}</div><div class="tcb-item-label">Naked SP</div></div>
      <div class="tcb-item"><div class="tcb-item-val" style="color:var(--purple);">$${collatStats.totalSpread.toLocaleString()}</div><div class="tcb-item-label">Spread Risk</div></div>
    </div>
  </div>`;

  // PER-TICKER COLLATERAL CARDS
  const tickerCards=`<div class="collat-summary">${spreadGroups.filter(g=>g.pairs.length>0||g.independentLPs.length>0).map(({ticker,pairs,independentLPs})=>{
    const stats=collatStats.byTicker[ticker]||{naked:0,spread:0};
    const total=stats.naked+stats.spread;
    const nakedCount=pairs.filter(p=>!p.lp).length;
    const pairedCount=pairs.filter(p=>p.lp).length;
    return`<div class="collat-card">
      <div class="collat-card-header">
        <span class="sgh-dot" style="background:${DC[ticker]||'#888'};width:10px;height:10px;border-radius:50%;"></span>
        <span class="collat-ticker">${ticker}</span>
      </div>
      <div class="collat-row"><span>Net Collateral</span><span style="color:${total>0?'var(--orange)':'var(--green)'}">${total>0?'$'+total.toLocaleString():'$0'}</span></div>
      ${stats.naked>0?`<div class="collat-row"><span>Naked SP</span><span style="color:var(--red)">$${stats.naked.toLocaleString()}</span></div>`:''}
      ${stats.spread>0?`<div class="collat-row"><span>Spread Risk</span><span style="color:var(--purple)">$${stats.spread.toLocaleString()}</span></div>`:''}
      <div class="collat-row"><span>Paired</span><span>${pairedCount} spread${pairedCount!==1?'s':''}</span></div>
      ${nakedCount?`<div class="collat-row"><span>Naked</span><span style="color:var(--red)">${nakedCount} put${nakedCount!==1?'s':''}</span></div>`:''}
    </div>`;
  }).join('')}</div>`;

  // SPREAD PAIRS TABLE
  const groups=`<div class="spreads-wrap">${spreadGroups.filter(g=>g.pairs.length>0||g.independentLPs.length>0).map(({ticker,pairs,independentLPs})=>`<div class="spread-group">
    ${pairs.map(({sp,lp})=>{
      const c=calcSpreadCollateral(sp,lp);
      const cLabel=lp?`Spread: ${lp.strike>sp.strike?'(LP-SP)×100':'(SP-LP)×100'}`:'Naked SP';
      const cColor=!lp?'var(--red)':Math.abs(c)<sp.strike*100?'var(--purple)':'var(--blue)';
      const isNaked=!lp;
      const spDate=sp.expiryDate||'--';
      const lpDate=lp?lp.expiryDate:'';
      const isProj=lp&&lpDate!==spDate;
      const badgeType=isNaked?'badge-naked':lp&&lp.strike>sp.strike?'badge-spread':'badge-spread';

      // GROUP HEADER per short put row
      const header=`<div class="spread-group-header">
        <span class="sgh-dot" style="background:${DC[ticker]||'#888'};width:8px;height:8px;border-radius:50%;display:inline-block;"></span>
        <span class="sgh-ticker">${ticker}</span>
        <span class="sgh-exp" style="color:var(--text3);">SP Expiry: <strong class="${ec(sp.expiryDate)}">${spDate}</strong>${lp&&isProj?` · LP Expiry: <strong class="${ec(lp.expiryDate)}">${lpDate}</strong>`:''}</span>
        <span class="badge ${badgeType}" style="margin-left:0.5rem;">${isNaked?'Naked Put':'Put Spread'}</span>
        <span class="sgh-collat" style="color:${cColor};">${c>0?'+':''}$${Math.abs(c).toLocaleString()}</span>
        <span style="font-size:0.6rem;color:var(--text3);margin-left:0.25rem;">${cLabel}</span>
      </div>`;

      // LEFT = short put, RIGHT = long put
      const leftCell=`<div class="sp-cell short">
        <div class="sp-type short-type">&#8595; Short Put</div>
        <div class="sp-ticker"><span class="tk-dot-sm" style="background:${DC[sp.ticker]||'#888'}"></span>${sp.ticker}</div>
        <div class="sp-detail-row">
          <span class="sp-detail-item"><span class="sp-detail-label">Strike</span><span class="sp-detail-val">&nbsp;$${sp.strike}</span></span>
          <span class="sp-detail-item"><span class="sp-detail-label">Exp</span><span class="sp-detail-val sp-detail-val ${ec(sp.expiryDate)}">&nbsp;${sp.expiryDate||'--'}</span></span>
        </div>
        <div class="sp-income">+$${(sp.excelIncome||0).toLocaleString()} income</div>
        <span class="badge ${isCl(sp)?'bcl':'bop'}" style="margin-top:3px;">${isCl(sp)?'Closed':'Open'}</span>
      </div>`;

      const rightCell=lp?`<div class="sp-cell long">
        <div class="sp-type long-type">&#8593; Long Put${isProj?' <span style="color:var(--yellow);font-size:0.57rem;">(diff expiry)</span>':''}</div>
        <div class="sp-ticker"><span class="tk-dot-sm" style="background:${DC[lp.ticker]||'#888'}"></span>${lp.ticker}</div>
        <div class="sp-detail-row">
          <span class="sp-detail-item"><span class="sp-detail-label">Strike</span><span class="sp-detail-val">&nbsp;$${lp.strike}</span></span>
          <span class="sp-detail-item"><span class="sp-detail-label">Exp</span><span class="sp-detail-val ${ec(lp.expiryDate)}">&nbsp;${lp.expiryDate||'--'}</span></span>
        </div>
        <div class="sp-cost">-$${(lp.excelCost||0).toLocaleString()} cost</div>
        <span class="badge ${isCl(lp)?'bcl':'bop'}" style="margin-top:3px;">${isCl(lp)?'Closed':'Open'}</span>
      </div>`
      :`<div class="sp-cell empty"><span class="sp-empty-msg">No long put hedge</span></div>`;

      return header+`<div class="spread-row">${leftCell}<div class="sp-divider"><div class="sp-divider-inner">vs</div></div>${rightCell}</div>`;
    }).join('')}
    ${independentLPs.map(lp=>`
      <div class="independent-row">
        <div class="independent-label">&#128204; Independent Long Put — no short put paired</div>
        <div style="display:flex;align-items:center;gap:1rem;flex-wrap:wrap;">
          <span class="sp-ticker"><span class="tk-dot-sm" style="background:${DC[lp.ticker]||'#888'}"></span>${lp.ticker}</span>
          <span style="font-size:0.72rem;color:var(--text2);">Strike: <strong>$${lp.strike}</strong></span>
          <span style="font-size:0.72rem;color:${ec(lp.expiryDate)==='es'?'var(--red)':ec(lp.expiryDate)==='em'?'var(--yellow)':'var(--text2)'};">Expiry: <strong>${lp.expiryDate||'--'}</strong></span>
          <span class="sp-cost">-$${(lp.excelCost||0).toLocaleString()} cost</span>
          <span class="badge ${isCl(lp)?'bcl':'bop'}">${isCl(lp)?'Closed':'Open'}</span>
        </div>
      </div>`).join('')}
  </div>`).join('')}</div>`;

  return banner+tickerCards+groups;
}

function rMain(){
  const el=document.getElementById('mc');
  const data=getData();
  const s=cs(data);
  const fb=rFilterBar(data);
  if(activeView==='spreads'){
    el.innerHTML=fb+rSum(s)+`<div class="sbar">Spreads / Risk View — Put Pairs by Expiry</div>`+rSpreadsView(data);
  }else{
    el.innerHTML=fb+rSum(s)+`<div class="sbar">All Positions</div>`+rPositionsView(data);
  }
  attachEv();
}

function attachEv(){
  document.querySelectorAll('.ticker-dd-item').forEach(item=>{
    item.addEventListener('click',e=>{
      e.stopPropagation();const t=item.dataset.ddticker;
      if(t==='ALL'){selTickers=new Set(['ALL']);}
      else{selTickers.delete('ALL');if(selTickers.has(t))selTickers.delete(t);else selTickers.add(t);if(selTickers.size===0)selTickers=new Set(['ALL']);}
      rMain();setTimeout(()=>{const d=document.getElementById('tkdrop');if(d){d.classList.add('open');ddOpen=true;}},10);
    });
  });
  document.querySelectorAll('.sel-tag-x').forEach(x=>{x.addEventListener('click',e=>{e.stopPropagation();selTickers.delete(x.dataset.xticker);if(selTickers.size===0)selTickers=new Set(['ALL']);rMain();});});
  document.querySelectorAll('.status-tab').forEach(b=>b.addEventListener('click',()=>{statusFilter=b.dataset.sf;rMain();}));
}

function toggleDD(){ddOpen=!ddOpen;const d=document.getElementById('tkdrop');if(d)d.classList.toggle('open',ddOpen);}
document.addEventListener('click',e=>{if(!e.target.closest('#tkwrap')){ddOpen=false;const d=document.getElementById('tkdrop');if(d)d.classList.remove('open');}});

document.getElementById('port-nav').addEventListener('click',e=>{
  const t=e.target.closest('.port-tab');if(!t)return;
  ap=t.dataset.port;selTickers=new Set(['ALL']);

  const sn=document.getElementById('sub-nav');sn.style.display=ap==='retirement'?'flex':'none';
  rBc();rMain();
});

  const t=e.target.closest('.sub-tab');if(!t)return;
  as=t.dataset.sub;document.querySelectorAll('.sub-tab').forEach(s=>s.classList.toggle('active',s.dataset.sub===as));
  rBc();rMain();
});
document.querySelector('.view-nav').addEventListener('click',e=>{
  const t=e.target.closest('.view-tab');if(!t)return;
  activeView=t.dataset.view;
  document.querySelectorAll('.view-tab').forEach(v=>v.classList.toggle('active',v.dataset.view===activeView));
  rMain();
});

function rBc(){
  const el=document.getElementById('bc');
  const sl={'ret-all':'All Retirement','amit-roth':'Amit - Roth IRA','lov-roth':'Lovelina - Roth IRA','lov-trad':'Lovelina - Traditional IRA'};
  const pl={all:'All Portfolios',amit:'Amit',lovelina:'Lovelina',joint:'Joint',retirement:'Retirement'};
  if(ap==='all')el.innerHTML='<span>All Portfolios</span>';
  else if(ap==='retirement')el.innerHTML=`<span style="color:var(--text3)">All</span> &rsaquo; <span style="color:var(--text3)">Retirement</span> &rsaquo; <span style="color:var(--red)">${sl[as]}</span>`;
  else el.innerHTML=`<span style="color:var(--text3)">All</span> &rsaquo; <span style="color:var(--red)">${pl[ap]}</span>`;
}
window.toggleDD=toggleDD;
document.getElementById('topbar-date').textContent=new Date().toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'});
rBc();rMain();
</script>
