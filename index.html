<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>R.O.I — Portfolio Dashboard</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0A0A0B;--bg2:#111113;--bg3:#18181C;--bg4:#222228;--bg5:#2A2A32;
  --gold:#C9A84C;--gold-light:#E8C96A;--gold-dim:#8A6E30;
  --border:rgba(201,168,76,0.12);--border2:rgba(201,168,76,0.28);
  --text:#F0EDE6;--text2:#9A9590;--text3:#5C5955;
  --green:#2FBF6A;--green-bg:rgba(47,191,106,0.1);
  --red:#E04A4A;--red-bg:rgba(224,74,74,0.1);
  --blue:#4A9EE0;--blue-bg:rgba(74,158,224,0.1);
  --r:10px;
}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;font-size:14px;line-height:1.5;min-height:100vh;}

/* TOP NAV */
.topbar{background:var(--bg2);border-bottom:0.5px solid var(--border);padding:0 1.5rem;display:flex;align-items:center;justify-content:space-between;height:52px;position:sticky;top:0;z-index:100;}
.logo{font-size:1rem;font-weight:800;color:var(--gold);letter-spacing:0.06em;}
.logo-sub{font-size:0.7rem;color:var(--text3);font-weight:400;margin-left:0.5rem;}
.topbar-right{font-size:0.72rem;color:var(--text3);font-family:monospace;}

/* PORTFOLIO NAV */
.port-nav{background:var(--bg2);border-bottom:0.5px solid var(--border);padding:0 1.5rem;display:flex;align-items:stretch;gap:0;overflow-x:auto;}
.port-tab{display:flex;align-items:center;gap:0.4rem;padding:0 1.1rem;height:42px;font-size:0.8rem;font-weight:600;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;transition:all 0.15s;white-space:nowrap;letter-spacing:0.03em;text-transform:uppercase;user-select:none;}
.port-tab:hover{color:var(--text2);}
.port-tab.active{color:var(--gold);border-bottom-color:var(--gold);}
.tab-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.dot-all{background:var(--gold);}
.dot-amit{background:#4A9EE0;}
.dot-lovelina{background:#E04A4A;}
.dot-joint{background:#2FBF6A;}
.dot-retirement{background:#9B59B6;}
.chevron{font-size:0.65rem;opacity:0.5;margin-left:2px;}

/* SUB NAV */
.sub-nav{background:var(--bg3);border-bottom:0.5px solid var(--border);padding:0 1.5rem;display:flex;align-items:stretch;gap:0;overflow-x:auto;}
.sub-tab{display:flex;align-items:center;gap:0.5rem;padding:0 1rem;height:36px;font-size:0.72rem;font-weight:600;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;transition:all 0.15s;white-space:nowrap;text-transform:uppercase;letter-spacing:0.03em;user-select:none;}
.sub-tab:hover{color:var(--text2);}
.sub-tab.active{color:var(--gold);border-bottom-color:var(--gold);}
.owner-badge{background:var(--bg4);border-radius:3px;padding:1px 6px;font-size:0.65rem;color:var(--text3);}
.sub-tab.active .owner-badge{color:var(--gold-dim);}

/* BREADCRUMB */
.breadcrumb{padding:0.6rem 1.5rem;font-size:0.72rem;color:var(--text3);display:flex;align-items:center;gap:0.4rem;background:var(--bg);border-bottom:0.5px solid var(--border);}
.breadcrumb span{color:var(--text2);}
.sep{opacity:0.3 !important;color:var(--text3) !important;}

/* MAIN */
.main{padding:1.25rem 1.5rem;}

/* SUMMARY CARDS */
.summary{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:1px;background:var(--border);border:0.5px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:1.25rem;}
.scard{background:var(--bg2);padding:0.9rem 1.1rem;}
.scard-label{font-size:0.67rem;color:var(--text3);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:0.35rem;}
.scard-val{font-size:1.25rem;font-weight:700;font-family:monospace;line-height:1;}
.scard-sub{font-size:0.67rem;color:var(--text3);margin-top:0.2rem;}
.pos{color:var(--green);}
.neg{color:var(--red);}
.gold{color:var(--gold);}

/* CONTROLS */
.controls{display:flex;gap:0.75rem;margin-bottom:1rem;flex-wrap:wrap;align-items:center;}
.filter-group{display:flex;gap:3px;background:var(--bg3);border:0.5px solid var(--border);border-radius:6px;padding:3px;flex-wrap:wrap;}
.filt-btn{background:transparent;border:none;color:var(--text2);padding:0.3rem 0.65rem;border-radius:4px;font-size:0.72rem;font-weight:600;cursor:pointer;letter-spacing:0.04em;transition:all 0.15s;text-transform:uppercase;}
.filt-btn.active{background:var(--bg4);color:var(--gold);}
.filt-btn:hover:not(.active){color:var(--text);}
.search-input{background:var(--bg3);border:0.5px solid var(--border);color:var(--text);padding:0.4rem 0.8rem;border-radius:6px;font-size:0.78rem;outline:none;min-width:160px;}
.search-input::placeholder{color:var(--text3);}
.search-input:focus{border-color:var(--gold-dim);}
.count-badge{margin-left:auto;font-size:0.72rem;color:var(--text3);background:var(--bg3);border:0.5px solid var(--border);padding:0.3rem 0.75rem;border-radius:6px;}

/* TABLE */
.table-wrap{border:0.5px solid var(--border);border-radius:var(--r);overflow:hidden;overflow-x:auto;margin-bottom:1.25rem;}
table{width:100%;border-collapse:collapse;min-width:820px;}
thead{background:var(--bg3);}
th{padding:0.65rem 1rem;font-size:0.67rem;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.1em;text-align:left;border-bottom:0.5px solid var(--border);white-space:nowrap;cursor:pointer;user-select:none;}
th:hover{color:var(--text2);}
th.sorted{color:var(--gold);}
tbody tr{border-bottom:0.5px solid var(--border);transition:background 0.1s;}
tbody tr:last-child{border-bottom:none;}
tbody tr:hover{background:var(--bg3);}
tr.closed-row{opacity:0.5;}
td{padding:0.6rem 1rem;font-size:0.8rem;color:var(--text2);white-space:nowrap;}
td.main-cell{color:var(--text);font-weight:600;}
td.mono{font-family:monospace;}

/* BADGES */
.badge{display:inline-flex;align-items:center;padding:0.15rem 0.5rem;border-radius:4px;font-size:0.65rem;font-weight:700;letter-spacing:0.05em;text-transform:uppercase;}
.badge-sp{background:var(--red-bg);color:var(--red);}
.badge-lp{background:var(--blue-bg);color:var(--blue);}
.badge-lc{background:var(--green-bg);color:var(--green);}
.badge-sh{background:rgba(201,168,76,0.1);color:var(--gold);}
.badge-cl{background:var(--bg4);color:var(--text3);}
.badge-op{background:var(--green-bg);color:var(--green);}

.ticker-chip{display:inline-flex;align-items:center;gap:0.4rem;font-weight:700;font-size:0.8rem;color:var(--text);}
.t-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.t-PLTR{background:#7C5CE4;}.t-MSFT{background:#4A9EE0;}.t-GOOGL{background:#E8A84C;}
.t-NVDX{background:#2FBF6A;}.t-SOFI{background:#E04A4A;}.t-TSLL{background:#E4C15C;}
.t-NVTS{background:#B0A090;}.t-METU{background:#9090C0;}

.expiry-soon{color:var(--red);font-weight:600;}
.expiry-mid{color:var(--gold);}
.expiry-far{color:var(--text2);}

/* BREAKDOWN */
.section-bar{font-size:0.68rem;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:var(--text3);padding:0.5rem 0;margin-bottom:0.75rem;border-bottom:0.5px solid var(--border);}
.breakdown{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:1rem;margin-bottom:1.5rem;}
.bcard{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--r);padding:1rem 1.1rem;transition:border-color 0.15s;}
.bcard:hover{border-color:var(--border2);}
.bcard-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:0.8rem;}
.bcard-ticker{font-weight:700;font-size:0.9rem;display:flex;align-items:center;gap:0.5rem;}
.bcard-count{font-size:0.67rem;color:var(--text3);}
.bcard-row{display:flex;justify-content:space-between;font-size:0.73rem;padding:0.22rem 0;border-bottom:0.5px solid var(--border);}
.bcard-row:last-child{border-bottom:none;}
.bcard-row span:first-child{color:var(--text3);}
.bcard-row span:last-child{font-family:monospace;font-weight:600;}

/* PORTFOLIO OVERVIEW */
.port-overview{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:1rem;margin-bottom:1.5rem;}
.port-card{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--r);padding:1.25rem;cursor:pointer;transition:all 0.15s;}
.port-card:hover{border-color:var(--border2);background:var(--bg3);}
.port-card-header{display:flex;align-items:center;gap:0.6rem;margin-bottom:1rem;}
.port-card-dot{width:10px;height:10px;border-radius:50%;}
.port-card-name{font-weight:700;font-size:0.95rem;}
.port-card-sub{font-size:0.7rem;color:var(--text3);margin-top:2px;}
.port-card-stats{display:grid;grid-template-columns:1fr 1fr;gap:0.5rem;}
.pcs{background:var(--bg3);border-radius:6px;padding:0.5rem 0.75rem;}
.pcs-label{font-size:0.62rem;color:var(--text3);text-transform:uppercase;letter-spacing:0.06em;}
.pcs-val{font-size:1rem;font-weight:700;font-family:monospace;margin-top:1px;}

.empty-cell{text-align:center;padding:3rem;color:var(--text3);font-size:0.85rem;}
.placeholder-msg{background:var(--bg2);border:0.5px dashed var(--border2);border-radius:var(--r);padding:2.5rem;text-align:center;color:var(--text3);}
.placeholder-msg strong{display:block;color:var(--text2);font-size:1rem;margin-bottom:0.5rem;}

/* RESPONSIVE */
@media(max-width:600px){
  .topbar{padding:0 1rem;}
  .port-nav,.sub-nav{padding:0 0.5rem;}
  .main{padding:1rem;}
  .count-badge{display:none;}
}
</style>

// ── HELPERS ──────────────────────────────────────────────────────────────────
function isClosed(r){ return r.closed === true || r.contractClosed === true; }
function fmt(n){ return (n === undefined || n === null || n === 0) ? '—' : '$' + Math.abs(n).toLocaleString(); }
function fmtPnl(n){ return (n === undefined || n === null) ? '—' : (n >= 0 ? '+' : '-') + '$' + Math.abs(n).toLocaleString(); }
function daysUntil(s){
  if (!s || s === '—') return 999;
  try { return Math.round((new Date(s) - today) / 86400000); } catch { return 999; }
}
function expiryClass(s){ const d = daysUntil(s); return d <= 4 ? 'expiry-soon' : d <= 30 ? 'expiry-mid' : 'expiry-far'; }
function badgeClass(t){ return t==='Short Put'?'badge-sp':t==='Long Put'?'badge-lp':t==='Long Call'?'badge-lc':'badge-sh'; }

function calcStats(data){
  const open   = data.filter(r => !isClosed(r));
  const closed = data.filter(r => isClosed(r));
  return {
    total:      data.length,
    open:       open.length,
    closed:     closed.length,
    totalGross: data.reduce((s,r) => s + (r.excelGrossValue || 0), 0),
    totalPnl:   data.reduce((s,r) => s + (r.excelProfit || 0), 0),
    openPnl:    open.reduce((s,r) => s + (r.excelProfit || 0), 0),
    income:     data.filter(r => r.excelType === 'Short Put').reduce((s,r) => s + (r.excelIncome || 0), 0)
  };
}

  if (port === 'joint')    return JOINT_DATA;
  if (port === 'retirement'){
    if (sub === 'amit-roth')            return AMIT_ROTH_DATA;
    if (sub === 'lovelina-roth')        return LOVELINA_ROTH_DATA;
    if (sub === 'lovelina-traditional') return LOVELINA_TRADITIONAL_DATA;
    return [...AMIT_ROTH_DATA, ...LOVELINA_ROTH_DATA, ...LOVELINA_TRADITIONAL_DATA];
  }
  return [];
}

// ── RENDER HELPERS ────────────────────────────────────────────────────────────
function renderSummaryCards(stats){
  return `<div class="summary">
    <div class="scard"><div class="scard-label">Total Positions</div><div class="scard-val gold">${stats.total}</div><div class="scard-sub">${stats.open} open · ${stats.closed} closed</div></div>
    <div class="scard"><div class="scard-label">Portfolio Value</div><div class="scard-val gold">$${stats.totalGross.toLocaleString()}</div><div class="scard-sub">Gross market value</div></div>
    <div class="scard"><div class="scard-label">Total P&amp;L</div><div class="scard-val ${stats.totalPnl>=0?'pos':'neg'}">${fmtPnl(stats.totalPnl)}</div><div class="scard-sub">All positions</div></div>
    <div class="scard"><div class="scard-label">Open P&amp;L</div><div class="scard-val ${stats.openPnl>=0?'pos':'neg'}">${fmtPnl(stats.openPnl)}</div><div class="scard-sub">${stats.open} open positions</div></div>
    <div class="scard"><div class="scard-label">Premium Income</div><div class="scard-val pos">+$${stats.income.toLocaleString()}</div><div class="scard-sub">Short put collected</div></div>
  </div>`;
}

function renderTable(data){
  const filtered = data.filter(r => {
    if (typeFilter === 'open'   && isClosed(r))  return false;
    if (typeFilter === 'closed' && !isClosed(r)) return false;
    if (['Short Put','Long Put','Long Call','Shares'].includes(typeFilter) && r.excelType !== typeFilter) return false;
    if (searchTerm && !(r.ticker||'').toLowerCase().includes(searchTerm)) return false;
    return true;
  }).sort((a,b) => {
    let av = sortCol === 'status' ? (isClosed(a)?1:0) : a[sortCol];
    let bv = sortCol === 'status' ? (isClosed(b)?1:0) : b[sortCol];
    if (typeof av === 'string') av = av.toLowerCase();
    if (typeof bv === 'string') bv = bv.toLowerCase();
    av = av ?? -Infinity; bv = bv ?? -Infinity;
    return av < bv ? -sortDir : av > bv ? sortDir : 0;
  });

  const rows = filtered.length === 0
    ? `<tr><td colspan="7" class="empty-cell">No positions match your filter.</td></tr>`
    : filtered.map(r => {
        const cl  = isClosed(r);
        const pnl = r.excelProfit;
        return `<tr class="${cl?'closed-row':''}">
          <td class="main-cell"><span class="ticker-chip"><span class="t-dot t-${r.ticker}"></span>${r.ticker}</span></td>
          <td><span class="badge ${badgeClass(r.excelType)}">${r.excelType}</span></td>
          <td class="mono">${r.strike > 0 ? '$'+r.strike : '—'}</td>
          <td class="${expiryClass(r.expiryDate)}">${r.expiryDate || '—'}</td>
          <td class="mono" style="text-align:right">${fmt(r.excelGrossValue)}</td>
          <td class="mono ${pnl>=0?'pos':'neg'}" style="text-align:right;font-weight:600">${fmtPnl(pnl)}</td>
          <td style="text-align:center"><span class="badge ${cl?'badge-cl':'badge-op'}">${cl?'Closed':'Open'}</span></td>
        </tr>`;
      }).join('');

  return `
    <div class="controls">
      <div class="filter-group">
        ${['all','open','closed','Short Put','Long Put','Long Call','Shares'].map(f =>
          `<button class="filt-btn${typeFilter===f?' active':''}" data-type="${f}">${f==='all'?'All':f==='open'?'Open':f==='closed'?'Closed':f}</button>`
        ).join('')}
      </div>
      <input class="search-input" type="text" placeholder="Search ticker…" value="${searchTerm}" id="ticker-search">
      <div class="count-badge">${filtered.length} of ${data.length} positions</div>
    </div>
    <div class="table-wrap">
      <table>
        <thead><tr>
          <th data-col="ticker">Ticker</th>
          <th data-col="excelType">Type</th>
          <th data-col="strike">Strike</th>
          <th data-col="expiryDate">Expiry</th>
          <th data-col="excelGrossValue" style="text-align:right">Gross Value</th>
          <th data-col="excelProfit" style="text-align:right">P&amp;L</th>
          <th data-col="status" style="text-align:center">Status</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
}

function renderBreakdown(data){
  if (!data.length) return '';
  const tickers = [...new Set(data.map(r => r.ticker))].sort();
  const cards = tickers.map(t => {
    const pos  = data.filter(r => r.ticker === t);
    const pnl  = pos.reduce((s,r) => s + (r.excelProfit || 0), 0);
    const val  = pos.reduce((s,r) => s + (r.excelGrossValue || 0), 0);
    const inc  = pos.filter(r => r.excelType === 'Short Put').reduce((s,r) => s + (r.excelIncome || 0), 0);
    const open = pos.filter(r => !isClosed(r)).length;
    return `<div class="bcard">
      <div class="bcard-head"><div class="bcard-ticker"><span class="t-dot t-${t}"></span>${t}</div><div class="bcard-count">${pos.length} pos · ${open} open</div></div>
      <div class="bcard-row"><span>Gross Value</span><span class="gold">${fmt(val)}</span></div>
      <div class="bcard-row"><span>P&amp;L</span><span class="${pnl>=0?'pos':'neg'}">${fmtPnl(pnl)}</span></div>
      ${inc ? `<div class="bcard-row"><span>Premium</span><span class="pos">+$${inc.toLocaleString()}</span></div>` : ''}
    </div>`;
  }).join('');
  return `<div class="section-bar">Position Summary by Ticker</div><div class="breakdown">${cards}</div>`;
}

function renderPlaceholder(label, subs){
  return `<div class="placeholder-msg">
    <strong>${label}</strong>
    No positions added yet.${subs ? '<br><span style="font-size:0.75rem">Sub-accounts: '+subs+'</span>' : ''}
  </div>`;
}

// ── MAIN RENDER ───────────────────────────────────────────────────────────────
function renderMain(){
  const el = document.getElementById('main-content');

  if (activePort === 'all'){
    const allStats = calcStats(LOVELINA_DATA);
    const portCards = [
      {key:'lovelina', label:'Lovelina', color:'#E04A4A', data:LOVELINA_DATA, subs:''},
      {key:'amit',     label:'Amit',     color:'#4A9EE0', data:AMIT_DATA,     subs:''},
      {key:'joint',    label:'Joint',    color:'#2FBF6A', data:JOINT_DATA,    subs:''},
      {key:'retirement',label:'Retirement',color:'#9B59B6',data:[],subs:'Amit Roth · Lovelina Roth · Lovelina Traditional'}
    ].map(p => {
      const s = calcStats(p.data);
      const empty = p.data.length === 0;
      return `<div class="port-card" onclick="switchPort('${p.key}')">
        <div class="port-card-header">
          <div class="port-card-dot" style="background:${p.color}"></div>
          <div>
            <div class="port-card-name">${p.label}</div>
            ${p.subs ? `<div class="port-card-sub">${p.subs}</div>` : ''}
          </div>
        </div>
        ${empty
          ? `<div style="font-size:0.75rem;color:var(--text3);text-align:center;padding:0.75rem 0;border-top:0.5px solid var(--border)">No positions yet — click to view</div>`
          : `<div class="port-card-stats">
              <div class="pcs"><div class="pcs-label">Value</div><div class="pcs-val gold">$${s.totalGross.toLocaleString()}</div></div>
              <div class="pcs"><div class="pcs-label">P&amp;L</div><div class="pcs-val ${s.totalPnl>=0?'pos':'neg'}">${fmtPnl(s.totalPnl)}</div></div>
              <div class="pcs"><div class="pcs-label">Positions</div><div class="pcs-val">${s.total}</div></div>
              <div class="pcs"><div class="pcs-label">Open</div><div class="pcs-val">${s.open}</div></div>
            </div>`}
      </div>`;
    }).join('');

    el.innerHTML = `
      ${renderSummaryCards(allStats)}
      <div class="section-bar">Portfolio Overview</div>
      <div class="port-overview">${portCards}</div>
      ${renderTable(LOVELINA_DATA)}
      ${renderBreakdown(LOVELINA_DATA)}`;

  } else if (activePort === 'retirement') {
    const data  = getDataFor('retirement', activeSub);
    const stats = calcStats(data);
    const subLabels = {
      'retirement-all':'All Retirement Accounts',
      'amit-roth':'Amit — Roth IRA',
      'lovelina-roth':'Lovelina — Roth IRA',
      'lovelina-traditional':'Lovelina — Traditional IRA'
    };
    el.innerHTML = `
      ${renderSummaryCards(stats)}
      ${data.length === 0
        ? renderPlaceholder(subLabels[activeSub])
        : renderTable(data) + renderBreakdown(data)}`;

  } else {
    const data  = getDataFor(activePort, '');
    const stats = calcStats(data);
    const labels = {lovelina:'Lovelina Portfolio', amit:'Amit Portfolio', joint:'Joint Portfolio'};
    el.innerHTML = `
      ${renderSummaryCards(stats)}
      ${data.length === 0
        ? renderPlaceholder(labels[activePort])
        : renderTable(data) + renderBreakdown(data)}`;
  }

  attachEvents();
}

function attachEvents(){
  document.querySelectorAll('.filt-btn').forEach(b => {
    b.addEventListener('click', () => { typeFilter = b.dataset.type; renderMain(); });
  });
  const si = document.getElementById('ticker-search');
  if (si) si.addEventListener('input', e => { searchTerm = e.target.value.toLowerCase().trim(); renderMain(); });
  document.querySelectorAll('th[data-col]').forEach(th => {
    th.addEventListener('click', () => {
      const col = th.dataset.col;
      if (sortCol === col) sortDir *= -1; else { sortCol = col; sortDir = 1; }
      renderMain();
    });
  });
}

function renderBreadcrumb(){
  const el = document.getElementById('breadcrumb');
  const subLabel = {
    'retirement-all':'All Retirement',
    'amit-roth':'Amit — Roth IRA',
    'lovelina-roth':'Lovelina — Roth IRA',
    'lovelina-traditional':'Lovelina — Traditional IRA'
  };
  const portLabel = {all:'All Portfolios',amit:'Amit',lovelina:'Lovelina',joint:'Joint',retirement:'Retirement'};
  if (activePort === 'all'){
    el.innerHTML = '<span>All Portfolios</span>';
  } else if (activePort === 'retirement'){
    el.innerHTML = `<span style="color:var(--text3)">All Portfolios</span><span class="sep"> › </span><span style="color:var(--text3)">Retirement</span><span class="sep"> › </span><span>${subLabel[activeSub]}</span>`;
  } else {
    el.innerHTML = `<span style="color:var(--text3)">All Portfolios</span><span class="sep"> › </span><span>${portLabel[activePort]}</span>`;
  }
}

function switchPort(port){
  activePort = port;
  typeFilter = 'all'; searchTerm = '';
  document.querySelectorAll('.port-tab').forEach(t => t.classList.toggle('active', t.dataset.port === port));
  const subNav = document.getElementById('sub-nav');
  subNav.style.display = port === 'retirement' ? 'flex' : 'none';
  if (port === 'retirement'){ activeSub = 'retirement-all'; document.querySelectorAll('.sub-tab').forEach(t => t.classList.toggle('active', t.dataset.sub === activeSub)); }
  renderBreadcrumb();
  renderMain();
}

// ── EVENTS ────────────────────────────────────────────────────────────────────
document.getElementById('port-nav').addEventListener('click', e => {
  const tab = e.target.closest('.port-tab');
  if (!tab) return;
  switchPort(tab.dataset.port);
});

document.getElementById('sub-nav').addEventListener('click', e => {
  const tab = e.target.closest('.sub-tab');
  if (!tab) return;
  activeSub = tab.dataset.sub;
  document.querySelectorAll('.sub-tab').forEach(t => t.classList.toggle('active', t.dataset.sub === activeSub));
  renderBreadcrumb();
  renderMain();
});

// ── INIT ──────────────────────────────────────────────────────────────────────
document.getElementById('topbar-date').textContent = new Date().toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'});
window.switchPort = switchPort;
renderBreadcrumb();
renderMain();
</script>
</body>
</html>
