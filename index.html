
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --grad:linear-gradient(135deg,#6B21A8 0%,#4F46E5 40%,#0EA5E9 100%);
  --bg:linear-gradient(135deg,#581C87 0%,#3730A3 50%,#0369A1 100%);
  --card:#ffffff;--card2:rgba(255,255,255,0.15);--card3:rgba(255,255,255,0.08);
  --border:rgba(255,255,255,0.25);--border2:rgba(255,255,255,0.5);
  --text:#1E1B4B;--text2:#3730A3;--text3:#6B7280;
  --white:#FFFFFF;--white70:rgba(255,255,255,0.7);--white40:rgba(255,255,255,0.4);
  --green:#059669;--green-bg:#ECFDF5;
  --red:#DC2626;--red-bg:#FEF2F2;
  --yellow:#D97706;--yellow-bg:#FFFBEB;
  --blue:#2563EB;--blue-bg:#EFF6FF;
  --pink:#DB2777;--pink-bg:#FDF2F8;
  --purple:#7C3AED;--purple-bg:#F5F3FF;
  --cyan:#0891B2;--cyan-bg:#ECFEFF;
  --orange:#EA580C;--orange-bg:#FFF7ED;
  --r:14px;
}
body{background:var(--bg);min-height:100vh;font-family:'Segoe UI',system-ui,sans-serif;font-size:14px;line-height:1.5;}

/* TOPBAR */
.topbar{background:rgba(255,255,255,0.12);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 1.5rem;display:flex;align-items:center;justify-content:space-between;height:56px;position:sticky;top:0;z-index:100;}
.logo{font-size:1.2rem;font-weight:900;color:var(--white);letter-spacing:0.04em;text-shadow:0 2px 8px rgba(0,0,0,0.3);}
.logo em{font-style:normal;color:#FCD34D;}
.logo-sub{font-size:0.72rem;color:var(--white70);margin-left:0.6rem;font-weight:400;}
.topbar-right{font-size:0.72rem;color:var(--white70);font-family:monospace;background:rgba(255,255,255,0.1);padding:0.3rem 0.75rem;border-radius:20px;}

/* PORT NAV */
.port-nav{background:rgba(255,255,255,0.1);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:0 1.5rem;display:flex;align-items:stretch;overflow-x:auto;}
.port-tab{display:flex;align-items:center;gap:0.4rem;padding:0 1.1rem;height:46px;font-size:0.78rem;font-weight:700;color:var(--white70);cursor:pointer;border-bottom:3px solid transparent;transition:all 0.2s;white-space:nowrap;letter-spacing:0.04em;text-transform:uppercase;}
.port-tab:hover{color:var(--white);}
.port-tab.active{color:var(--white);border-bottom-color:#FCD34D;}
.tab-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.dot-all{background:#FCD34D;}.dot-amit{background:#60A5FA;}.dot-lovelina{background:#F472B6;}.dot-joint{background:#34D399;}.dot-retirement{background:#C4B5FD;}

/* SUB NAV */
.sub-nav{background:rgba(255,255,255,0.08);border-bottom:1px solid var(--border);padding:0 1.5rem;display:flex;align-items:stretch;overflow-x:auto;}
.sub-tab{display:flex;align-items:center;gap:0.5rem;padding:0 1rem;height:38px;font-size:0.72rem;font-weight:600;color:var(--white70);cursor:pointer;border-bottom:2px solid transparent;transition:all 0.15s;white-space:nowrap;text-transform:uppercase;}
.sub-tab:hover{color:var(--white);}.sub-tab.active{color:#FCD34D;border-bottom-color:#FCD34D;}
.owner-badge{background:rgba(255,255,255,0.15);border-radius:3px;padding:1px 6px;font-size:0.65rem;color:var(--white70);}

/* BREADCRUMB */
.breadcrumb{padding:0.6rem 1.5rem;font-size:0.72rem;color:var(--white70);display:flex;align-items:center;gap:0.4rem;}

/* MAIN */
.main{padding:1.25rem 1.5rem;}

/* SUMMARY CARDS */
.summary-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:1rem;margin-bottom:1.25rem;}
.scard{background:var(--card);border-radius:var(--r);padding:1.1rem 1.25rem;box-shadow:0 4px 24px rgba(0,0,0,0.15);}
.scard-label{font-size:0.68rem;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;margin-bottom:0.4rem;}
.scard-val{font-size:1.4rem;font-weight:800;font-family:monospace;line-height:1;margin-bottom:0.2rem;}
.scard-sub{font-size:0.68rem;color:var(--text3);}
.sc-blue .scard-label{color:var(--blue);}.sc-blue .scard-val{color:var(--blue);}
.sc-purple .scard-label{color:var(--purple);}.sc-purple .scard-val{color:var(--purple);}
.sc-green .scard-label{color:var(--green);}.sc-green .scard-val{color:var(--green);}
.sc-pink .scard-label{color:var(--pink);}.sc-pink .scard-val{color:var(--pink);}
.sc-cyan .scard-label{color:var(--cyan);}.sc-cyan .scard-val{color:var(--cyan);}

/* BREAKEVEN CARD */
.be-card{background:var(--card);border-radius:var(--r);padding:1.25rem;margin-bottom:1.25rem;box-shadow:0 4px 24px rgba(0,0,0,0.15);}
.be-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;flex-wrap:wrap;gap:0.5rem;}
.be-title{font-size:0.8rem;font-weight:800;text-transform:uppercase;letter-spacing:0.08em;color:var(--purple);}
.be-pct{font-size:0.85rem;font-weight:800;color:var(--green);background:var(--green-bg);padding:0.25rem 0.75rem;border-radius:20px;}
.be-bar-wrap{background:#E5E7EB;border-radius:100px;height:12px;overflow:hidden;margin-bottom:0.5rem;}
.be-bar{height:100%;border-radius:100px;background:linear-gradient(90deg,#7C3AED,#2563EB,#059669);}
.be-range{display:flex;justify-content:space-between;font-size:0.68rem;color:var(--text3);margin-bottom:1rem;}
.be-nums{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;}
.bn{text-align:center;background:linear-gradient(135deg,#F5F3FF,#EFF6FF);border-radius:10px;padding:0.75rem 0.5rem;border:1px solid #E5E7EB;}
.bn-label{font-size:0.65rem;color:var(--text3);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:0.3rem;font-weight:600;}
.bn-val{font-size:1.05rem;font-weight:800;font-family:monospace;}

/* SECTION BAR */
.sbar{font-size:0.72rem;font-weight:800;text-transform:uppercase;letter-spacing:0.12em;color:var(--white);padding:0.5rem 0;margin-bottom:0.85rem;display:flex;align-items:center;gap:0.6rem;}
.sbar::before{content:'';width:4px;height:16px;background:#FCD34D;border-radius:2px;display:inline-block;}

/* CONTROLS */
.controls{display:flex;gap:0.75rem;margin-bottom:1rem;flex-wrap:wrap;align-items:center;}
.filter-group{display:flex;gap:3px;background:rgba(255,255,255,0.15);border:1px solid var(--border);border-radius:8px;padding:3px;flex-wrap:wrap;}
.filt-btn{background:transparent;border:none;color:var(--white70);padding:0.3rem 0.65rem;border-radius:6px;font-size:0.72rem;font-weight:700;cursor:pointer;text-transform:uppercase;transition:all 0.15s;}
.filt-btn.active{background:#FCD34D;color:#1E1B4B;}
.filt-btn:hover:not(.active){color:var(--white);}
.search-input{background:rgba(255,255,255,0.15);border:1px solid var(--border);color:var(--white);padding:0.4rem 0.8rem;border-radius:8px;font-size:0.78rem;outline:none;min-width:160px;}
.search-input::placeholder{color:var(--white40);}
.search-input:focus{border-color:rgba(255,255,255,0.6);background:rgba(255,255,255,0.2);}
.count-badge{margin-left:auto;font-size:0.72rem;color:var(--white70);background:rgba(255,255,255,0.12);border:1px solid var(--border);padding:0.3rem 0.75rem;border-radius:8px;}

/* TABLE */
.table-wrap{background:var(--card);border-radius:var(--r);overflow:hidden;overflow-x:auto;margin-bottom:1.25rem;box-shadow:0 4px 24px rgba(0,0,0,0.15);}
table{width:100%;border-collapse:collapse;min-width:820px;}
thead{background:linear-gradient(135deg,#6B21A8,#4F46E5);}
th{padding:0.75rem 1rem;font-size:0.68rem;font-weight:700;color:rgba(255,255,255,0.9);text-transform:uppercase;letter-spacing:0.1em;text-align:left;white-space:nowrap;cursor:pointer;user-select:none;}
th:hover{color:#FCD34D;}
tbody tr{border-bottom:1px solid #F3F4F6;transition:background 0.1s;}
tbody tr:last-child{border-bottom:none;}
tbody tr:hover{background:#F5F3FF;}
tr.cr{opacity:0.5;}
td{padding:0.65rem 1rem;font-size:0.8rem;color:#374151;white-space:nowrap;}
td.mc{color:#1E1B4B;font-weight:700;}
td.mn{font-family:monospace;}

/* BADGES */
.badge{display:inline-flex;align-items:center;padding:0.2rem 0.6rem;border-radius:6px;font-size:0.65rem;font-weight:700;letter-spacing:0.05em;text-transform:uppercase;}
.bsp{background:var(--pink-bg);color:var(--pink);}
.blp{background:var(--blue-bg);color:var(--blue);}
.blc{background:var(--green-bg);color:var(--green);}
.bsh{background:var(--yellow-bg);color:var(--yellow);}
.bcl{background:#F3F4F6;color:#6B7280;}
.bop{background:var(--green-bg);color:var(--green);}

.chip{display:inline-flex;align-items:center;gap:0.4rem;font-weight:700;font-size:0.82rem;color:#1E1B4B;}
.td{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.tPLTR{background:#7C3AED;}.tMSFT{background:#2563EB;}.tGOOGL{background:#D97706;}
.tNVDX{background:#059669;}.tSOFI{background:#DB2777;}.tTSLL{background:#EA580C;}
.tNVTS{background:#0891B2;}.tMETU{background:#DC2626;}
.es{color:var(--red);font-weight:700;}.em{color:var(--yellow);}.ef{color:#6B7280;}

/* BREAKDOWN */
.breakdown{display:grid;grid-template-columns:repeat(auto-fit,minmax(185px,1fr));gap:1rem;margin-bottom:1.5rem;}
.bcard{background:var(--card);border-radius:var(--r);padding:1rem 1.1rem;box-shadow:0 4px 20px rgba(0,0,0,0.12);transition:all 0.2s;cursor:default;}
.bcard:hover{transform:translateY(-3px);box-shadow:0 8px 30px rgba(0,0,0,0.2);}
.bcard-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:0.8rem;}
.bcard-t{font-weight:800;font-size:0.9rem;display:flex;align-items:center;gap:0.5rem;color:#1E1B4B;}
.bcard-c{font-size:0.67rem;color:var(--text3);}
.brow{display:flex;justify-content:space-between;font-size:0.73rem;padding:0.25rem 0;border-bottom:1px solid #F3F4F6;}
.brow:last-child{border-bottom:none;}
.brow span:first-child{color:var(--text3);}
.brow span:last-child{font-family:monospace;font-weight:700;}

/* PORT OVERVIEW */
.port-overview{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:1rem;margin-bottom:1.5rem;}
.pcard{background:var(--card);border-radius:var(--r);padding:1.25rem;cursor:pointer;transition:all 0.2s;box-shadow:0 4px 20px rgba(0,0,0,0.12);}
.pcard:hover{transform:translateY(-3px);box-shadow:0 8px 30px rgba(0,0,0,0.2);}
.pcard-h{display:flex;align-items:center;gap:0.6rem;margin-bottom:1rem;}
.pcard-dot{width:12px;height:12px;border-radius:50%;}
.pcard-n{font-weight:800;font-size:0.95rem;color:#1E1B4B;}
.pcard-s{font-size:0.68rem;color:var(--text3);margin-top:2px;}
.pcard-stats{display:grid;grid-template-columns:1fr 1fr;gap:0.5rem;}
.pcs{background:linear-gradient(135deg,#F5F3FF,#EFF6FF);border-radius:8px;padding:0.5rem 0.75rem;}
.pcs-l{font-size:0.62rem;color:var(--text3);text-transform:uppercase;letter-spacing:0.06em;}
.pcs-v{font-size:1rem;font-weight:800;font-family:monospace;margin-top:1px;}

.ph{background:rgba(255,255,255,0.15);border:1px dashed var(--border2);border-radius:var(--r);padding:2.5rem;text-align:center;color:var(--white70);}
.ph strong{display:block;color:var(--white);font-size:1rem;margin-bottom:0.5rem;}
.ec{text-align:center;padding:3rem;color:var(--text3);}
@media(max-width:600px){.main{padding:1rem;}.topbar,.port-nav,.sub-nav{padding-left:1rem;padding-right:1rem;}.count-badge{display:none;}.be-nums{grid-template-columns:1fr;}}
</style>

    +'<div class="scard sc-cyan"><div class="scard-label">Portfolio Value</div><div class="scard-val">$'+s.gv.toLocaleString()+'</div><div class="scard-sub">Gross market value</div></div>'
    +'</div>'
    +'<div class="be-card">'
    +'<div class="be-header"><div class="be-title">&#9889; Breakeven Tracker</div><div class="be-pct">'+s.pct+'% recovered</div></div>'
    +'<div class="be-bar-wrap"><div class="be-bar" style="width:'+s.pct+'%"></div></div>'
    +'<div class="be-range"><span>$0 income</span><span>Target: $'+s.ci.toLocaleString()+'</span></div>'
    +'<div class="be-nums">'
    +'<div class="bn"><div class="bn-label">Capital Invested</div><div class="bn-val" style="color:var(--purple)">$'+s.ci.toLocaleString()+'</div></div>'
    +'<div class="bn"><div class="bn-label">Income So Far</div><div class="bn-val" style="color:var(--green)">+$'+s.ig.toLocaleString()+'</div></div>'
    +'<div class="bn"><div class="bn-label">'+(s.be<=0?'Status':'Still Need')+'</div><div class="bn-val" style="color:'+bc2+'">'+(s.be<=0?'Profitable!':'$'+s.be.toLocaleString())+'</div></div>'
    +'</div></div>';
}
function rTable(data){
  const fil=data.filter(r=>{
    if(tf==='open'&&isCl(r))return false;if(tf==='closed'&&!isCl(r))return false;
    if(['Short Put','Long Put','Long Call','Shares'].includes(tf)&&r.excelType!==tf)return false;
    if(st&&!(r.ticker||'').toLowerCase().includes(st))return false;return true;
  }).sort((a,b)=>{
    let av=sc==='status'?(isCl(a)?1:0):a[sc],bv=sc==='status'?(isCl(b)?1:0):b[sc];
    if(typeof av==='string')av=av.toLowerCase();if(typeof bv==='string')bv=bv.toLowerCase();
    av=av==null?-Infinity:av;bv=bv==null?-Infinity:bv;return av<bv?-sd:av>bv?sd:0;
  });
  const btns=['all','open','closed','Short Put','Long Put','Long Call','Shares'].map(f=>'<button class="filt-btn'+(tf===f?' active':'')+'" data-type="'+f+'">'+(f==='all'?'All':f==='open'?'Open':f==='closed'?'Closed':f)+'</button>').join('');
  const rows=fil.length===0?'<tr><td colspan="7" class="ec">No positions match filter.</td></tr>':fil.map(r=>{
    const c=isCl(r),p=r.excelProfit;
    return'<tr class="'+(c?'cr':'')+'"><td class="mc"><span class="chip"><span class="td t'+r.ticker+'"></span>'+r.ticker+'</span></td><td><span class="badge '+bc(r.excelType)+'">'+r.excelType+'</span></td><td class="mn">'+(r.strike>0?'$'+r.strike:'--')+'</td><td class="'+ec(r.expiryDate)+'">'+(r.expiryDate||'--')+'</td><td class="mn" style="text-align:right">'+fm(r.excelGrossValue)+'</td><td class="mn" style="text-align:right;font-weight:700;color:'+(p>=0?'var(--green)':'var(--red)')+'">'+fp(p)+'</td><td style="text-align:center"><span class="badge '+(c?'bcl':'bop')+'">'+(c?'Closed':'Open')+'</span></td></tr>';
  }).join('');
  return'<div class="controls"><div class="filter-group">'+btns+'</div><input class="search-input" type="text" placeholder="Search ticker..." value="'+st+'" id="si"><div class="count-badge">'+fil.length+' of '+data.length+'</div></div>'
    +'<div class="table-wrap"><table><thead><tr><th data-col="ticker">Ticker</th><th data-col="excelType">Type</th><th data-col="strike">Strike</th><th data-col="expiryDate">Expiry</th><th data-col="excelGrossValue" style="text-align:right">Value</th><th data-col="excelProfit" style="text-align:right">P&L</th><th data-col="status" style="text-align:center">Status</th></tr></thead><tbody>'+rows+'</tbody></table></div>';
}
function rBreak(data){
  if(!data.length)return'';
  const tk=[...new Set(data.map(r=>r.ticker))].sort();
  const dc={PLTR:'#7C3AED',MSFT:'#2563EB',GOOGL:'#D97706',NVDX:'#059669',SOFI:'#DB2777',TSLL:'#EA580C',NVTS:'#0891B2',METU:'#DC2626'};
  return'<div class="sbar">Position Summary by Ticker</div><div class="breakdown">'+tk.map(t=>{
    const pos=data.filter(r=>r.ticker===t),pnl=pos.reduce((s,r)=>s+(r.excelProfit||0),0),val=pos.reduce((s,r)=>s+(r.excelGrossValue||0),0),inc=pos.filter(r=>r.excelType==='Short Put').reduce((s,r)=>s+(r.excelIncome||0),0),op=pos.filter(r=>!isCl(r)).length,c=dc[t]||'#888';
    return'<div class="bcard"><div class="bcard-h"><div class="bcard-t"><span class="td" style="background:'+c+'"></span>'+t+'</div><div class="bcard-c">'+pos.length+' &middot; '+op+' open</div></div><div class="brow"><span>Value</span><span style="color:var(--blue)">'+fm(val)+'</span></div><div class="brow"><span>P&L</span><span style="color:'+(pnl>=0?'var(--green)':'var(--red)')+'">'+fp(pnl)+'</span></div>'+(inc?'<div class="brow"><span>Income</span><span style="color:var(--green)">+$'+inc.toLocaleString()+'</span></div>':'')+'</div>';
  }).join('')+'</div>';
}
function rMain(){
  const el=document.getElementById('mc'),data=gd(ap,as),s=cs(data);
  if(ap==='all'){
    const pc=[{key:'lovelina',label:'Lovelina',color:'#DB2777',data:LD,subs:''},{key:'amit',label:'Amit',color:'#2563EB',data:AD,subs:''},{key:'joint',label:'Joint',color:'#059669',data:JD,subs:''},{key:'retirement',label:'Retirement',color:'#7C3AED',data:[],subs:'Amit Roth &middot; Lovelina Roth &middot; Lovelina Traditional'}].map(p=>{
      const ps=cs(p.data),em=p.data.length===0;
      return'<div class="pcard" onclick="sPort(\''+p.key+'\')" style="border-top:4px solid '+p.color+';"><div class="pcard-h"><div class="pcard-dot" style="background:'+p.color+'"></div><div><div class="pcard-n">'+p.label+'</div>'+(p.subs?'<div class="pcard-s">'+p.subs+'</div>':'')+'</div></div>'+(em?'<div style="font-size:0.75rem;color:var(--text3);text-align:center;padding:0.75rem 0;border-top:1px solid #F3F4F6">No positions yet &mdash; click to view</div>':'<div class="pcard-stats"><div class="pcs"><div class="pcs-l">Value</div><div class="pcs-v" style="color:'+p.color+'">$'+ps.gv.toLocaleString()+'</div></div><div class="pcs"><div class="pcs-l">P&L</div><div class="pcs-v" style="color:'+(ps.tp>=0?'var(--green)':'var(--red)')+'">'+fp(ps.tp)+'</div></div><div class="pcs"><div class="pcs-l">Positions</div><div class="pcs-v" style="color:#1E1B4B">'+ps.n+'</div></div><div class="pcs"><div class="pcs-l">Open</div><div class="pcs-v" style="color:#1E1B4B">'+ps.op+'</div></div></div>')+'</div>';
    }).join('');
    el.innerHTML=rSum(s)+'<div class="sbar">Portfolio Overview</div><div class="port-overview">'+pc+'</div>'+rTable(data)+rBreak(data);
  }else{
    const lb={lovelina:'Lovelina',amit:'Amit',joint:'Joint',retirement:'Retirement'}[ap]||ap;
    el.innerHTML=rSum(s)+(data.length===0?'<div class="ph"><strong>'+lb+' Portfolio</strong>No positions added yet.</div>':rTable(data)+rBreak(data));
  }
  document.querySelectorAll('.filt-btn').forEach(b=>b.addEventListener('click',()=>{tf=b.dataset.type;rMain();}));
  const si=document.getElementById('si');if(si)si.addEventListener('input',e=>{st=e.target.value.toLowerCase().trim();rMain();});
  document.querySelectorAll('th[data-col]').forEach(th=>th.addEventListener('click',()=>{const col=th.dataset.col;if(sc===col)sd*=-1;else{sc=col;sd=1;}rMain();}));
}
function rBc(){
  const el=document.getElementById('bc');
  const sl={'ret-all':'All Retirement','amit-roth':'Amit - Roth IRA','lov-roth':'Lovelina - Roth IRA','lov-trad':'Lovelina - Traditional IRA'};
  const pl={all:'All Portfolios',amit:'Amit',lovelina:'Lovelina',joint:'Joint',retirement:'Retirement'};
  if(ap==='all')el.innerHTML='<span style="color:rgba(255,255,255,0.9)">All Portfolios</span>';
  else if(ap==='retirement')el.innerHTML='<span style="color:var(--white40)">All</span> <span style="color:var(--white40)">&rsaquo;</span> <span style="color:var(--white40)">Retirement</span> <span style="color:var(--white40)">&rsaquo;</span> <span style="color:#FCD34D">'+sl[as]+'</span>';
  else el.innerHTML='<span style="color:var(--white40)">All</span> <span style="color:var(--white40)">&rsaquo;</span> <span style="color:#FCD34D">'+pl[ap]+'</span>';
}
function sPort(p){
  ap=p;tf='all';st='';
  document.querySelectorAll('.port-tab').forEach(t=>t.classList.toggle('active',t.dataset.port===p));
  const sn=document.getElementById('sub-nav');sn.style.display=p==='retirement'?'flex':'none';
  if(p==='retirement'){as='ret-all';document.querySelectorAll('.sub-tab').forEach(t=>t.classList.toggle('active',t.dataset.sub===as));}
  rBc();rMain();
}
document.getElementById('port-nav').addEventListener('click',e=>{const t=e.target.closest('.port-tab');if(t)sPort(t.dataset.port);});
document.getElementById('sub-nav').addEventListener('click',e=>{const t=e.target.closest('.sub-tab');if(!t)return;as=t.dataset.sub;document.querySelectorAll('.sub-tab').forEach(s=>s.classList.toggle('active',s.dataset.sub===as));rBc();rMain();});
document.getElementById('topbar-date').textContent=new Date().toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'});
window.sPort=sPort;rBc();rMain();
</script>
