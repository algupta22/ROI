<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>R.O.I Portfolio Dashboard</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#F5F5F5;--bg2:#FFFFFF;--bg3:#F8F8F8;--bg4:#F0F0F0;
  --card:#FFFFFF;--border:#E5E5E5;--border2:#D0D0D0;
  --red:#DC2626;--red2:#EF4444;--red-bg:#FEF2F2;
  --black:#111111;--text:#111111;--text2:#444444;--text3:#888888;
  --green:#059669;--green-bg:#ECFDF5;
  --yellow:#D97706;--yellow-bg:#FFFBEB;
  --blue:#2563EB;--blue-bg:#EFF6FF;
  --purple:#7C3AED;--purple-bg:#F5F3FF;
  --orange:#EA580C;--orange-bg:#FFF7ED;
  --r:10px;
}
html{-webkit-text-size-adjust:100%;scroll-behavior:smooth;}
body{background:var(--bg);min-height:100vh;font-family:'Segoe UI',system-ui,sans-serif;font-size:13px;line-height:1.5;color:var(--text);overscroll-behavior-y:contain;-webkit-font-smoothing:antialiased;}
/* TOPBAR */
.topbar{background:var(--black);padding:0 1.2rem;display:flex;align-items:center;justify-content:space-between;height:52px;position:sticky;top:0;z-index:100;}
.logo{font-size:1.15rem;font-weight:900;color:#fff;}.logo em{font-style:normal;color:#EF4444;}
.logo-sub{font-size:0.68rem;color:rgba(255,255,255,0.45);margin-left:0.5rem;}
.topbar-right{font-size:0.68rem;color:rgba(255,255,255,0.5);font-family:monospace;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.12);padding:0.25rem 0.65rem;border-radius:20px;}
.gh-btn{display:inline-flex;align-items:center;gap:0.3rem;border:1px solid rgba(255,255,255,0.2);border-radius:7px;padding:0.22rem 0.6rem;font-size:0.63rem;font-weight:700;cursor:pointer;transition:all 0.15s;white-space:nowrap;}
.gh-save{background:rgba(5,150,105,0.25);color:#6EE7B7;}.gh-save:hover{background:rgba(5,150,105,0.45);}
.gh-load{background:rgba(37,99,235,0.25);color:#93C5FD;}.gh-load:hover{background:rgba(37,99,235,0.45);}
.gh-cfg{background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.55);padding:0.22rem 0.5rem;font-size:0.8rem;}.gh-cfg:hover{background:rgba(255,255,255,0.18);color:#fff;}
.gh-btn:disabled{opacity:0.45;cursor:not-allowed;}
/* CASH CARD */
.cash-card{background:var(--black);border-radius:var(--r);padding:0.85rem 1rem;box-shadow:0 1px 4px rgba(0,0,0,0.12);}
.cash-lbl{font-size:0.6rem;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:rgba(255,255,255,0.5);margin-bottom:0.3rem;display:flex;align-items:center;justify-content:space-between;}
.cash-val{font-size:1.2rem;font-weight:800;font-family:monospace;color:#34D399;line-height:1;margin-bottom:0.12rem;}
.cash-sub{font-size:0.6rem;color:rgba(255,255,255,0.35);}
.cash-edt{background:none;border:none;cursor:pointer;font-size:0.62rem;color:rgba(255,255,255,0.45);padding:0;text-decoration:underline;text-decoration-style:dashed;}
.cash-edt:hover{color:#34D399;}
.cash-wrap{display:flex;align-items:center;gap:0.35rem;margin-top:0.35rem;}
.cash-inp{flex:1;background:rgba(255,255,255,0.1);border:1px solid rgba(52,211,153,0.5);border-radius:5px;padding:0.2rem 0.4rem;font-size:0.85rem;font-family:monospace;font-weight:700;outline:none;color:#fff;}
.cash-ok{background:#34D399;border:none;color:#111;cursor:pointer;font-size:0.65rem;font-weight:800;padding:0.15rem 0.4rem;border-radius:4px;}
.cash-x2{background:transparent;border:none;color:rgba(255,255,255,0.4);cursor:pointer;font-size:0.75rem;}
/* NAV */
.port-nav{background:var(--bg2);border-bottom:2px solid var(--border);padding:0 1.2rem;display:flex;align-items:stretch;overflow-x:auto;}
.port-tab{display:flex;align-items:center;gap:0.35rem;padding:0 0.9rem;height:42px;font-size:0.72rem;font-weight:700;color:var(--text3);cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-2px;transition:all 0.15s;white-space:nowrap;letter-spacing:0.04em;text-transform:uppercase;}
.port-tab:hover{color:var(--black);}.port-tab.active{color:var(--red);border-bottom-color:var(--red);}
.tab-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.dot-all{background:var(--red);}.dot-amit{background:#2563EB;}.dot-lovelina{background:#DB2877;}.dot-joint{background:#059669;}.dot-retirement{background:#7C3AED;}
.sub-nav{background:var(--bg3);border-bottom:1px solid var(--border);padding:0 1.2rem;display:flex;align-items:stretch;overflow-x:auto;}
.sub-tab{display:flex;align-items:center;gap:0.4rem;padding:0 0.9rem;height:34px;font-size:0.67rem;font-weight:600;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;transition:all 0.15s;white-space:nowrap;text-transform:uppercase;}
.sub-tab:hover{color:var(--black);}.sub-tab.active{color:var(--red);border-bottom-color:var(--red);}
.owner-badge{background:var(--bg4);border:1px solid var(--border);border-radius:3px;padding:1px 5px;font-size:0.62rem;color:var(--text3);}
.breadcrumb{padding:0.4rem 1.2rem;font-size:0.68rem;color:var(--text3);display:flex;align-items:center;gap:0.35rem;background:var(--bg2);border-bottom:1px solid var(--border);position:relative;}
.view-nav{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 1.2rem;display:flex;gap:0;}
.view-tab{display:flex;align-items:center;gap:0.35rem;padding:0 1rem;height:36px;font-size:0.72rem;font-weight:700;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;transition:all 0.15s;white-space:nowrap;text-transform:uppercase;letter-spacing:0.04em;}
.view-tab:hover{color:var(--black);}.view-tab.active{color:var(--red);border-bottom-color:var(--red);}
.main{padding:0.55rem 1.2rem;}
/* FILTER BAR */
.filter-bar{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:0.55rem 0.9rem;margin-bottom:0.85rem;display:flex;align-items:center;gap:0.65rem;flex-wrap:wrap;box-shadow:0 1px 4px rgba(0,0,0,0.06);}
.filter-bar-label{font-size:0.62rem;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.08em;white-space:nowrap;}
.ticker-select-wrap{position:relative;flex:1;min-width:180px;max-width:360px;}
.ticker-select-btn{background:var(--bg3);border:1px solid var(--border2);color:var(--text);padding:0.28rem 0.7rem;border-radius:7px;font-size:0.72rem;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:0.4rem;width:100%;justify-content:space-between;min-height:30px;}
.ticker-select-btn:hover{border-color:var(--red);}
.ticker-dropdown{position:absolute;top:calc(100% + 4px);left:0;right:0;background:#fff;border:1px solid var(--border2);border-radius:8px;box-shadow:0 8px 24px rgba(0,0,0,0.12);z-index:200;padding:0.4rem;display:none;max-height:200px;overflow-y:auto;}
.ticker-dropdown.open{display:block;}
.ticker-dd-item{display:flex;align-items:center;gap:0.5rem;padding:0.32rem 0.5rem;border-radius:5px;cursor:pointer;font-size:0.73rem;font-weight:600;color:var(--text2);transition:background 0.1s;}
.ticker-dd-item:hover{background:var(--bg3);}.ticker-dd-item.selected{background:var(--red-bg);color:var(--red);}
.ticker-dd-check{width:14px;height:14px;border:1.5px solid var(--border2);border-radius:3px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:0.6rem;}
.ticker-dd-item.selected .ticker-dd-check{background:var(--red);border-color:var(--red);color:#fff;}
.dd-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;display:inline-block;}
.sel-tags{display:flex;gap:0.3rem;flex-wrap:wrap;align-items:center;}
.sel-tag{background:var(--red-bg);border:1px solid rgba(220,38,38,0.25);color:var(--red);padding:0.12rem 0.45rem;border-radius:12px;font-size:0.63rem;font-weight:700;display:flex;align-items:center;gap:0.3rem;}
.sel-tag-x{cursor:pointer;opacity:0.6;font-size:0.58rem;}.sel-tag-x:hover{opacity:1;}
/* SUMMARY */
.summary-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(145px,1fr));gap:0.6rem;margin-bottom:0.6rem;}
.scard{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:0.85rem 1rem;box-shadow:0 1px 4px rgba(0,0,0,0.06);}
.scard-label{font-size:0.6rem;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;margin-bottom:0.3rem;}
.scard-val{font-size:1.2rem;font-weight:800;font-family:monospace;line-height:1;margin-bottom:0.12rem;}
.scard-sub{font-size:0.6rem;color:var(--text3);}
.be-mini-card{background:var(--black);border-radius:var(--r);padding:0.85rem 1rem;display:flex;flex-direction:column;justify-content:space-between;box-shadow:0 1px 4px rgba(0,0,0,0.12);}
.be-mini-label{font-size:0.6rem;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:rgba(255,255,255,0.5);margin-bottom:0.3rem;}
.be-mini-val{font-size:1.05rem;font-weight:800;font-family:monospace;line-height:1;margin-bottom:0.3rem;}
.be-mini-bar-wrap{background:rgba(255,255,255,0.15);border-radius:100px;height:5px;overflow:hidden;margin-bottom:0.2rem;}
.be-mini-bar{height:100%;border-radius:100px;background:linear-gradient(90deg,var(--red),#FB923C,var(--green));}
.be-mini-sub{font-size:0.6rem;color:rgba(255,255,255,0.4);}
.gain-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:0.85rem 1rem;box-shadow:0 1px 4px rgba(0,0,0,0.06);}
.gain-title{font-size:0.6rem;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:var(--text3);margin-bottom:0.4rem;}
.gain-row{display:flex;align-items:center;justify-content:space-between;padding:0.14rem 0;}
.gain-label{font-size:0.62rem;color:var(--text3);font-weight:600;}
.gain-val{font-size:0.9rem;font-weight:800;font-family:monospace;}
.gain-divider{height:1px;background:var(--border);margin:0.2rem 0;}
.col-combo-card{background:var(--black);border-radius:var(--r);padding:0.85rem 1rem;box-shadow:0 1px 4px rgba(0,0,0,0.12);}
.col-combo-title{font-size:0.6rem;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:rgba(255,255,255,0.5);margin-bottom:0.4rem;}
.col-combo-row{display:flex;align-items:center;justify-content:space-between;padding:0.14rem 0;}
.col-combo-label{font-size:0.62rem;color:rgba(255,255,255,0.45);font-weight:600;}
.col-combo-val{font-size:0.9rem;font-weight:800;font-family:monospace;}
.col-combo-divider{height:1px;background:rgba(255,255,255,0.1);margin:0.2rem 0;}
/* CONTROLS */
.controls-row{display:flex;gap:0.5rem;margin-bottom:0.75rem;flex-wrap:wrap;align-items:center;}
.type-tabs{display:flex;gap:2px;background:var(--bg2);border:1px solid var(--border);border-radius:9px;padding:3px;flex-wrap:wrap;box-shadow:0 1px 4px rgba(0,0,0,0.06);}
.type-tab{background:transparent;border:none;color:var(--text3);padding:0.22rem 0.55rem;border-radius:6px;font-size:0.65rem;font-weight:700;cursor:pointer;text-transform:uppercase;transition:all 0.15s;white-space:nowrap;}
.type-tab.active{background:var(--red);color:#fff;}.type-tab:hover:not(.active){color:var(--black);}
.oc-tabs{display:flex;gap:2px;background:var(--bg2);border:1px solid var(--border);border-radius:9px;padding:3px;box-shadow:0 1px 4px rgba(0,0,0,0.06);}
.oc-tab{background:transparent;border:none;color:var(--text3);padding:0.22rem 0.5rem;border-radius:6px;font-size:0.65rem;font-weight:700;cursor:pointer;text-transform:uppercase;transition:all 0.15s;}
.oc-tab.active{background:var(--black);color:#fff;}.oc-tab:hover:not(.active){color:var(--black);}
.expiry-pill{background:var(--red-bg);border:1px solid rgba(220,38,38,0.3);color:var(--red);padding:0.22rem 0.6rem;border-radius:20px;font-size:0.65rem;font-weight:700;cursor:pointer;transition:all 0.15s;white-space:nowrap;}
.expiry-pill.active{background:var(--red);color:#fff;}
.del-all-btn{background:var(--bg2);border:1px solid var(--border);color:var(--text3);padding:0.22rem 0.6rem;border-radius:7px;font-size:0.65rem;font-weight:700;cursor:pointer;margin-left:auto;}
.del-all-btn:hover{background:var(--red-bg);color:var(--red);}
/* TABLE */
.table-wrap{background:var(--card);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;overflow-x:auto;margin-bottom:0.85rem;box-shadow:0 1px 4px rgba(0,0,0,0.06);}
table{width:100%;border-collapse:collapse;min-width:700px;}
thead{background:var(--black);}
th{padding:0.4rem 0.22rem;font-size:0.52rem;font-weight:700;color:rgba(255,255,255,0.7);text-transform:uppercase;letter-spacing:0.03em;text-align:left;white-space:nowrap;cursor:pointer;user-select:none;}
th:hover{color:#EF4444;}
tbody tr{border-bottom:1px solid var(--border);transition:background 0.1s;}
tbody tr:last-child{border-bottom:none;}tbody tr:hover{background:#FAFAFA;}
tr.cr{opacity:0.4;}tr.expiring-soon{background:#FEF2F2!important;}tr.rolled{background:#F5F3FF!important;opacity:0.75;}
td{padding:0.28rem 0.22rem;font-size:0.67rem;color:var(--text2);white-space:nowrap;}
td.mc{color:var(--black);font-weight:700;}td.mn{font-family:monospace;font-size:0.67rem;}
.badge{display:inline-flex;align-items:center;padding:0.1rem 0.42rem;border-radius:4px;font-size:0.58rem;font-weight:700;letter-spacing:0.05em;text-transform:uppercase;}
.bsp{background:var(--red-bg);color:var(--red);}.blp{background:var(--blue-bg);color:var(--blue);}
.blc{background:var(--green-bg);color:var(--green);}.bsh{background:var(--yellow-bg);color:var(--yellow);}
.bcl{background:#F3F4F6;color:#9CA3AF;}
.chip{display:inline-flex;align-items:center;gap:0.35rem;font-weight:700;font-size:0.75rem;color:var(--black);}
.tk-dot-sm{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.es{color:var(--red);font-weight:700;}.em{color:var(--yellow);font-weight:600;}.ef{color:var(--text3);}
/* PRICE CELL */
.pcell{display:flex;align-items:center;gap:0.3rem;flex-wrap:wrap;}
.pcell-live{font-family:monospace;font-weight:700;font-size:0.71rem;color:var(--green);}
.pcell-manual{font-family:monospace;font-weight:700;font-size:0.71rem;color:var(--yellow);}
.pcell-none{font-size:0.68rem;color:var(--text3);font-style:italic;}
.pcell-badge{font-size:0.55rem;font-weight:700;padding:0.05rem 0.28rem;border-radius:3px;text-transform:uppercase;}
.pcell-badge-live{background:var(--green-bg);color:var(--green);}.pcell-badge-manual{background:var(--yellow-bg);color:var(--yellow);}
.pcell-edit-wrap{display:flex;align-items:center;gap:0.2rem;}
.pcell-input{width:62px;background:#fff;border:1px solid var(--red);border-radius:5px;padding:0.1rem 0.28rem;font-size:0.7rem;font-family:monospace;outline:none;color:var(--black);}
.pcell-ok{background:var(--red);border:none;color:#fff;cursor:pointer;font-size:0.6rem;padding:0.08rem 0.28rem;border-radius:3px;font-weight:700;}
.pcell-x{background:transparent;border:none;color:var(--text3);cursor:pointer;font-size:0.7rem;}
.pcell-act{background:none;border:none;cursor:pointer;font-size:0.6rem;color:var(--text3);padding:0.05rem 0.2rem;border-radius:3px;text-decoration:underline;text-decoration-style:dashed;}
.pcell-act:hover{color:var(--red);}
/* INLINE EDIT */
.ie-cell{display:inline-flex;align-items:center;gap:0.18rem;cursor:pointer;}
.ie-cell:hover .ie-val{text-decoration:underline;text-decoration-style:dashed;text-decoration-color:var(--text3);}
.ie-cell:hover .ie-pencil{opacity:1;}
.ie-pencil{font-size:0.6rem;color:var(--text3);opacity:0;transition:opacity 0.15s;}
.ie-wrap{display:inline-flex;align-items:center;gap:0.2rem;}
.ie-input{border:1px solid var(--red);border-radius:5px;padding:0.1rem 0.28rem;font-size:0.71rem;font-family:monospace;outline:none;color:var(--black);background:#fff;}
.ie-input.w-sm{width:52px;}.ie-input.w-md{width:70px;}.ie-input.w-dt{width:78px;}
.ie-ok{background:var(--green);border:none;color:#fff;cursor:pointer;font-size:0.6rem;padding:0.08rem 0.28rem;border-radius:3px;font-weight:700;}
.ie-x{background:transparent;border:none;color:var(--text3);cursor:pointer;font-size:0.7rem;}
/* COLLATERAL */
.col-cell{display:flex;align-items:center;gap:0.28rem;flex-wrap:wrap;}
.col-val{font-family:monospace;font-weight:700;font-size:0.71rem;color:var(--orange);}
.roll-btn{background:var(--purple-bg);border:1px solid rgba(124,58,237,0.25);color:var(--purple);padding:0.1rem 0.38rem;border-radius:4px;font-size:0.58rem;font-weight:700;cursor:pointer;white-space:nowrap;}
.roll-btn:hover{background:rgba(124,58,237,0.15);}
.undo-btn{background:var(--green-bg);border:1px solid rgba(5,150,105,0.25);color:var(--green);padding:0.1rem 0.38rem;border-radius:4px;font-size:0.58rem;font-weight:700;cursor:pointer;white-space:nowrap;}
.rolled-badge{background:var(--purple-bg);color:var(--purple);padding:0.08rem 0.35rem;border-radius:3px;font-size:0.58rem;font-weight:700;}
.del-btn{background:none;border:none;color:#D1D5DB;cursor:pointer;padding:0.18rem 0.32rem;border-radius:4px;font-size:0.75rem;transition:all 0.15s;}
.del-btn:hover{background:var(--red-bg);color:var(--red);}
.copy-btn{background:none;border:none;color:var(--text3);cursor:pointer;padding:0.18rem 0.32rem;border-radius:4px;font-size:0.72rem;transition:all 0.15s;}
.copy-btn:hover{background:var(--blue-bg);color:var(--blue);}
.row-edit-btn{display:inline-flex;align-items:center;gap:0.22rem;background:transparent;color:var(--text3);border:1px solid var(--border);padding:0.18rem 0.45rem;border-radius:5px;font-size:0.6rem;font-weight:700;cursor:pointer;white-space:nowrap;transition:all 0.15s;}
.row-edit-btn:hover{color:var(--black);background:var(--bg3);}
/* CLOSE MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:1000;display:flex;align-items:center;justify-content:center;}
.modal-box{background:#fff;border-radius:14px;padding:1.5rem;width:340px;max-width:92vw;box-shadow:0 16px 48px rgba(0,0,0,0.2);}
.modal-title{font-size:0.85rem;font-weight:800;color:var(--black);margin-bottom:0.2rem;}
.modal-sub{font-size:0.68rem;color:var(--text3);margin-bottom:0.85rem;}
.modal-pos-info{display:flex;align-items:center;gap:0.4rem;background:var(--bg3);border:1px solid var(--border);border-radius:7px;padding:0.3rem 0.65rem;margin-bottom:0.9rem;font-size:0.72rem;font-weight:700;color:var(--black);}
.modal-section-label{font-size:0.63rem;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--text3);margin-bottom:0.35rem;}
.modal-action-tabs{display:flex;gap:3px;background:var(--bg3);border-radius:8px;padding:3px;margin-bottom:0.9rem;}
.mat{flex:1;text-align:center;padding:0.32rem 0;border-radius:6px;font-size:0.68rem;font-weight:700;cursor:pointer;border:none;background:transparent;color:var(--text3);transition:all 0.15s;}
.mat:hover{color:var(--black);}
.mat.mat-close.active{background:var(--black);color:#fff;}.mat.mat-btc.active{background:var(--green);color:#fff;}
.mat.mat-stc.active{background:var(--blue);color:#fff;}.mat.mat-sell.active{background:var(--orange);color:#fff;}
.modal-cd-tabs{display:flex;gap:3px;margin-bottom:0.5rem;}
.mct{flex:1;text-align:center;padding:0.28rem;border-radius:6px;font-size:0.67rem;font-weight:700;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--text3);transition:all 0.15s;}
.mct.credit.active{background:var(--green-bg);border-color:rgba(5,150,105,0.4);color:var(--green);}
.mct.debit.active{background:var(--red-bg);border-color:rgba(220,38,38,0.35);color:var(--red);}
.mct.zero.active{background:var(--bg4);border-color:var(--border2);color:var(--black);}
.modal-amt-wrap{display:flex;align-items:center;gap:0.45rem;margin-bottom:0.25rem;}
.modal-amt-pre{font-size:0.9rem;font-weight:700;color:var(--text3);width:18px;}
.modal-amt-input{flex:1;border:1px solid var(--border2);border-radius:7px;padding:0.4rem 0.65rem;font-size:0.85rem;font-family:monospace;font-weight:700;outline:none;color:var(--black);}
.modal-amt-input:focus{border-color:var(--red);}
.modal-amt-input:disabled{background:var(--bg3);color:var(--text3);}
.modal-hint{font-size:0.62rem;color:var(--text3);margin-bottom:0.85rem;}
.modal-notes-label{font-size:0.63rem;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:0.3rem;}
.modal-notes{width:100%;border:1px solid var(--border2);border-radius:7px;padding:0.38rem 0.65rem;font-size:0.75rem;outline:none;color:var(--black);resize:none;margin-bottom:0.9rem;}
.modal-notes:focus{border-color:var(--red);}
.modal-btns{display:flex;gap:0.55rem;}
.modal-confirm{flex:1;color:#fff;border:none;padding:0.52rem;border-radius:8px;font-size:0.75rem;font-weight:700;cursor:pointer;}
.modal-confirm:hover{opacity:0.9;}
.modal-cancel-btn{background:transparent;color:var(--text3);border:1px solid var(--border);padding:0.52rem 0.85rem;border-radius:8px;font-size:0.72rem;font-weight:600;cursor:pointer;}
.modal-cancel-btn:hover{color:var(--red);}
.action-btn{display:inline-flex;align-items:center;gap:0.22rem;background:var(--black);color:#fff;border:none;padding:0.2rem 0.52rem;border-radius:5px;font-size:0.6rem;font-weight:700;cursor:pointer;white-space:nowrap;transition:all 0.15s;}
.action-btn:hover{background:#333;}
.closed-action-cell{display:flex;flex-direction:column;gap:2px;}
.closed-action-line{display:flex;align-items:center;gap:0.3rem;flex-wrap:wrap;}
.closed-cr{color:var(--green);font-weight:700;font-family:monospace;font-size:0.7rem;}
.closed-dr{color:var(--red);font-weight:700;font-family:monospace;font-size:0.7rem;}
.closed-dt{color:var(--text3);font-size:0.6rem;}
.reopen-btn{display:inline-flex;align-items:center;gap:0.2rem;background:transparent;color:var(--text3);border:1px solid var(--border);padding:0.1rem 0.38rem;border-radius:4px;font-size:0.58rem;font-weight:700;cursor:pointer;transition:all 0.15s;margin-top:1px;}
.reopen-btn:hover{color:var(--blue);border-color:rgba(37,99,235,0.3);background:var(--blue-bg);}
/* UPLOAD */
.upload-csv-btn{display:inline-flex;align-items:center;gap:0.35rem;background:var(--black);color:#fff;border:none;padding:0.26rem 0.72rem;border-radius:7px;font-size:0.65rem;font-weight:700;cursor:pointer;white-space:nowrap;}
.upload-csv-btn:hover{background:#333;}
.template-dl-btn{display:inline-flex;align-items:center;gap:0.3rem;background:transparent;color:var(--blue);border:1px solid rgba(37,99,235,0.3);padding:0.26rem 0.65rem;border-radius:7px;font-size:0.65rem;font-weight:700;cursor:pointer;white-space:nowrap;}
.template-dl-btn:hover{background:var(--blue-bg);}
.upload-panel{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);margin-bottom:0.75rem;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,0.06);}
.upload-panel-hdr{background:var(--black);padding:0.48rem 1rem;display:flex;align-items:center;justify-content:space-between;}
.upload-panel-title{font-size:0.7rem;font-weight:700;color:#fff;}
.upload-close-x{background:none;border:none;color:rgba(255,255,255,0.5);cursor:pointer;font-size:0.85rem;padding:0 0.2rem;line-height:1;}
.upload-close-x:hover{color:#fff;}
.upload-panel-body{padding:0.85rem 1rem;}
.drop-zone{border:2px dashed var(--border2);border-radius:var(--r);padding:1.4rem 1rem;text-align:center;cursor:pointer;transition:all 0.2s;background:var(--bg3);}
.drop-zone:hover,.drop-zone.drag-over{border-color:var(--red);background:var(--red-bg);}
.drop-zone-icon{font-size:1.5rem;margin-bottom:0.3rem;}
.drop-zone-title{font-size:0.78rem;font-weight:700;color:var(--black);margin-bottom:0.18rem;}
.drop-zone-sub{font-size:0.65rem;color:var(--text3);}
.drop-zone-btn{display:inline-flex;align-items:center;gap:0.32rem;background:var(--red);color:#fff;border:none;padding:0.36rem 0.85rem;border-radius:6px;font-size:0.68rem;font-weight:700;cursor:pointer;margin-top:0.55rem;}
.drop-zone-btn:hover{background:var(--red2);}
.preview-wrap{border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-bottom:0.7rem;}
.preview-hdr{background:var(--bg4);padding:0.42rem 0.75rem;font-size:0.63rem;font-weight:700;color:var(--text3);text-transform:uppercase;}
.preview-scroll{overflow-x:auto;max-height:200px;overflow-y:auto;}
.preview-table{width:100%;border-collapse:collapse;min-width:500px;}
.preview-table th{padding:0.36rem 0.6rem;font-size:0.58rem;font-weight:700;color:rgba(255,255,255,0.8);background:var(--black);text-align:left;white-space:nowrap;text-transform:uppercase;}
.preview-table td{padding:0.33rem 0.6rem;font-size:0.68rem;color:var(--text2);border-bottom:1px solid var(--border);white-space:nowrap;}
.preview-table tr:last-child td{border-bottom:none;}.err-cell{color:var(--red);font-size:0.63rem;}
.import-actions{display:flex;align-items:center;gap:0.65rem;flex-wrap:wrap;}
.import-btn{background:var(--red);color:#fff;border:none;padding:0.43rem 1.05rem;border-radius:7px;font-size:0.72rem;font-weight:700;cursor:pointer;}
.import-btn:hover{background:var(--red2);}
.cancel-upload-btn{background:transparent;color:var(--text3);border:1px solid var(--border);padding:0.43rem 0.8rem;border-radius:7px;font-size:0.68rem;font-weight:600;cursor:pointer;}
.import-ok{background:var(--green-bg);border:1px solid rgba(5,150,105,0.25);color:var(--green);padding:0.36rem 0.75rem;border-radius:7px;font-size:0.68rem;font-weight:600;}
.import-err{background:var(--red-bg);border:1px solid rgba(220,38,38,0.25);color:var(--red);padding:0.36rem 0.75rem;border-radius:7px;font-size:0.68rem;font-weight:600;}
.add-pos-btn{display:inline-flex;align-items:center;gap:0.32rem;background:var(--red);color:#fff;border:none;padding:0.26rem 0.75rem;border-radius:7px;font-size:0.65rem;font-weight:700;cursor:pointer;white-space:nowrap;}
.add-pos-btn:hover{background:var(--red2);}
/* ADD MODAL */
.ap-modal-box{background:#fff;border-radius:14px;padding:1.5rem;width:480px;max-width:95vw;max-height:90vh;overflow-y:auto;box-shadow:0 16px 48px rgba(0,0,0,0.22);}
.ap-grid{display:grid;grid-template-columns:1fr 1fr;gap:0.65rem 0.85rem;margin-bottom:0.85rem;}
.ap-field{display:flex;flex-direction:column;gap:0.22rem;}
.ap-label{font-size:0.63rem;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.07em;}
.ap-label span{color:var(--red);margin-left:2px;}
.ap-input,.ap-select{border:1px solid var(--border2);border-radius:7px;padding:0.42rem 0.65rem;font-size:0.78rem;color:var(--black);outline:none;background:#fff;width:100%;}
.ap-input:focus,.ap-select:focus{border-color:var(--red);}
.ap-type-tabs{display:flex;gap:3px;background:var(--bg3);border-radius:8px;padding:3px;margin-bottom:0.85rem;}
.apt{flex:1;text-align:center;padding:0.35rem 0;border-radius:6px;font-size:0.68rem;font-weight:700;cursor:pointer;border:none;background:transparent;color:var(--text3);transition:all 0.15s;white-space:nowrap;}
.apt:hover{color:var(--black);}
.apt.active-sp{background:var(--red);color:#fff;}.apt.active-lp{background:var(--blue);color:#fff;}
.apt.active-lc{background:var(--green);color:#fff;}.apt.active-sh{background:var(--yellow);color:#fff;}
.apt.active-sc{background:var(--orange);color:#fff;}
.ph{background:var(--bg2);border:1px dashed var(--border2);border-radius:var(--r);padding:2rem;text-align:center;color:var(--text3);}
.ph strong{display:block;color:var(--black);margin-bottom:0.3rem;}
.ec{text-align:center;padding:2rem;color:var(--text3);}
/* ══════════════════════════════════════════════════════════
   MOBILE-FIRST RESPONSIVE STYLES
   ══════════════════════════════════════════════════════════ */

/* ── Tablet (≤900px) ───────────────────────────────────── */
@media(max-width:900px){
  .summary-grid{grid-template-columns:repeat(auto-fit,minmax(130px,1fr));}
  .admin-wrap{max-width:100%;}
}

/* ── Mobile (≤640px) ───────────────────────────────────── */
@media(max-width:640px){
  /* Topbar: compress aggressively */
  .topbar{height:auto;min-height:48px;padding:0.5rem 0.75rem;flex-wrap:wrap;gap:0.35rem;}
  .logo{font-size:1rem;}
  .logo-sub{display:none;}
  .topbar-right{font-size:0.6rem;padding:0.18rem 0.45rem;}

  /* Hide GitHub Save/Load labels, show only icons; hide backup buttons text */
  .gh-btn{font-size:0;}
  .gh-btn::before{font-size:0.8rem;}
  .gh-save::before{content:'☁';}
  .gh-load::before{content:'↙';}
  .gh-cfg{font-size:0.9rem;}
  .bk-btn{font-size:0;}
  .bk-dl::before{content:'⬇';}
  .bk-ul::before{content:'⇧';}
  .bk-btn::before{font-size:0.85rem;}
  .bk-btn{padding:0.3rem 0.45rem;}

  /* Nav tabs: compact, scrollable */
  .port-nav{padding:0 0.5rem;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
  .port-nav::-webkit-scrollbar{display:none;}
  .port-tab{padding:0 0.65rem;height:38px;font-size:0.65rem;letter-spacing:0.02em;}
  .sub-nav{padding:0 0.5rem;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
  .sub-nav::-webkit-scrollbar{display:none;}
  .sub-tab{padding:0 0.65rem;height:30px;font-size:0.62rem;}
  .view-nav{padding:0 0.5rem;}
  .view-tab{padding:0 0.65rem;height:32px;font-size:0.65rem;}
  .breadcrumb{padding:0.3rem 0.75rem;font-size:0.62rem;}

  /* Main content padding */
  .main{padding:0.65rem 0.65rem;}

  /* Summary grid: 2 columns on mobile */
  .summary-grid{grid-template-columns:1fr 1fr;gap:0.5rem;margin-bottom:0.65rem;}
  .scard{padding:0.65rem 0.75rem;}
  .scard-val{font-size:1rem;}
  .scard-label{font-size:0.55rem;}
  .be-mini-card{padding:0.65rem 0.75rem;}
  .be-mini-val{font-size:0.9rem;}
  .gain-card{padding:0.65rem 0.75rem;}
  .col-combo-card{padding:0.65rem 0.75rem;}

  /* Filter bar: stack vertically */
  .filter-bar{flex-direction:column;align-items:stretch;gap:0.45rem;padding:0.5rem 0.65rem;}
  .ticker-select-wrap{max-width:100%;min-width:unset;}
  .filter-bar-label{display:none;}

  /* Controls row: wrap tightly */
  .controls-row{gap:0.4rem;}
  .type-tabs{flex-wrap:wrap;gap:2px;}
  .type-tab{padding:0.2rem 0.42rem;font-size:0.6rem;}
  .oc-tabs{gap:2px;}
  .oc-tab{padding:0.2rem 0.38rem;font-size:0.6rem;}
  .expiry-pill{font-size:0.6rem;padding:0.18rem 0.45rem;}
  .del-all-btn{display:none;}
  .add-pos-btn{padding:0.22rem 0.58rem;font-size:0.6rem;}
  .upload-csv-btn{padding:0.22rem 0.55rem;font-size:0.6rem;}
  .template-dl-btn{padding:0.22rem 0.55rem;font-size:0.6rem;}

  /* Tables: horizontal scroll with clear visual affordance */
  .table-wrap{border-radius:8px;margin-bottom:0.65rem;
    /* shadow on right to hint scrollability */
    background:
      linear-gradient(to right,white 30%,rgba(255,255,255,0)) left center,
      linear-gradient(to right,rgba(255,255,255,0),white 70%) right center,
      radial-gradient(farthest-side at left,rgba(0,0,0,0.12),transparent) left center,
      radial-gradient(farthest-side at right,rgba(0,0,0,0.12),transparent) right center;
    background-repeat:no-repeat;background-attachment:local,local,scroll,scroll;
  }
  table{min-width:700px;}
  th{padding:0.45rem 0.28rem;font-size:0.52rem;}
  td{padding:0.38rem 0.28rem;font-size:0.67rem;}

  /* Spreads table */
  .st-wrap table{min-width:780px;}
  .st-wrap th{padding:0.45rem 0.55rem;font-size:0.56rem;}
  .st-wrap td{padding:0.4rem 0.55rem;font-size:0.68rem;}
  .total-collat-banner{padding:0.75rem 0.85rem;gap:0.5rem;}
  .tcb-val{font-size:1.35rem;}
  .tcb-breakdown{gap:0.9rem;}
  .tcb-item-val{font-size:0.8rem;}

  /* Activity table */
  .av-tbl{min-width:640px;}
  .av-tbl th{padding:0.42rem 0.55rem;font-size:0.56rem;}
  .av-tbl td{padding:0.38rem 0.55rem;font-size:0.67rem;}
  .av-bar{padding:0.45rem 0.6rem;gap:0.4rem;}
  .av-stats{flex-wrap:wrap;border-radius:8px;}
  .av-stat{min-width:calc(50% - 0.5px);padding:0.55rem 0.7rem;}
  .av-stat-val{font-size:0.82rem;}
  .av-search{min-width:120px;}
  .av-ml{margin-left:0;width:100%;justify-content:flex-end;}

  /* Modals: full-width bottom sheet feel on mobile */
  .modal-overlay{align-items:flex-end;padding:0;}
  .modal-box{width:100%;max-width:100%;border-radius:18px 18px 0 0;padding:1.25rem 1rem;max-height:92vh;overflow-y:auto;}
  .ap-modal-box{width:100%;max-width:100%;border-radius:18px 18px 0 0;padding:1.25rem 1rem;max-height:92vh;overflow-y:auto;}
  .gh-modal-box{width:100%;max-width:100%;border-radius:18px 18px 0 0;padding:1.25rem 1rem;max-height:92vh;overflow-y:auto;}

  /* Add position modal grid: 1 col on mobile */
  .ap-grid{grid-template-columns:1fr;}

  /* Admin / prices view */
  .admin-wrap{max-width:100%;}
  .admin-table-wrap{overflow-x:auto;}
  .admin-table{min-width:480px;}
  .admin-add-row{flex-wrap:wrap;gap:0.45rem;}
  .admin-add-input{flex:1;min-width:120px;}

  /* Cash card */
  .cash-card{padding:0.7rem 0.8rem;}
  .cash-val{font-size:1.05rem;}

  /* Upload panel */
  .upload-panel-body{padding:0.65rem 0.75rem;}
  .import-actions{gap:0.4rem;}
  .preview-scroll{max-height:150px;}

  /* Spreads filter bar */
  .spreads-filter-bar{flex-direction:column;align-items:stretch;gap:0.4rem;padding:0.5rem 0.65rem;}
  .soc-tabs{align-self:flex-start;}

  /* Ticker dropdown: larger tap targets */
  .ticker-dd-item{padding:0.48rem 0.6rem;font-size:0.78rem;}
  .ticker-dropdown{max-height:240px;}

  /* Touch-friendly button sizing (min 44px tap target height) */
  .modal-confirm,.modal-cancel-btn{padding:0.7rem;font-size:0.8rem;}
  .import-btn,.cancel-upload-btn{padding:0.55rem 0.85rem;font-size:0.75rem;}
  .drop-zone-btn{padding:0.5rem 1rem;font-size:0.72rem;}
  .admin-save-btn,.admin-clear-btn{padding:0.42rem 0.75rem;}
  .action-btn{padding:0.28rem 0.6rem;font-size:0.65rem;}
  .roll-btn,.undo-btn{padding:0.14rem 0.45rem;font-size:0.62rem;}
  .del-btn,.copy-btn{padding:0.22rem 0.38rem;font-size:0.82rem;}

  /* Row action buttons: slightly bigger hit area */
  .row-edit-btn{padding:0.22rem 0.5rem;font-size:0.62rem;}
  .reopen-btn{padding:0.14rem 0.45rem;font-size:0.62rem;}
}

/* ── Small mobile (≤400px) ─────────────────────────────── */
@media(max-width:400px){
  .summary-grid{grid-template-columns:1fr 1fr;gap:0.4rem;}
  .scard-val{font-size:0.9rem;}
  .port-tab{padding:0 0.5rem;font-size:0.6rem;}
  .sub-tab{padding:0 0.5rem;}
  .type-tab{padding:0.18rem 0.32rem;font-size:0.57rem;}
  .logo{font-size:0.9rem;}
  .topbar{padding:0.4rem 0.55rem;}
  .main{padding:0.5rem;}
  .av-stat{min-width:calc(50% - 0.5px);}
}
/* SPREADS */
.total-collat-banner{background:var(--black);border-radius:var(--r);padding:1rem 1.25rem;margin-bottom:1rem;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:0.75rem;}
.tcb-label{font-size:0.68rem;font-weight:700;color:rgba(255,255,255,0.5);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:0.2rem;}
.tcb-val{font-size:1.7rem;font-weight:900;font-family:monospace;color:#FB923C;}
.tcb-sub{font-size:0.63rem;color:rgba(255,255,255,0.35);margin-top:0.1rem;}
.tcb-breakdown{display:flex;gap:1.5rem;flex-wrap:wrap;}
.tcb-item{text-align:center;}
.tcb-item-val{font-size:0.95rem;font-weight:800;font-family:monospace;}
.tcb-item-label{font-size:0.6rem;color:rgba(255,255,255,0.4);text-transform:uppercase;letter-spacing:0.06em;margin-top:0.1rem;}

.st-wrap th:last-child{border-right:none;}
.st-wrap th.sp-hdr{background:rgba(220,38,38,0.5);border-right:1px solid rgba(220,38,38,0.4);}
.st-wrap th.lp-hdr{background:rgba(37,99,235,0.5);border-right:1px solid rgba(37,99,235,0.4);}

.badge-naked{background:var(--red-bg);color:var(--red);display:inline-flex;align-items:center;padding:0.1rem 0.42rem;border-radius:4px;font-size:0.58rem;font-weight:700;text-transform:uppercase;}
.badge-indep{background:var(--blue-bg);color:var(--blue);display:inline-flex;align-items:center;padding:0.1rem 0.42rem;border-radius:4px;font-size:0.58rem;font-weight:700;text-transform:uppercase;}

<script>

var DC={PLTR:'#7C3AED',MSFT:'#2563EB',GOOGL:'#D97706',NVDX:'#059669',SOFI:'#DB2877',TSLL:'#EA580C',NVTS:'#0891B2',METU:'#DC2626',QQQ:'#0891B2',HOOD:'#EA580C',ROBN:'#7C3AED',NOK:'#2563EB',HOOZ:'#DC2626',TSLZ:'#059669'};


// ── SEED DATA — empty. All data comes from GitHub Save/Load ───────────────────
var SEED=[];



// ── FIX 1: PERSISTENCE — data survives GitHub deploys ────────────────────────
// Positions auto-save to localStorage after every change.
// Pushing a new index.html NEVER wipes your data.
// The SEED array above is only used the very FIRST time you open the app (empty localStorage).
function savePositions(){try{localStorage.setItem('roi_positions_v1',JSON.stringify(positions));}catch(e){}}
var positions=[];
(function(){
  try{
    var raw=localStorage.getItem('roi_positions_v1');
    if(raw){
      var d=JSON.parse(raw);
      if(Array.isArray(d)&&d.length>0){
        d.forEach(function(r){
          if(!r.portfolio)r.portfolio='lovelina';
          // Fix: Shares with partialSells but no full closeAction should be open
          if(r.excelType==='Shares'&&r.closed===true&&r.partialSells&&r.partialSells.length&&!r.closeAction){
            r.closed=false;
          }
          // Fix: Shares with soldAmount and closed=true but were meant to be partial sells
          // (legacy data from old confirmModal that set soldAmount without partialSells)
          // — leave these alone, they are genuinely closed full sells
        });
        positions=d;
        return;
      }
    }
  }catch(e){}
  // Only reach here on true first load (nothing in localStorage)
  positions=SEED.slice();
  savePositions();
})();
var AD=[],JD=[],AR=[],LR=[],LT=[];

// ── FIX 2: CASH BALANCES PER PORTFOLIO ───────────────────────────────────────
var CASH_KEY='roi_cash_v1';
var INIT_CASH_KEY='roi_init_cash_v1';
function loadCash(){try{return JSON.parse(localStorage.getItem(CASH_KEY)||'{}');}catch(e){return{};}}
function saveCash(){try{localStorage.setItem(CASH_KEY,JSON.stringify(cashBalances));}catch(e){}}
function loadInitCash(){try{return JSON.parse(localStorage.getItem(INIT_CASH_KEY)||'{}');}catch(e){return{};}}
function saveInitCash(){try{localStorage.setItem(INIT_CASH_KEY,JSON.stringify(initialCashBalances));}catch(e){}}
var cashBalances=loadCash();
var initialCashBalances=loadInitCash();
var editingCash=false;
var editingInitCash=false;
var editingCrypto=false;
// Crypto value stored per portfolio key
var CRYPTO_KEY='roi_crypto_v1';
function loadCrypto(){try{return JSON.parse(localStorage.getItem(CRYPTO_KEY)||'{}');}catch(e){return{};}}
function saveCrypto(){try{localStorage.setItem(CRYPTO_KEY,JSON.stringify(cryptoBalances));}catch(e){}}
var cryptoBalances=loadCrypto();

// ── CRYPTO DETAIL STORAGE ─────────────────────────────────────────────────────
// Stores per-person, per-coin breakdown: {amit:{btc,eth,others}, lovelina:{btc,eth,others}}
var CRYPTO_DETAIL_KEY='roi_crypto_detail_v1';
function loadCryptoDetail(){
  try{
    var d=JSON.parse(localStorage.getItem(CRYPTO_DETAIL_KEY)||'{}');
    // Ensure structure
    ['amit','lovelina'].forEach(function(p){
      if(!d[p])d[p]={btc:0,eth:0,others:0};
      ['btc','eth','others'].forEach(function(c){if(!d[p][c])d[p][c]=0;});
    });
    return d;
  }catch(e){return{amit:{btc:0,eth:0,others:0},lovelina:{btc:0,eth:0,others:0}};}
}
function saveCryptoDetail(){try{localStorage.setItem(CRYPTO_DETAIL_KEY,JSON.stringify(cryptoDetail));}catch(e){}}
var cryptoDetail=loadCryptoDetail();
// Sum a person's crypto detail into a total
function cryptoDetailTotal(person){var d=cryptoDetail[person]||{};return(d.btc||0)+(d.eth||0)+(d.others||0);}
// Override getPortCrypto to use detail totals when available
function getPortCrypto(){
  // Use detail totals for amit and lovelina; fall back to cryptoBalances for others
  function personTotal(k){
    if(k==='amit'||k==='lovelina')return cryptoDetailTotal(k);
    return cryptoBalances[k]||0;
  }
  if(ap==='all'){var t=0;ALL_PORT_KEYS.forEach(function(k){t+=personTotal(k);});return t;}
  if(ap==='retirement'&&as==='ret-all'){var t=0;RET_PORT_KEYS.forEach(function(k){t+=personTotal(k);});return t;}
  var k=ap==='retirement'?as:ap;return personTotal(k);
}
function setPortCrypto(v){var k=ap==='retirement'?as:ap;cryptoBalances[k]=v;saveCrypto();}
var cryptoEditingField=null; // {person, coin} or null
var ALL_PORT_KEYS=['lovelina','amit','joint','amit-roth','lov-roth','lov-trad'];
var RET_PORT_KEYS=['amit-roth','lov-roth','lov-trad'];
function getCashKey(){return ap==='retirement'?as:ap;}
function getPortCash(){
  if(ap==='all'){var t=0;ALL_PORT_KEYS.forEach(function(k){t+=cashBalances[k]||0;});return t;}
  if(ap==='retirement'&&as==='ret-all'){var t=0;RET_PORT_KEYS.forEach(function(k){t+=cashBalances[k]||0;});return t;}
  return cashBalances[getCashKey()]||0;
}
function getPortInitCash(){
  if(ap==='all'){var t=0;ALL_PORT_KEYS.forEach(function(k){t+=initialCashBalances[k]||0;});return t;}
  if(ap==='retirement'&&as==='ret-all'){var t=0;RET_PORT_KEYS.forEach(function(k){t+=initialCashBalances[k]||0;});return t;}
  return initialCashBalances[getCashKey()]||0;
}
function setPortCash(v){
  if(ap==='all')return;
  if(ap==='retirement'&&as==='ret-all')return;
  cashBalances[getCashKey()]=v;saveCash();
}
function setPortInitCash(v){
  if(ap==='all')return;
  if(ap==='retirement'&&as==='ret-all')return;
  initialCashBalances[getCashKey()]=v;saveInitCash();
}

// ── TICKER PRICES ─────────────────────────────────────────────────────────────
var TP_KEY='roi_ticker_prices_v1';
function loadTP(){try{return JSON.parse(localStorage.getItem(TP_KEY)||'{}');}catch(e){return{};}}
function saveTP(p){try{localStorage.setItem(TP_KEY,JSON.stringify(p));}catch(e){}}
var tickerPrices=loadTP();
function setTickerPrice(t,p){if(p==null||isNaN(p)){delete tickerPrices[t];}else{tickerPrices[t]=p;}saveTP(tickerPrices);}
var CB_KEY='roi_collat_blocked_v1';
function loadCB(){try{return JSON.parse(localStorage.getItem(CB_KEY)||'{}');}catch(e){return{};}}
function saveCB(){try{localStorage.setItem(CB_KEY,JSON.stringify(collatBlocked));}catch(e){}}
var collatBlocked=loadCB();
function setCollatBlocked(ticker,v,portfolio){var k=portfolio?ticker+'|'+portfolio:ticker;if(v==null||isNaN(v)){delete collatBlocked[k];}else{collatBlocked[k]=v;}saveCB();}
function getCollatBlocked(ticker,portfolio){var k=portfolio?ticker+'|'+portfolio:ticker;return collatBlocked[k]!=null?collatBlocked[k]:(collatBlocked[ticker]!=null?collatBlocked[ticker]:0);}

// ── EARNINGS DATES ─────────────────────────────────────────────────────────────
var ED_KEY='roi_earnings_dates_v1';
function loadED(){try{return JSON.parse(localStorage.getItem(ED_KEY)||'{}');}catch(e){return{};}}
function saveED(){try{localStorage.setItem(ED_KEY,JSON.stringify(earningsDates));}catch(e){}}
var earningsDates=loadED();
var ED_TTL=6*60*60*1000; // 6 hour cache for earnings
async function fetchLiveEarnings(ticker){
  var ed=earningsDates[ticker];
  if(ed&&ed.liveTs&&Date.now()-ed.liveTs<ED_TTL)return ed.live||null;
  try{
    var url='https://query1.finance.yahoo.com/v11/finance/quoteSummary/'+ticker+'?modules=calendarEvents';
    var proxy='https://api.allorigins.win/get?url='+encodeURIComponent(url);
    var res=await fetch(proxy,{signal:AbortSignal.timeout(8000)});
    var json=await res.json();

function rRetirementCard(){
  var RET_KEYS=['amit-roth','lov-roth','lov-trad'];

  function calcRetPortTotal(retKeys){
    var retCV=retKeys.reduce(function(s,k){return s+calcPortfolioCV(k);},0);
    var retCash=retKeys.reduce(function(s,k){return s+(cashBalances[k]||0);},0);
    var retCrypto=retKeys.reduce(function(s,k){return s+(cryptoBalances[k]||0);},0);
    var retPos=tkFilter(positions.filter(function(r){return retKeys.indexOf(r.portfolio||'')>=0&&r.excelType==='Short Put'&&!isCl(r)&&r.strike>0;}));
    var _seenR={};
    var retCB=retPos.reduce(function(s,r){var p=r.portfolio||'lovelina';var k=r.ticker+'|'+p;if(_seenR[k])return s;_seenR[k]=true;return s+getCollatBlocked(r.ticker,p);},0);
    return retCV+retCash+retCB+retCrypto;
  }

  // Determine scope
  var subKeys,retLabel,retInitCash;
  if(ap==='all'){
    subKeys=RET_KEYS;retLabel='All Retirement';
    retInitCash=RET_KEYS.reduce(function(s,k){return s+(initialCashBalances[k]||0);},0);
  } else if(ap==='retirement'){
    var subLabels={'ret-all':'All Retirement','amit-roth':'Amit Roth','lov-roth':'Lov Roth','lov-trad':'Lov Trad'};
    subKeys=as==='ret-all'?RET_KEYS:as==='amit-roth'?['amit-roth']:as==='lov-roth'?['lov-roth']:as==='lov-trad'?['lov-trad']:[];
    retLabel=subLabels[as]||as;
    retInitCash=subKeys.reduce(function(s,k){return s+(initialCashBalances[k]||0);},0);
  } else if(ap==='amit'){
    subKeys=['amit-roth'];retLabel='Amit Roth IRA';

  } else if(ap==='lovelina'){
    subKeys=['lov-roth','lov-trad'];retLabel='Lov Roth + Trad IRA';
    retInitCash=(initialCashBalances['lov-roth']||0)+(initialCashBalances['lov-trad']||0);
  } else {
    // joint — no retirement context, show all retirement as overview
    subKeys=RET_KEYS;retLabel='All Retirement (overview)';
    retInitCash=RET_KEYS.reduce(function(s,k){return s+(initialCashBalances[k]||0);},0);
  }

  var retTotal=calcRetPortTotal(subKeys);
  var retGains=retTotal-retInitCash;
  var retGainsColor=retGains>=0?'#34D399':'#F87171';

  function fmtVal(v){return'$'+Math.abs(v).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2});}
  function fmtSigned(v){return(v>=0?'+':'-')+'$'+Math.abs(v).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2});}
  function mkCol(label,val,color){
    return '<div>'
      +'<div style="font-size:0.52rem;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;color:rgba(255,255,255,0.35);margin-bottom:0.12rem;">'+label+'</div>'
      +'<div style="font-size:0.8rem;font-weight:800;font-family:monospace;color:'+color+';">'+val+'</div>'
      +'</div>';
  }

  // Per-account breakdown
  var acctRows='';
  var acctDefs=[
    {key:'amit-roth',label:'Amit Roth'},
    {key:'lov-roth',label:'Lov Roth'},
    {key:'lov-trad',label:'Lov Trad'}
  ];
  acctDefs.forEach(function(a){

    var gainColor=gain>=0?'#34D399':'#F87171';
    var portCV=calcPortfolioCV(a.key);
    var portCash=cashBalances[a.key]||0;
    // Count open SPUTs

      +'</div>'

  // Retirement-specific KPIs
  var retPos=tkFilter(positions.filter(function(r){return RET_KEYS.indexOf(r.portfolio||'')>=0;}));
  var retOpenSPUTs=retPos.filter(function(r){return r.excelType==='Short Put'&&!isCl(r);});
  var retCollat=retOpenSPUTs.reduce(function(s,r){return s+r.strike*100*(r.contracts||1);},0);
  var retRealized=retPos.filter(function(r){return isCl(r);}).reduce(function(s,r){
    var sold=r.soldAmount!=null&&r.soldAmount!==''?parseFloat(r.soldAmount):0;
    return s+(sold-(r.excelCost||0));
  },0);
  var retUnrealized=retPos.filter(function(r){return!isCl(r);}).reduce(function(s,r){
    var sold=r.soldAmount!=null&&r.soldAmount!==''?parseFloat(r.soldAmount):0;
    return s+(sold-(r.excelCost||0));
  },0);
  var retTotalIncome=retRealized+retUnrealized;

  // ITM check
  var itmCount=retOpenSPUTs.filter(function(r){
    var lP=liveCache[r.ticker]&&liveCache[r.ticker].price!=null?liveCache[r.ticker].price:null;
    var mP=tickerPrices[r.ticker];var sP=lP!=null?lP:(mP!=null?mP:null);
    return sP!=null&&sP<r.strike;
  }).length;

  var kpiRow='<div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:0.3rem;margin-bottom:0.28rem;">'
    +mkCol('Total Value',fmtVal(retTotal),'#A78BFA')
    +mkCol('Collateral','$'+retCollat.toLocaleString(),'#FCA5A5')
    +mkCol('Net Income',fmtSigned(retTotalIncome),retTotalIncome>=0?'#34D399':'#F87171')
    +mkCol('ITM SPUTs',itmCount>0?itmCount+' &#9888;':itmCount+'',itmCount>0?'#F87171':'rgba(255,255,255,0.5)')
    +'</div>';

  var gainsRow='<div style="border-top:1px solid rgba(255,255,255,0.1);margin-top:0.3rem;padding-top:0.28rem;display:flex;align-items:center;justify-content:space-between;">'
    +'<div><div style="font-size:0.58rem;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:rgba(255,255,255,0.4);">Retirement Gains</div>'
    +'<div style="font-size:0.55rem;color:rgba(255,255,255,0.3);">Total &minus; Init Cash</div></div>'
    +'<span style="font-size:0.92rem;font-weight:800;font-family:monospace;color:'+retGainsColor+';">'+fmtSigned(retGains)+'</span>'
    +'</div>';

  return'<div class="cash-card" style="background:linear-gradient(135deg,#1a1040 0%,#111 60%);">'
    +'<div class="cash-lbl"><span>&#127981; Retirement Portfolios</span>'
    +'<span style="font-size:0.58rem;font-weight:700;color:#A78BFA;background:rgba(167,139,250,0.15);border:1px solid rgba(167,139,250,0.3);border-radius:4px;padding:0.1rem 0.4rem;margin-left:auto;">'+retLabel+'</span>'
    +'</div>'
    +kpiRow
    +'<div style="margin-bottom:0.3rem;">'+acctRows+'</div>'
    +gainsRow
    +'</div>';
}

// ── WEEKLY INCOME CARD ────────────────────────────────────────────────────────
function rWeeklyIncomeCard(){
  var now2=new Date();
  var tod=new Date(now2.getFullYear(),now2.getMonth(),now2.getDate());
  var dow=now2.getDay();
  // Week: Monday 00:00 → Sunday 23:59
  var monOff=dow===0?-6:1-dow;
  var thisMon=new Date(tod);thisMon.setDate(tod.getDate()+monOff);thisMon.setHours(0,0,0,0);
  var thisSunEnd=new Date(thisMon);thisSunEnd.setDate(thisMon.getDate()+6);thisSunEnd.setHours(23,59,59,999);
  var lastMon=new Date(thisMon);lastMon.setDate(thisMon.getDate()-7);
  var lastSunEnd=new Date(thisSunEnd);lastSunEnd.setDate(thisSunEnd.getDate()-7);

  function parseOD(s){if(!s)return null;var p=s.split('/');if(p.length===3){var y=parseInt(p[2]);if(y<100)y+=2000;return new Date(y,parseInt(p[0])-1,parseInt(p[1]));}return null;}

  function getOpenIncome(r){
    var sa=r.soldAmount!=null&&r.soldAmount!==''?parseFloat(r.soldAmount):null;
    if(sa!=null&&!isNaN(sa))return sa; // sold amount (premium received or shares sold)
    // No sold yet — cost paid is negative income (money spent this week)
    return -(r.excelCost||0);
  }
  function getCloseIncome(r){
    if(!r.closeAction||r.closeAction.signedAmount==null)return 0;
    return r.closeAction.signedAmount; // positive=credit, negative=debit
  }
  // All-time net per position: sold - cost + close
  function getAllTimeNI(r){

  else{at='<button class="mat mat-close'+(m.action==='Close'?' active':'')+'" onclick="setMA(\'Close\')">&#9940; Close</button><button class="mat mat-btc'+(m.action==='BTC'?' active':'')+'" onclick="setMA(\'BTC\')">&#8593; Buy to Close</button><button class="mat mat-stc'+(m.action==='STC'?' active':'')+'" onclick="setMA(\'STC\')">&#8595; Sell to Close</button>';}

  var cdTabs=(!isSTC&&!isBTC)?'<div class="modal-cd-tabs" style="margin-bottom:0.45rem;"><button class="mct credit'+(m.cdType==='credit'?' active':'')+'" onclick="setCD(\'credit\')">+ Credit</button><button class="mct debit'+(m.cdType==='debit'?' active':'')+'" onclick="setCD(\'debit\')">&minus; Debit</button><button class="mct zero'+(m.cdType==='zero'?' active':'')+'" onclick="setCD(\'zero\')">&asymp; Zero</button></div>':'';
  var amtDisabled=isExpire?'disabled style="opacity:0.4;"':'';
  var sharesQtyRow='';
  if(isShares&&m.action==='Sell'){
    var totalShares=(r.contracts||1)*100;
    var defaultQty=m.sharesQty!=null?m.sharesQty:totalShares;
    sharesQtyRow='<div style="margin-bottom:0.65rem;">'
      +'<div class="modal-section-label" style="margin-bottom:0.3rem;">Shares to Sell <span style="font-weight:400;color:var(--text3);font-size:0.7rem;">(total: '+totalShares+')</span></div>'
      +'<div class="modal-amt-wrap"><input class="modal-amt-input" id="modal-shares-qty" type="number" step="1" min="1" max="'+totalShares+'" value="'+defaultQty+'" placeholder="'+totalShares+'" oninput="modal.sharesQty=parseInt(this.value)||'+totalShares+'">'
      +'<span style="font-size:0.72rem;color:var(--text3);">shares</span></div>'

  }
  var fieldRow='<div style="margin-bottom:0.75rem;"><div class="modal-section-label" style="margin-bottom:0.35rem;">'+amtLabel+'</div>'+cdTabs+'<div class="modal-amt-wrap"><span class="modal-amt-pre" style="color:'+amtColor+';">'+amtPre+'</span><input class="modal-amt-input" id="modal-amt" type="number" step="0.01" min="0" '+amtDisabled+' value="'+(isExpire?'':m.amount)+'" placeholder="0.00" oninput="modal.amount=this.value"></div><div class="modal-hint" style="margin-top:0.3rem;">'+hint+'</div></div>'+sharesQtyRow;

function setMA(a){if(!modal)return;modal.action=a;if(a==='BTC')modal.cdType='debit';else if(a==='STC'||a==='Sell')modal.cdType='credit';else if(a==='Close')modal.cdType='zero';renderModal();}
function setCD(t){if(!modal)return;modal.cdType=t;renderModal();}
function confirmModal(){
  if(!modal)return;
  var r=positions.find(function(p){return p.id===modal.id;});if(!r)return;
  var action=modal.action,amt=parseFloat(modal.amount)||0;
  var closeDate=new Date().toLocaleDateString('en-US',{month:'numeric',day:'numeric',year:'2-digit'});

  if(action==='Sell'&&r.excelType==='Shares'){
    var totalShares=(r.contracts||1)*100;
    var sellShares=modal.sharesQty!=null?Math.min(Math.max(1,modal.sharesQty),totalShares):totalShares;
    var isPartial=sellShares<totalShares;
    if(isPartial){
      // Keep position OPEN — store partial sell in partialSells array
      if(!r.partialSells)r.partialSells=[];
      var soldRatio=sellShares/totalShares;
      var soldCost=Math.round((r.excelCost||0)*soldRatio*100)/100;
      r.partialSells.push({date:closeDate,shares:sellShares,amount:amt,cost:soldCost,notes:modal.notes||''});
      // Update remaining cost and contracts
      r.excelCost=Math.round(((r.excelCost||0)-soldCost)*100)/100;
      r.contracts=Math.max(1,Math.round((totalShares-sellShares)/100));
      // Explicitly keep open — clear any legacy closed flag
      r.closed=false;
      r.closeAction=null;
      // soldAmount = total of all partial sells so far (for income tracking)
      r.soldAmount=(r.partialSells||[]).reduce(function(s,ps){return s+ps.amount;},0)||null;
    } else {
      // Full sell — close in place
      r.soldAmount=amt;
      r.closeAction={action:'Sell',type:'credit',amount:amt,signedAmount:amt,notes:modal.notes,date:closeDate};
      r.excelProfit=amt-(r.excelCost||0);
      r.closed=true;
    }
  } else if(action==='STC'){
    r.soldAmount=amt;r.closeAction={action:action,type:'credit',amount:amt,signedAmount:amt,notes:modal.notes,date:closeDate};r.excelProfit=amt-(r.excelCost||0);
    r.closed=true;
  } else if(action==='BTC'){
    r.excelCost=(r.excelCost||0)+amt;var ps=r.soldAmount!=null&&r.soldAmount!==''?parseFloat(r.soldAmount):0;r.closeAction={action:action,type:'debit',amount:amt,signedAmount:-amt,notes:modal.notes,date:closeDate};r.excelProfit=ps-r.excelCost;
    r.closed=true;
  } else {
    var signed=modal.cdType==='credit'?amt:modal.cdType==='debit'?-amt:0;var ps2=r.soldAmount!=null&&r.soldAmount!==''?parseFloat(r.soldAmount):0;r.closeAction={action:action,type:modal.cdType,amount:amt,signedAmount:signed,notes:modal.notes,date:closeDate};r.excelProfit=ps2-(r.excelCost||0)+signed;
    r.closed=true;
  }
  savePositions();modal=null;document.getElementById('modal-root').innerHTML='';rMain();
}
function reopenPosition(id){
  var r=positions.find(function(p){return p.id===id;});if(!r)return;
  // For Shares: ask if this was a partial sell that should be kept as income history
  if(r.excelType==='Shares'&&r.closeAction&&r.closeAction.action==='Sell'&&r.soldAmount){
    var keepAsPartial=confirm('Convert the $'+r.soldAmount+' sale on '+r.closeAction.date+' to a partial sell record and reopen the position?\n\nOK = Keep sale as partial sell history (position stays open)\nCancel = Full reopen (clears all sale data)');
    if(keepAsPartial){
      // Convert closeAction to a partialSell entry
      if(!r.partialSells)r.partialSells=[];
      var soldAmt=parseFloat(r.soldAmount)||0;
      // Estimate cost of sold portion proportionally (we don't know original contracts, use current)
      r.partialSells.push({date:r.closeAction.date,shares:(r.contracts||1)*100,amount:soldAmt,cost:r.excelCost||0,notes:'Converted from close action'});
      r.closed=false;
      r.closeAction=null;
      delete r.soldAmount;
      hideClosedRows=false;
      savePositions();rMain();
      return;
    }
  }
  if(!confirm('Reopen this position?'))return;
  r.closed=false;
  r.closeAction=null;
  delete r.soldAmount;
  if(r.excelIncome)r.excelProfit=r.excelIncome;
  hideClosedRows=false;
  savePositions();rMain();
}
function closeModal(){modal=null;document.getElementById('modal-root').innerHTML='';}

function updateGross(){
  if(!addForm)return;
  var f=addForm,isShort=f.type==='Short Put'||f.type==='Short Call';
  var inc=parseFloat(f.income)||0,cost=parseFloat(f.cost)||0;
  var ci=document.getElementById('af-curr');
  var cv=isShort?0:(ci?parseFloat(ci.value)||0:parseFloat(f.currentValue)||cost);
  if(!isShort&&ci)f.currentValue=ci.value;
  var g=inc+cv,pnl=g-cost;
  var ge=document.getElementById('af-gross');if(ge)ge.value=g.toFixed(2);
  var pe=document.getElementById('af-pnl');if(pe)pe.value=pnl.toFixed(2);

}
function saveAddModal(){
  var f=addForm;if(!f)return;
  if(!f.ticker.trim()){alert('Ticker is required.');return;}
  if(f.type!=='Shares'&&!f.strike){alert('Strike price is required for options.');return;}
  if(f.type!=='Shares'&&!f.expiryDate.trim()){alert('Expiry date is required for options.');return;}
  var cost=parseFloat(f.cost)||0,income=parseFloat(f.income)||0;
  var isShort=f.type==='Short Put'||f.type==='Short Call';
  var currInp=document.getElementById('af-curr');
  var curr=currInp?parseFloat(currInp.value)||0:(isShort?0:(parseFloat(f.currentValue)||cost));
  var grossInp=document.getElementById('af-gross');
  var pnlInp=document.getElementById('af-pnl');
  var gross=grossInp&&grossInp.value!==''?parseFloat(grossInp.value)||(income+curr):income+curr;
  var pnl=pnlInp&&pnlInp.value!==''?parseFloat(pnlInp.value)||(gross-cost):gross-cost;
  var numCtr=parseInt(f.contracts)||1;
  // Edit mode: cost/income/sold are already TOTALS — don't multiply by contracts
  // Add mode: cost/sold are per-contract — multiply by contracts
  // cost and sold are ALWAYS per-contract — multiply by numCtr to get stored total
  var totalCost=cost*numCtr;
  var soldStr=String(f.sold===null||f.sold===undefined?'':f.sold).trim();
  var soldParsed=soldStr===''?null:parseFloat(soldStr);
  var sv=(soldParsed!=null&&!isNaN(soldParsed)&&soldParsed>0)?soldParsed:null;
  var totalSold=sv!=null?sv*numCtr:null;
  var totalProfit=(totalSold!=null?totalSold:0)-totalCost;
  if(f._editId){
    var r=positions.find(function(p){return p.id===f._editId;});
    if(r){
      r.ticker=f.ticker.trim().toUpperCase();r.excelType=f.type;
      r.strike=parseFloat(f.strike)||0;r.expiryDate=f.expiryDate.trim();
      r.openDate=f.openDate.trim();r.contracts=numCtr;
      r.excelCost=totalCost;
      r.excelIncome=income*numCtr;
      r.excelGrossValue=r.excelIncome+curr;
      r.excelCurrentValue=curr;
      r.closed=f.closed;r.notes=f.notes;
      // Map Current Value → cvOverride (Portf. Val column); SPUT/SCALL always negative
      var currInpVal=currInp?parseFloat(currInp.value):NaN;
      if(!isNaN(currInpVal)&&currInpVal!==0){
        r.cvOverride=isShort?-Math.abs(currInpVal):Math.abs(currInpVal);
      }else if(currInpVal===0&&isShort){
        r.cvOverride=0;
      }else{
        delete r.cvOverride;
      }
      if(totalSold!=null){r.soldAmount=totalSold;r.excelProfit=totalSold-totalCost;}else{delete r.soldAmount;r.excelProfit=r.excelIncome-totalCost;}
    }
  }else{
    var uid=Math.random().toString(36).slice(2,10);
    var portTag=ap==='retirement'?as:ap;
    var newPos={id:uid,portfolio:portTag,ticker:f.ticker.trim().toUpperCase(),excelType:f.type,
      strike:parseFloat(f.strike)||0,expiryDate:f.expiryDate.trim(),
      openDate:f.openDate.trim(),contracts:numCtr,
      excelCost:totalCost,excelIncome:income*numCtr,
      excelGrossValue:(income+curr)*numCtr,excelCurrentValue:curr,
      excelProfit:totalProfit,closed:f.closed,notes:f.notes,
      manualPrice:null,rolledOver:false,closeAction:null};
    // Map Current Value → cvOverride (Portf. Val column); SPUT/SCALL always negative
    var _cvRaw=currInp?parseFloat(currInp.value):NaN;
    if(!isNaN(_cvRaw)&&_cvRaw!==0){
      newPos.cvOverride=isShort?-Math.abs(_cvRaw):Math.abs(_cvRaw);
    }
    if(totalSold!=null)newPos.soldAmount=totalSold;
    positions.push(newPos);
  }
  savePositions();addForm=null;document.getElementById('modal-root').innerHTML='';rMain();
}

function parseOptDesc(d){

function splitCSV(line){var r=[],c='',iq=false;for(var i=0;i<line.length;i++){var ch=line[i];if(ch==='"'){if(iq&&line[i+1]==='"'){c+='"';i++;}else{iq=!iq;}}else if(ch===','&&!iq){r.push(c.trim());c='';}else{c+=ch;}}r.push(c.trim());return r;}
function collapseQNL(t){var r=[],b='',q=0;for(var i=0;i<t.length;i++){var c=t[i];if(c==='"')q++;if((c==='\n'||c==='\r')&&q%2!==0){b+=' ';if(c==='\r'&&t[i+1]==='\n')i++;}else if(c==='\r'){if(t[i+1]==='\n')i++;r.push(b);b='';q=0;}else if(c==='\n'){r.push(b);b='';q=0;}else{b+=c;}}if(b)r.push(b);return r.join('\n');}
function parseBrokerageCSV(text){
  var lines=collapseQNL(text).split('\n').map(function(l){return l.trim();}).filter(function(l,i){return i===0||l;});
  if(lines.length<2)return{error:'Need header + data rows.'};
  var delim=lines[0].indexOf('\t')>-1?'\t':',';
  function splitLine(line){if(delim==='\t')return line.split('\t').map(function(x){return x.trim();});return splitCSV(line);}
  var headers=splitLine(lines[0]).map(function(h){return h.toLowerCase().replace(/[\s_\-]/g,'');});
  var col={};
  headers.forEach(function(h,i){
    if(h==='ticker'||h==='symbol'||h==='instrument')col.tk=i;
    else if(h==='strike'||h==='strikeprice')col.st=i;
    else if(h==='expirydate'||h==='expiry'||h==='expdate'||h==='expirationdate')col.exp=i;
    else if(h==='numcontracts'||h==='contracts'||h==='qty'||h==='quantity')col.nc=i;
    else if(h==='currentvalue'||h==='currval'||h==='marketvalue'||h==='mktval')col.cv=i;
    else if(h==='cost'||h==='costbasis'||h==='premium')col.co=i;
    else if(h==='sold'||h==='soldamount'||h==='proceeds'||h==='income')col.sl=i;
    else if(h==='type'||h==='optiontype'||h==='positiontype')col.tp=i;
  });
  // Validate required columns
  if(col.tk==null)return{error:'Missing required column: ticker'};
  if(col.tp==null)return{error:'Missing required column: type'};
  // Normalize type strings to internal excelType names
  function normType(raw){
    var s=(raw||'').trim().toLowerCase().replace(/[\s_\-]/g,'');
    if(s==='shortput'||s==='sput'||s==='sp')return'Short Put';
    if(s==='shortcall'||s==='scall'||s==='sc')return'Short Call';
    if(s==='longput'||s==='lput'||s==='lp')return'Long Put';
    if(s==='longcall'||s==='lcall'||s==='lc')return'Long Call';
    if(s==='shares'||s==='shr'||s==='stock'||s==='equity')return'Shares';
    return null;
  }
  // Parse expiry date — accept M/D/YYYY, M/D/YY, YYYY-MM-DD
  function parseExpiry(s){
    if(!s)return'';
    s=s.trim();
    // ISO format: 2026-04-10
    var iso=s.match(/^(\d{4})-(\d{1,2})-(\d{1,2})$/);
    if(iso)return iso[2]+'/'+iso[3]+'/'+iso[1];
    // M/D/YY or M/D/YYYY
    var mdy=s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{2,4})$/);
    if(mdy){var yr=parseInt(mdy[3]);return mdy[1]+'/'+mdy[2]+'/'+(yr<100?2000+yr:yr);}
    return s;
  }
  var today=new Date();today.setHours(0,0,0,0);
  var mapped=[],errors=[];
  for(var i=1;i<lines.length;i++){
    var line=lines[i];if(!line)continue;
    var v=splitLine(line);if(v.every(function(x){return!x;}))continue;
    var gf=function(idx){return idx!=null?(v[idx]||'').trim():'';};
    var ticker=(gf(col.tk)||'').toUpperCase();
    if(!ticker){errors.push('Row '+(i+1)+': missing ticker');continue;}
    var rawType=gf(col.tp);
    var excelType=normType(rawType);
    if(!excelType){errors.push('Row '+(i+1)+': unrecognized type "'+rawType+'" — use Short Put, Short Call, Long Put, or Long Call');continue;}
    var strike=col.st!=null?parseFloat(gf(col.st))||0:0;
    var expiryDate=parseExpiry(gf(col.exp));
    var numContracts=col.nc!=null?parseInt(gf(col.nc))||1:1;
    var currentValue=col.cv!=null?parseFloat(gf(col.cv).replace(/[$,\s]/g,''))||0:0;
    var costRaw=col.co!=null?gf(col.co):'';
    var soldRaw=col.sl!=null?gf(col.sl):'';
    // Cost: remove $ and commas; support parentheses for negatives
    function parseNum(s){if(!s)return 0;var x=s.replace(/[$,\s]/g,'');var neg=x.startsWith('(')&&x.endsWith(')');return neg?-(parseFloat(x.replace(/[()]/g,''))||0):(parseFloat(x)||0);}
    var costVal=Math.abs(parseNum(costRaw));
    var soldVal=soldRaw?parseNum(soldRaw):null;
    // Determine closed: if past expiry, or if sold column has a value for short positions
    var expiryDateObj=null;
    var isClosed=false;
    var closeAction=null;
    // excelCost: total (already per total since user enters total cost)
    var excelCost=costVal;
    var excelIncome=soldVal!=null?Math.abs(soldVal):0;
    var excelProfit=excelIncome-excelCost;
    // currentValue: negative for short positions (liability), positive for long
    var isShort=excelType==='Short Put'||excelType==='Short Call';
    var cvStored=currentValue!==0?(isShort?-Math.abs(currentValue):Math.abs(currentValue)):0;
    var uid=Math.random().toString(36).slice(2,10);
    var isShares=excelType==='Shares';
    var pos={
      id:uid,portfolio:null,ticker:ticker,excelType:excelType,
      strike:isShares?0:strike,expiryDate:isShares?'':expiryDate,openDate:'',contracts:numContracts,
      excelCost:excelCost,excelIncome:excelIncome,
      excelGrossValue:excelIncome+Math.abs(cvStored),
      excelCurrentValue:Math.abs(cvStored),
      excelProfit:excelProfit,
      closed:isClosed,rolledOver:false,
      closeAction:closeAction,manualPrice:isShares?strike:null,notes:''
    };
    if(isShares&&currentValue!==0)pos.cvOverride=Math.abs(currentValue);
    else if(cvStored!==0)pos.cvOverride=cvStored;
    if(soldVal!=null&&soldVal!==0)pos.soldAmount=soldVal;
    mapped.push(pos);
  }
  return{rows:mapped,errors:errors};
}

function parseDate(s){if(!s)return null;try{var parts=s.split('/');var d;if(parts.length===2){var yr=new Date().getFullYear();d=new Date(yr+'-'+parts[0].padStart(2,'0')+'-'+parts[1].padStart(2,'0'));}else{d=new Date(s);}return isNaN(d)?null:d;}catch(e){return null;}}
function buildSpreadPairs(data){
  var thisFriSp=getThisFriday(),nextFriSp=getNextFriday();
  function expMatch(r){
    if(spreadsExpFilter==='this-week'){if(!r.expiryDate)return false;var d=parseDate(r.expiryDate);return d&&d<=thisFriSp;}
    if(spreadsExpFilter==='next-week'){if(!r.expiryDate)return false;var d=parseDate(r.expiryDate);return d&&d>thisFriSp&&d<=nextFriSp;}
    return true;
  }
  var basePool=data.filter(function(r){return!isCl(r);}).filter(function(r){return selectedTickers.has('ALL')||selectedTickers.has(r.ticker);});
  // Short/Shares pool: SPUT, SCALL (with expiry filter), Shares (no expiry filter)

var liveCache={},CACHE_TTL=5*60*1000;
async function fetchLivePrice(ticker){
  var c=liveCache[ticker];if(c&&Date.now()-c.ts<CACHE_TTL)return c.price;
  try{
    var url='https://query1.finance.yahoo.com/v8/finance/chart/'+ticker+'?interval=1d&range=1d';
    var proxy='https://api.allorigins.win/get?url='+encodeURIComponent(url);
    var res=await fetch(proxy,{signal:AbortSignal.timeout(6000)});
    var json=await res.json();
    var contents=JSON.parse(json.contents);
    var meta=contents&&contents.chart&&contents.chart.result&&contents.chart.result[0]&&contents.chart.result[0].meta;
    var price=meta?(meta.regularMarketPrice!=null?meta.regularMarketPrice:meta.previousClose!=null?meta.previousClose:null):null;
    if(price!=null){
      liveCache[ticker]={price:price,ts:Date.now()};
      // Auto-copy live price into manual so it persists
      tickerPrices[ticker]=price;saveTP(tickerPrices);
    }
    // Extract earnings timestamp from same response and auto-copy to manual
    var ets=meta&&(meta.earningsTimestamp||meta.earningsTimestampStart||null);
    if(ets){
      var ed=new Date(ets*1000);
      var dateStr=(ed.getMonth()+1)+'/'+(ed.getDate())+'/'+ed.getFullYear();
      if(!earningsDates[ticker])earningsDates[ticker]={};
      earningsDates[ticker].live=dateStr;
      earningsDates[ticker].manual=dateStr; // auto-copy live to manual
      earningsDates[ticker].liveTs=Date.now();
      saveED();
    }
    return price;
  }catch(e){}
  return null;
}

function parseBrokerageForActivity(text){
  var lines=collapseQNL(text).split('\n').map(function(l){return l.trim();});
  if(lines.length<2)return{error:'Need header + data rows.'};
  var headers=splitCSV(lines[0]).map(function(h){return h.toLowerCase().replace(/\s+/g,'');});
  var col={};
  headers.forEach(function(h,i){
    if(h.includes('activitydate')||h==='date')col.d=i;
    else if(h.includes('instrument')||h==='symbol')col.i=i;
    else if(h.includes('description')||h==='desc')col.ds=i;
    else if(h.includes('transcode')||h==='action')col.tc=i;
    else if(h==='quantity'||h.includes('qty'))col.q=i;
    else if(h==='price')col.p=i;
    else if(h==='amount'||h.includes('netamount'))col.a=i;
  });
  var rows=[];
  for(var ri=1;ri<lines.length;ri++){
    var line=lines[ri];if(!line)continue;
    var v=splitCSV(line);if(v.every(function(x){return!x;}))continue;
    if(v.join('').includes('informational purposes only'))continue;
    function g(idx){return idx!=null?(v[idx]||'').trim():'';}
    var d=g(col.d),inst=g(col.i).toUpperCase(),desc=g(col.ds),tc=g(col.tc).toUpperCase(),qty=g(col.q),price=g(col.p),rawAmt=g(col.a);
    if(!d&&!inst&&!desc)continue;
    if(['ITRF','OASGN','DFEE','DTAX'].indexOf(tc)>=0)continue;
    var amt=parseAmt(rawAmt),opt=parseOptDesc(desc);
    var cat,tLabel,tcD;
    if(opt){cat='option';tcD=tc==='STO'?'STO':tc==='BTC'?'BTC':tc==='BTO'?'BTO':tc==='STC'?'STC':(tc||'OPT');tLabel=opt.optionType+' $'+opt.strike+(opt.expiryDate?' exp '+opt.expiryDate:'');}
    else if(tc==='BUY'||tc==='SELL'||(inst&&(desc.includes('CUSIP')||(!opt&&tc&&['INT','CDIV','GDBP','ACH'].indexOf(tc)<0)))){cat='share';tcD=tc==='BUY'?'Buy':(tc==='SELL'?'Sell':tc);tLabel='Shares';}
    else if(['INT','CDIV','GDBP','ACH'].indexOf(tc)>=0){cat='income';tcD=tc;tLabel=desc.length>40?desc.slice(0,40)+'...':desc;}
    else{cat='other';tcD=tc||'--';tLabel=desc.length>40?desc.slice(0,40)+'...':desc;}
    var uid6='act_'+Math.random().toString(36).slice(2,10);
    var rowCost=null,rowIncome=null;
    if(tc==='BTO'){rowCost=Math.abs(amt);rowIncome=null;}
    else if(tc==='STC'){rowCost=null;rowIncome=amt;}
    rows.push({id:uid6,date:d,instrument:inst||'--',desc:desc,tc:tcD,qty:qty||'--',price:price||'--',amount:amt,cost:rowCost,income:rowIncome,category:cat,typeLabel:tLabel,optTicker:opt?opt.ticker:'',optType:opt?opt.optionType:'',strike:opt?opt.strike:0,expiry:opt?opt.expiryDate:''});
  }
  return{rows:rows,errors:[]};
}

function autoExpirePositions(skipIds){
  // Marks any open position whose expiry has passed (11:59:59 PM of that day) as closed.
  // skipIds: optional object of IDs to leave untouched (used during import).
  var count=0,now3=new Date();
  positions.forEach(function(p){
    if(p.closed||!p.expiryDate)return;
    if(skipIds&&skipIds[p.id])return;
    var expDt=normExpiry(p.expiryDate);
    if(expDt&&expDt<now3){
      p.closed=true;
      p.closeAction={action:'Close',type:'zero',amount:0,signedAmount:0,notes:'Auto-expired (expiry date passed)',date:p.expiryDate};
      count++;
    }
  });
  if(count>0)savePositions();
  return count;
}
function normExpiry(s){
  // Normalize m/d/yy, m/d/yyyy, mm/dd/yy, or mm/dd (assumes current year) to Date at 23:59:59
  if(!s)return null;
  try{
    var parts=s.trim().split('/');
    var mo,dy,yr;
    if(parts.length===2){
      // mm/dd — assume current year
      mo=parseInt(parts[0]);dy=parseInt(parts[1]);yr=new Date().getFullYear();
    }else if(parts.length===3){
      mo=parseInt(parts[0]);dy=parseInt(parts[1]);yr=parseInt(parts[2]);
      if(yr<100)yr+=2000;
    }else{return null;}
    var dt=new Date(yr,mo-1,dy,23,59,59,999);
    return isNaN(dt)?null:dt;
  }catch(e){return null;}
}
function sameExpiry(a,b){
  // True if two expiry strings refer to the same calendar day
  if(!a&&!b)return true;
  if(!a||!b)return false;
  var da=normExpiry(a),db=normExpiry(b);
  if(!da||!db)return a.trim()===b.trim();
  return da.getFullYear()===db.getFullYear()&&da.getMonth()===db.getMonth()&&da.getDate()===db.getDate();
}
function actDoImport(){
  if(!actUpPreview||!actUpPreview.rows.length)return;
  var portTag=ap==='retirement'?as:ap;
  if(portTag==='all')portTag='lovelina';
  if(portTag==='ret-all')portTag='amit-roth';
  var now2=new Date();
  var newPositions=0,closedPositions=0,expiredPositions=0;

  // Track IDs created in THIS import so the expiry sweep never touches them
  var justCreatedIds={};

  actUpPreview.rows.forEach(function(actRow){
    var tc=actRow.tc;
    var ticker=actRow.instrument&&actRow.instrument!=='--'?actRow.instrument:'';
    var strike=actRow.strike||0;
    var expiry=actRow.expiry||'';
    var optType=actRow.optType||'';
    var amt=actRow.amount||0;
    var actDate=actRow.date||'';

    // ── 1. BTC or STC: find matching open position and mark it closed ──────────
    if(tc==='BTC'||tc==='STC'){
      // Best match: ticker + strike + same expiry day (skip just-created positions)
      var match=positions.find(function(p){
        return !p.closed
          &&p.ticker===ticker
          &&(strike===0||Math.abs((p.strike||0)-strike)<0.01)
          &&(expiry===''||sameExpiry(p.expiryDate,expiry));
      });
      // Fallback: ticker + strike only (still skip just-created)
      if(!match&&ticker&&strike>0){
        match=positions.find(function(p){
          return !p.closed&&p.ticker===ticker&&Math.abs((p.strike||0)-strike)<0.01;
        });
      }
      if(match){
        match.closed=true;
        var signed=tc==='BTC'?-Math.abs(amt):amt;
        var cdType=amt===0?'zero':signed>=0?'credit':'debit';
        var importSold=Math.abs(amt);
        if(importSold>0)match.soldAmount=importSold;
        match.closeAction={
          action:tc,type:cdType,
          amount:Math.abs(amt),signedAmount:signed,soldAmount:importSold||null,
          notes:'Auto-closed from activity import ('+actDate+')',
          date:actDate
        };
        if(cdType!=='zero')match.excelProfit=(match.excelIncome||0)+signed;
        closedPositions++;
      }
      return; // never create a new position for BTC/STC
    }

    // ── 2. STO: create new Short option ────────────────────────────────────────
    if(tc==='STO'&&ticker&&optType&&strike>0){
      var excelType=optType==='Put'?'Short Put':'Short Call';
      var income=Math.abs(amt);
      // Dup check: skip positions created in this same import run
      var dup=positions.find(function(p){
        return p.ticker===ticker&&p.excelType===excelType
          &&Math.abs((p.strike||0)-strike)<0.01
          &&sameExpiry(p.expiryDate,expiry)
          &&!p.closed&&(p.openDate||'')===(actDate);
      });
      if(!dup){
        var uid7=Math.random().toString(36).slice(2,10);
        justCreatedIds[uid7]=true;
        positions.push({id:uid7,portfolio:portTag,ticker:ticker,excelType:excelType,strike:strike,expiryDate:expiry,openDate:actDate,contracts:parseInt(actRow.qty)||1,excelCost:0,excelIncome:income,excelGrossValue:income,excelCurrentValue:income,excelProfit:income,closed:false,notes:actRow.desc||'',manualPrice:null,rolledOver:false,closeAction:null});
        newPositions++;
      }
      return;
    }

    // ── 3. BTO: create new Long option ─────────────────────────────────────────
    if(tc==='BTO'&&ticker&&optType&&strike>0){
      var excelTypeLong=optType==='Put'?'Long Put':'Long Call';
      var cost=Math.abs(amt);
      var dup2=positions.find(function(p){
        return p.ticker===ticker&&p.excelType===excelTypeLong
          &&Math.abs((p.strike||0)-strike)<0.01
          &&sameExpiry(p.expiryDate,expiry)
          &&!p.closed&&(p.openDate||'')===(actDate);
      });
      if(!dup2){
        var uid8=Math.random().toString(36).slice(2,10);
        justCreatedIds[uid8]=true;
        positions.push({id:uid8,portfolio:portTag,ticker:ticker,excelType:excelTypeLong,strike:strike,expiryDate:expiry,openDate:actDate,contracts:parseInt(actRow.qty)||1,excelCost:cost,excelIncome:0,excelGrossValue:cost,excelCurrentValue:cost,excelProfit:0,closed:false,notes:actRow.desc||'',manualPrice:null,rolledOver:false,closeAction:null});
        newPositions++;
      }
      return;
    }

    // ── 4. BUY shares ──────────────────────────────────────────────────────────
    if(tc==='Buy'&&ticker){
      var shareCost=Math.abs(amt);
      var uid9=Math.random().toString(36).slice(2,10);
      justCreatedIds[uid9]=true;
      positions.push({id:uid9,portfolio:portTag,ticker:ticker,excelType:'Shares',strike:0,expiryDate:'',openDate:actDate,contracts:parseInt(actRow.qty)||1,excelCost:shareCost,excelIncome:0,excelGrossValue:shareCost,excelCurrentValue:shareCost,excelProfit:0,closed:false,notes:actRow.desc||'',manualPrice:null,rolledOver:false,closeAction:null});
      newPositions++;
      return;
    }

    // ── 5. SELL shares: close matching open Shares position ────────────────────
    if(tc==='Sell'&&ticker){
      var shareMatch=positions.find(function(p){return !p.closed&&p.ticker===ticker&&p.excelType==='Shares';});
      if(shareMatch){
        shareMatch.closed=true;
        var sAmt=amt;
        shareMatch.closeAction={action:'Sell',type:sAmt>=0?'credit':'debit',amount:Math.abs(sAmt),signedAmount:sAmt,notes:'Auto-closed from activity import ('+actDate+')',date:actDate};
        if(sAmt!==0)shareMatch.excelProfit=(shareMatch.excelIncome||0)+sAmt-(shareMatch.excelCost||0);
        closedPositions++;
      }
      return;
    }
  });

  // ── Sweep: auto-expire ALL open positions whose expiry date has passed ──────
  expiredPositions+=autoExpirePositions(null);

  savePositions();
  setActRows(actUpPreview.rows.concat(getActRows()));
  var summary='Imported '+actUpPreview.rows.length+' activity rows.';
  if(newPositions)summary+=' Created '+newPositions+' new position'+(newPositions!==1?'s':'')+'.';
  if(closedPositions)summary+=' Closed '+closedPositions+' position'+(closedPositions!==1?'s':'')+'.';
  if(expiredPositions)summary+=' Auto-expired '+expiredPositions+' position'+(expiredPositions!==1?'s':'')+'.';
  actUpMsg={ok:true,text:summary};
  actUpPreview=null;actUpOpen=false;actPage=0;rMain();
}
